    {v:28,t:"And they stayed there a long time with the disciples."}
  ]},
  { ch:15, verses:[
    {v:1,t:"Certain people came down from Judea to Antioch and were teaching the believers: \"Unless you are circumcised, according to the custom taught by Moses, you cannot be saved.\""},
    {v:2,t:"This brought Paul and Barnabas into sharp dispute and debate with them. So Paul and Barnabas were appointed, along with some other believers, to go up to Jerusalem to see the apostles and elders about this question."},
    {v:3,t:"The church sent them on their way, and as they traveled through Phoenicia and Samaria, they told how the Gentiles had been converted. This news made all the believers very glad."},
    {v:4,t:"When they came to Jerusalem, they were welcomed by the church and the apostles and elders, to whom they reported everything God had done through them."},
    {v:5,t:"Then some of the believers who belonged to the party of the Pharisees stood up and said, \"The Gentiles must be circumcised and required to keep the law of Moses.\""},
    {v:6,t:"The apostles and elders met to consider this question."},
    {v:7,t:"After much discussion, Peter got up and addressed them: \"Brothers, you know that some time ago God made a choice among you that the Gentiles might hear from my lips the message of the gospel and believe."},
    {v:8,t:"God, who knows the heart, showed that he accepted them by giving the Holy Spirit to them, just as he did to us."},
    {v:9,t:"He did not discriminate between us and them, for he purified their hearts by faith."},
    {v:10,t:"Now then, why do you try to test God by putting on the necks of Gentiles a yoke that neither we nor our ancestors have been able to bear?"},
    {v:11,t:"No! We believe it is through the grace of our Lord Jesus that we are saved, just as they are.\""},
    {v:12,t:"The whole assembly became silent as they listened to Barnabas and Paul telling about the signs and wonders God had done among the Gentiles through them."},
    {v:13,t:"When they finished, James spoke up: \"Brothers, listen to me."},
    {v:14,t:"Simon has described to us how God first intervened to choose a people for his name from the Gentiles."},
    {v:15,t:"The words of the prophets are in agreement with this, as it is written:"},
    {v:16,t:"\"'After this I will return and rebuild David's fallen tent. Its ruins I will rebuild, and I will restore it,"},
    {v:17,t:"that the rest of mankind may seek the Lord, even all the Gentiles who bear my name, says the Lord, who does these things'—"},
    {v:18,t:"things known from long ago."},
    {v:19,t:"\"It is my judgment, therefore, that we should not make it difficult for the Gentiles who are turning to God."},
    {v:20,t:"Instead we should write to them, telling them to abstain from food polluted by idols, from sexual immorality, from the meat of strangled animals and from blood."},
    {v:21,t:"For the law of Moses has been preached in every city from the earliest times and is read in the synagogues on every Sabbath.\""},
    {v:22,t:"Then the apostles and elders, with the whole church, decided to choose some of their own men and send them to Antioch with Paul and Barnabas. They chose Judas (called Barsabbas) and Silas, men who were leaders among the believers."},
    {v:23,t:"With them they sent the following letter: The apostles and elders, your brothers, To the Gentile believers in Antioch, Syria and Cilicia: Greetings."},
    {v:24,t:"We have heard that some went out from us without our authorization and disturbed you, troubling your minds by what they said."},
    {v:25,t:"So we all agreed to choose some men and send them to you with our dear friends Barnabas and Paul—"},
    {v:26,t:"people who have risked their lives for the name of our Lord Jesus Christ."},
    {v:27,t:"Therefore we are sending Judas and Silas to confirm by word of mouth what we are writing."},
    {v:28,t:"It seemed good to the Holy Spirit and to us not to burden you with anything beyond the following requirements:"},
    {v:29,t:"You are to abstain from food sacrificed to idols, from blood, from the meat of strangled animals and from sexual immorality. You will do well to avoid these things. Farewell."},
    {v:30,t:"So the men were sent off and went down to Antioch, where they gathered the church together and delivered the letter."},
    {v:31,t:"The people read it and were glad for its encouraging message."},
    {v:32,t:"Judas and Silas, who themselves were prophets, said much to encourage and strengthen the believers."},
    {v:33,t:"After spending some time there, they were sent off by the believers with the blessing of peace to return to those who had sent them."},
    {v:34,t:"But Silas decided to remain there."},
    {v:35,t:"But Paul and Barnabas remained in Antioch, where they and many others taught and preached the word of the Lord."},
    {v:36,t:"Some time later Paul said to Barnabas, \"Let us go back and visit the believers in all the towns where we preached the word of the Lord and see how they are doing.\""},
    {v:37,t:"Barnabas wanted to take John, also called Mark, with them,"},
    {v:38,t:"but Paul did not think it wise to take him, because he had deserted them in Pamphylia and had not continued with them in the work."},
    {v:39,t:"They had such a sharp disagreement that they parted company. Barnabas took Mark and sailed for Cyprus,"},
    {v:40,t:"but Paul chose Silas and left, commended by the believers to the grace of the Lord."},
    {v:41,t:"He went through Syria and Cilicia, strengthening the churches."}
  ]},
  { ch:16, verses:[
    {v:1,t:"Paul came to Derbe and then to Lystra, where a disciple named Timothy lived, whose mother was Jewish and a believer but whose father was a Greek."},
    {v:2,t:"The believers at Lystra and Iconium spoke well of him."},
    {v:3,t:"Paul wanted to take him along on the journey, so he circumcised him because of the Jews who lived in that area, for they all knew that his father was a Greek."},
    {v:4,t:"As they traveled from town to town, they delivered the decisions reached by the apostles and elders in Jerusalem for the people to obey."},
    {v:5,t:"So the churches were strengthened in the faith and grew daily in numbers."},
    {v:6,t:"Paul and his companions traveled throughout the region of Phrygia and Galatia, having been kept by the Holy Spirit from preaching the word in the province of Asia."},
    {v:7,t:"When they came to the border of Mysia, they tried to enter Bithynia, but the Spirit of Jesus would not allow them to."},
    {v:8,t:"So they passed by Mysia and went down to Troas."},
    {v:9,t:"During the night Paul had a vision of a man of Macedonia standing and begging him, \"Come over to Macedonia and help us.\""},
    {v:10,t:"After Paul had seen the vision, we got ready at once to leave for Macedonia, concluding that God had called us to preach the gospel to them."},
    {v:11,t:"From Troas we put out to sea and sailed straight for Samothrace, and the next day we went on to Neapolis."},
    {v:12,t:"From there we traveled to Philippi, a Roman colony and the leading city of that district of Macedonia. And we stayed there several days."},
    {v:13,t:"On the Sabbath we went outside the city gate to the river, where we expected to find a place of prayer. We sat down and began to speak to the women who had gathered there."},
    {v:14,t:"One of those listening was a woman from the city of Thyatira named Lydia, a dealer in purple cloth. She was a worshiper of God. The Lord opened her heart to respond to Paul's message."},
    {v:15,t:"When she and the members of her household were baptized, she invited us to her home. \"If you consider me a believer in the Lord,\" she said, \"come and stay at my house.\" And she persuaded us."},
    {v:16,t:"Once when we were going to the place of prayer, we were met by a female slave who had a spirit by which she predicted the future. She earned a great deal of money for her owners by fortune-telling."},
    {v:17,t:"She followed Paul and the rest of us, shouting, \"These men are servants of the Most High God, who are telling you the way to be saved.\""},
    {v:18,t:"She kept this up for many days. Finally Paul became so annoyed that he turned around and said to the spirit, \"In the name of Jesus Christ I command you to come out of her!\" At that moment the spirit left her."},
    {v:19,t:"When her owners realized that their hope of making money was gone, they seized Paul and Silas and dragged them into the marketplace to face the authorities."},
    {v:20,t:"They brought them before the magistrates and said, \"These men are Jews, and are throwing our city into an uproar"},
    {v:21,t:"by advocating customs unlawful for us Romans to accept or practice.\""},
    {v:22,t:"The crowd joined in the attack against Paul and Silas, and the magistrates ordered them to be stripped and beaten with rods."},
    {v:23,t:"After they had been severely flogged, they were thrown into prison, and the jailer was commanded to guard them carefully."},
    {v:24,t:"When he received these orders, he put them in the inner cell and fastened their feet in the stocks."},
    {v:25,t:"About midnight Paul and Silas were praying and singing hymns to God, and the other prisoners were listening to them."},
    {v:26,t:"Suddenly there was such a violent earthquake that the foundations of the prison were shaken. At once all the prison doors flew open, and everyone's chains came loose."},
    {v:27,t:"The jailer woke up, and when he saw the prison doors open, he drew his sword and was about to kill himself because he thought the prisoners had escaped."},
    {v:28,t:"But Paul shouted, \"Don't do yourself harm! We are all here!\""},
    {v:29,t:"The jailer called for lights, rushed in and fell trembling before Paul and Silas."},
    {v:30,t:"He then brought them out and asked, \"Sirs, what must I do to be saved?\""},
    {v:31,t:"They replied, \"Believe in the Lord Jesus, and you will be saved—you and your household.\""},
    {v:32,t:"Then they spoke the word of the Lord to him and to all the others in his house."},
    {v:33,t:"At that hour of the night the jailer took them and washed their wounds; then immediately he and all his household were baptized."},
    {v:34,t:"The jailer brought them into his house and set a meal before them; he was filled with joy because he had come to believe in God—he and his whole household."},
    {v:35,t:"When it was daylight, the magistrates sent their officers to the jailer with the order: \"Release those men.\""},
    {v:36,t:"The jailer told Paul, \"The magistrates have ordered that you and Silas be released. Now you can leave. Go in peace.\""},
    {v:37,t:"But Paul said to the officers: \"They beat us publicly without a trial, even though we are Roman citizens, and threw us into prison. And now do they want to get rid of us quietly? No! Let them come themselves and escort us out.\""},
    {v:38,t:"The officers reported this to the magistrates, and when they heard that Paul and Silas were Roman citizens, they were alarmed."},
    {v:39,t:"They came to appease them and escorted them from the prison, requesting them to leave the city."},
    {v:40,t:"After Paul and Silas came out of the prison, they went to Lydia's house, where they met with the brothers and sisters and encouraged them. Then they left."}
  ]},
  { ch:17, verses:[
    {v:1,t:"When Paul and his companions had passed through Amphipolis and Apollonia, they came to Thessalonica, where there was a Jewish synagogue."},
    {v:2,t:"As was his custom, Paul went into the synagogue, and on three Sabbath days he reasoned with them from the Scriptures,"},
    {v:3,t:"explaining and proving that the Messiah had to suffer and rise from the dead. \"This Jesus I am proclaiming to you is the Messiah,\" he said."},
    {v:4,t:"Some of the Jews were persuaded and joined Paul and Silas, as did a large number of God-fearing Greeks and quite a few prominent women."},
    {v:5,t:"But other Jews were jealous; so they rounded up some bad characters from the marketplace, formed a mob and started a riot in the city. They rushed to Jason's house in search of Paul and Silas in order to bring them out to the crowd."},
    {v:6,t:"But when they did not find them, they dragged Jason and some other believers before the city officials, shouting: \"These men who have caused trouble all over the world have now come here,"},
    {v:7,t:"and Jason has welcomed them into his house. They are all defying Caesar's decrees, saying that there is another king, one called Jesus.\""},
    {v:8,t:"When they heard this, the crowd and the city officials were thrown into turmoil."},
    {v:9,t:"Then they made Jason and the others post bond and let them go."},
    {v:10,t:"As soon as it was night, the believers sent Paul and Silas away to Berea. On arriving there, they went to the Jewish synagogue."},
    {v:11,t:"Now the Bereans were of more noble character than those in Thessalonica, for they received the message with great eagerness and examined the Scriptures every day to see if what Paul said was true."},
    {v:12,t:"As a result, many of them believed, as did also a number of prominent Greek women and many Greek men."},
    {v:13,t:"But when the Jews in Thessalonica learned that Paul was preaching the word of God at Berea, some of them went there too, agitating the crowds and stirring them up."},
    {v:14,t:"The believers immediately sent Paul to the coast, but Silas and Timothy stayed at Berea."},
    {v:15,t:"Those who escorted Paul brought him to Athens and then left with instructions for Silas and Timothy to join him as soon as possible."},
    {v:16,t:"While Paul was waiting for them in Athens, he was greatly distressed to see that the city was full of idols."},
    {v:17,t:"So he reasoned in the synagogue with both Jews and God-fearing Greeks, as well as in the marketplace day by day with those who happened to be there."},
    {v:18,t:"A group of Epicurean and Stoic philosophers began to debate with him. Some of them asked, \"What is this babbler trying to say?\" Others said, \"He seems to be advocating foreign gods.\" They said this because Paul was preaching the good news about Jesus and the resurrection."},
    {v:19,t:"Then they took him and brought him to a meeting of the Areopagus, where they said, \"May we know what this new teaching is that you are presenting?"},
    {v:20,t:"You are bringing some strange ideas to our ears, and we would like to know what they mean.\""},
    {v:21,t:"(All the Athenians and the foreigners who lived there spent their time doing nothing but talking about and listening to the latest ideas.)"},
    {v:22,t:"Paul then stood up in the meeting of the Areopagus and said: \"People of Athens! I see that in every way you are very religious."},
    {v:23,t:"For as I walked around and looked carefully at your objects of worship, I even found an altar with this inscription: TO AN UNKNOWN GOD. So you are ignorant of the very thing you worship—and this is what I am going to proclaim to you."},
    {v:24,t:"\"The God who made the world and everything in it is the Lord of heaven and earth and does not live in temples built by human hands."},
    {v:25,t:"And he is not served by human hands, as if he needed anything. Rather, he himself gives everyone life and breath and everything else."},
    {v:26,t:"From one man he made all the nations, that they should inhabit the whole earth; and he marked out their appointed times in history and the boundaries of their lands."},
    {v:27,t:"God did this so that they would seek him and perhaps reach out for him and find him, though he is not far from any one of us."},
    {v:28,t:"'For in him we live and move and have our being.' As some of your own poets have said, 'We are his offspring.'"},
    {v:29,t:"\"Therefore since we are God's offspring, we should not think that the divine being is like gold or silver or stone—an image made by human skill and imagination."},
    {v:30,t:"In the past God overlooked such ignorance, but now he commands all people everywhere to repent."},
    {v:31,t:"For he has appointed a day on which he will judge the world in righteousness by the man he has appointed. He has given proof of this to everyone by raising him from the dead.\""},
    {v:32,t:"When they heard about the resurrection of the dead, some of them sneered, but others said, \"We want to hear you again on this subject.\""},
    {v:33,t:"At that, Paul left the Council."},
    {v:34,t:"Some of the people became followers of Paul and believed. Among them was Dionysius, a member of the Areopagus, a woman named Damaris, and a number of others."}
  ]},
  { ch:18, verses:[
    {v:1,t:"After this, Paul left Athens and went to Corinth."},
    {v:2,t:"There he met a Jew named Aquila, a native of Pontus, who had recently come from Italy with his wife Priscilla, because Claudius had ordered all Jews to leave Rome. Paul went to see them,"},
    {v:3,t:"and because he was a tentmaker as they were, he stayed and worked with them."},
    {v:4,t:"Every Sabbath he reasoned in the synagogue, trying to persuade Jews and Greeks."},
    {v:5,t:"When Silas and Timothy came from Macedonia, Paul devoted himself exclusively to preaching, testifying to the Jews that Jesus was the Messiah."},
    {v:6,t:"But when they opposed Paul and became abusive, he shook out his clothes in protest and said to them, \"Your blood be on your own heads! I am innocent of it. From now on I will go to the Gentiles.\""},
    {v:7,t:"Then Paul left the synagogue and went next door to the house of Titius Justus, a worshiper of God."},
    {v:8,t:"Crispus, the synagogue leader, and his entire household believed in the Lord; and many of the Corinthians who heard Paul believed and were baptized."},
    {v:9,t:"One night the Lord spoke to Paul in a vision: \"Do not be afraid; keep on speaking, do not be silent."},
    {v:10,t:"For I am with you, and no one is going to attack and harm you, because I have many people in this city.\""},
    {v:11,t:"So Paul stayed in Corinth for a year and a half, teaching them the word of God."},
    {v:12,t:"While Gallio was proconsul of Achaia, the Jews of Corinth made a united attack on Paul and brought him to the place of judgment."},
    {v:13,t:"\"This man,\" they charged, \"is persuading the people to worship God in ways contrary to the law.\""},
    {v:14,t:"Just as Paul was about to speak, Gallio said to the Jews, \"If you Jews were making a complaint about some misdemeanor or serious crime, it would be reasonable for me to listen to you."},
    {v:15,t:"But since it involves questions about words and names and your own law—settle the matter yourselves. I will not be a judge of such things.\""},
    {v:16,t:"So he drove them off."},
    {v:17,t:"Then they all turned on Sosthenes the synagogue leader and beat him in front of the proconsul; and Gallio showed no concern whatever."},
    {v:18,t:"Paul stayed on in Corinth for some time. Then he left the brothers and sisters and sailed for Syria, accompanied by Priscilla and Aquila. Before he sailed, he had his hair cut off at Cenchreae because of a vow he had taken."},
    {v:19,t:"They arrived at Ephesus, where Paul left Priscilla and Aquila. He himself went into the synagogue and reasoned with the Jews."},
    {v:20,t:"When they asked him to spend more time with them, he declined."},
    {v:21,t:"But as he left, he promised, \"I will come back if it is God's will.\" Then he set sail from Ephesus."},
    {v:22,t:"When he landed at Caesarea, he went up to Jerusalem and greeted the church and then went down to Antioch."},
    {v:23,t:"After spending some time in Antioch, Paul set out from there and traveled from place to place throughout the region of Galatia and Phrygia, strengthening all the disciples."},
    {v:24,t:"Meanwhile a Jew named Apollos, a native of Alexandria, came to Ephesus. He was a learned man, with a thorough knowledge of the Scriptures."},
    {v:25,t:"He had been instructed in the way of the Lord, and he spoke with great fervor and taught about Jesus accurately, though he knew only the baptism of John."},
    {v:26,t:"He began to speak boldly in the synagogue. When Priscilla and Aquila heard him, they invited him to their home and explained to him the way of God more adequately."},
    {v:27,t:"When Apollos wanted to go to Achaia, the brothers and sisters encouraged him and wrote to the disciples there to welcome him. When he arrived, he was a great help to those who by grace had believed."},
    {v:28,t:"For he vigorously refuted his Jewish opponents in public debate, proving from the Scriptures that Jesus was the Messiah."}
  ]},
  { ch:19, verses:[
    {v:1,t:"While Apollos was at Corinth, Paul took the road through the interior and arrived at Ephesus. There he found some disciples"},
    {v:2,t:"and asked them, \"Did you receive the Holy Spirit when you believed?\" They answered, \"No, we have not even heard that there is a Holy Spirit.\""},
    {v:3,t:"So Paul asked, \"Then what baptism did you receive?\" \"John's baptism,\" they replied."},
    {v:4,t:"Paul said, \"John's baptism was a baptism of repentance. He told the people to believe in the one coming after him, that is, in Jesus.\""},
    {v:5,t:"On hearing this, they were baptized in the name of the Lord Jesus."},

const KEY_WORDS = (()=>{
  const map = {};
  CHAPTERS_DATA.forEach(cd=>{
    cd.verses.forEach(verse=>{
      const vk = cd.ch+'-'+verse.v;
      verse.t.split(/\s+/).forEach(w=>{
        const core = w.replace(/[^a-zA-Z]/g,'').toLowerCase();
        if(!core) return;
        if(!map[core]) map[core]=new Set();
        map[core].add(vk);
      });
    });
  });
  const result = new Set();
  Object.entries(map).forEach(([word,verses])=>{ if(verses.size===1) result.add(word); });
  return result;
})();

// Maps each unique keyword → the chapter number it belongs to
const KEYWORD_TO_CHAPTER = (()=>{
  const result = {};
  CHAPTERS_DATA.forEach(cd=>{
    cd.verses.forEach(verse=>{
      verse.t.split(/\s+/).forEach(w=>{
        const core = w.replace(/[^a-zA-Z]/g,'').toLowerCase();
        if(KEY_WORDS.has(core)) result[core] = cd.ch;
      });
    });
  });
  return result;
})();

// For each verse, how many words must be shown before it becomes unique among all of John?
// = (longest prefix shared with any other verse) + 1
const VERSE_UNIQUE_PREFIX = (()=>{
  const result = {};
  const allVerses = [];
  CHAPTERS_DATA.forEach(cd=>{
    cd.verses.forEach(v=>{
      const key = `${cd.ch}-${v.v}`;
      const words = v.t.split(' ').map(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()).filter(Boolean);
      allVerses.push({key, words});
    });
  });
  allVerses.forEach((verse,i)=>{
    let maxCommon = 0;
    allVerses.forEach((other,j)=>{
      if(i===j) return;
      let c=0;
      const minLen=Math.min(verse.words.length, other.words.length);
      while(c<minLen && verse.words[c]===other.words[c]) c++;
      maxCommon=Math.max(maxCommon,c);
    });
    result[verse.key] = maxCommon + 1; // include the diverging word itself
  });
  return result;
})();

const STOP = new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','shall','can','not','no','nor','so','yet','both','either','neither','than','as','if','he','she','it','we','you','they','i','me','him','her','us','them','my','your','his','its','our','their','this','that','these','those','who','which','what','when','where','how','all','any','each','more','most','other','such','only','same','too','very','from','by','about','into','through','before','after','above','below','between','out','off','over','under','again','then','once','here','there','why','up','down','am','just','because','while','although','though','since','even','also','now','still','already','always','never','often','some','many','much','said','say','says','than','those']);

// ── Unique N-gram phrases (unique across ALL of John; no component word is itself a keyword) ──
// Must be defined AFTER STOP and KEY_WORDS
function buildPhraseMap(n){
  const map={};
  CHAPTERS_DATA.forEach(cd=>{
    cd.verses.forEach(verse=>{
      const raw=verse.t.split(/\s+/);
      const clean=raw.map(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()).filter(Boolean);
      for(let i=0;i<=clean.length-n;i++){
        const gram=clean.slice(i,i+n).join(' ');
        if(!map[gram]) map[gram]={ch:cd.ch,v:verse.v,count:0};
        map[gram].count++;
      }
    });
  });
  return map;
}
const KEY_PHRASES_2=(()=>{
  const map=buildPhraseMap(2); const result={};
  Object.entries(map).forEach(([gram,info])=>{
    if(info.count!==1) return;
    const words=gram.split(' ');
    if(words.some(w=>KEY_WORDS.has(w))) return;   // exclude if any word is itself a keyword
    if(words.every(w=>STOP.has(w))) return;        // exclude all-stopword phrases
    result[gram]=info.ch;
  });
  return result;
})();
const KEY_PHRASES_3=(()=>{
  const map=buildPhraseMap(3); const result={};
  Object.entries(map).forEach(([gram,info])=>{
    if(info.count!==1) return;
    const words=gram.split(' ');
    if(words.some(w=>KEY_WORDS.has(w))) return;
    if(words.every(w=>STOP.has(w))) return;
    result[gram]=info.ch;
  });
  return result;
})();

function parseWord(w){
  const m=w.match(/^([^a-zA-Z0-9\u2018\u2019''\-]*)([a-zA-Z0-9\u2018\u2019''\-]+)([^a-zA-Z0-9\u2018\u2019''\-]*)$/);
  return m ? {pre:m[1],core:m[2],post:m[3]} : {pre:'',core:w,post:''};
}
function isContent(core){
  const c=core.replace(/[^a-zA-Z]/g,'').toLowerCase();
  return c.length>0 && !STOP.has(c);
}
function norm(s){ return (s||'').trim().toLowerCase().replace(/[^a-z0-9''\-]/gi,''); }
function vkey(ch,v){ return ch*1000+v; }
function matchAnswer(userInput, correct){
  // Strip to bare letters+digits for the lax comparison (apostrophes, hyphens, quotes not required)
  const lettersOnly = s => (s||'').replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
  // Normalize punctuation for a slightly stricter comparison
  const normPunct = s => (s||'').toLowerCase()
    .replace(/[\u2018\u2019\u02bc''`]/g,"'")   // curly apostrophes → straight
    .replace(/[\u201c\u201d"]/g,'')             // strip all quote marks (not required)
    .replace(/[\u2013\u2014\u2015]/g,'-')       // em/en dash → hyphen (- suffices)
    .replace(/[^a-z0-9'\-]/g,'');
  return lettersOnly(userInput)===lettersOnly(correct) || normPunct(userInput)===normPunct(correct);
}

function makeRng(seed){
  let s = (seed >>> 0) || 1;
  return function(){
    s ^= s << 13; s = s >>> 0;
    s ^= s >> 17;
    s ^= s << 5;  s = s >>> 0;
    return s / 0xFFFFFFFF;
  };
}
function hashSeed(base, str){
  let h = base >>> 0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(h ^ str.charCodeAt(i), 0x9e3779b9) >>> 0;
  }
  return h;
}
function shuffleArr(arr, rng){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(rng() * (i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildSegs(text, level, opts={}){
  const {seed, specialty, uniquePrefix} = opts;
  const useRandom = seed != null;
  const words = text.split(' ');
  const protectedPfx = new Set();
  if(specialty){
    const protectN = uniquePrefix ?? 5;
    let count=0;
    for(let i=0;i<words.length&&count<protectN;i++){
      const {core}=parseWord(words[i]);
      if(core){ protectedPfx.add(i); count++; }
    }
  }
  function shouldBlank(globalIdx, poolIdx, poolLen, rng){
    if(protectedPfx.has(globalIdx)) return false;
    if(level===3) return true;
    if(level===1){ return useRandom ? (rng() < 0.25) : (poolIdx % 4 === 0); }
    if(level===2){ return useRandom ? (rng() < 0.50) : (poolIdx % 2 === 0); }
    return false;
  }
  if(level===5){
    return words.map((w,i)=>{
      if(!w.trim()) return {type:'text',value:w};
      const {pre,core,post}=parseWord(w);
      if(!core) return {type:'text',value:w};
      if(protectedPfx.has(i)) return {type:'text',value:w};
      return {type:'blank',pre,core,post,idx:i};
    });
  }
  if(level===4){
    const rng = useRandom ? makeRng(seed) : null;
    return words.map((w,i)=>{
      if(!w.trim()) return {type:'text',value:w};
      const {pre,core,post}=parseWord(w);
      if(!core) return {type:'text',value:w};
      if(protectedPfx.has(i)) return {type:'text',value:w};
      const c=core.replace(/[^a-zA-Z]/g,'').toLowerCase();
      if(STOP.has(c)){
        if(useRandom && rng() > 0.80) return {type:'text',value:w};
        return {type:'blank',pre,core,post,idx:i};
      }
      return {type:'text',value:w};
    });
  }
  const ci = words.map((w,i)=>({i,...parseWord(w)})).filter(({core})=>isContent(core)).map(({i})=>i);
  const bs = new Set();
  const rng = useRandom ? makeRng(seed) : null;
  ci.forEach((idx,n)=>{ if(shouldBlank(idx, n, ci.length, rng)) bs.add(idx); });
  return words.map((w,i)=>{
    if(bs.has(i)){ const {pre,core,post}=parseWord(w); return {type:'blank',pre,core,post,idx:i}; }
    return {type:'text',value:w};
  });
}

function onSpace(e){
  if(e.key!==' ') return;
  e.preventDefault();
  const all=Array.from(document.querySelectorAll('input.blank:not([disabled])'));
  const i=all.indexOf(e.target);
  if(i>=0&&i<all.length-1) all[i+1].focus();
}

const LEVELS=[
  {label:'Level 1', desc:'~25% of content words removed'},
  {label:'Level 2', desc:'~50% of content words removed'},
  {label:'Level 3', desc:'All content words removed'},
  {label:'Level 4', desc:'Content words shown — fill in every grammar word'},
  {label:'Level 5', desc:'Every single word removed'},
];

function ReadingVerse({verse, ch, showJump}){
  const words = verse.t.split(' ');
  const uniquePrefix = VERSE_UNIQUE_PREFIX[`${ch}-${verse.v}`] ?? 5;
  return (
    <div className="verse">
      <span className="vnum static-vnum">{verse.v}</span>
      <span className="vtext">
        {words.map((w,i)=>{
          const core = w.replace(/[^a-zA-Z]/g,'').toLowerCase();
          const isKey = core.length>=3 && KEY_WORDS.has(core);
          const isJumpPoint = showJump && i === uniquePrefix;
          return (
            <span key={i}>
              {isJumpPoint && <span className="ftv-jump" title="FTV jump point">/</span>}
              {isKey ? <strong className="key-word">{w}</strong> : w}{' '}
            </span>
          );
        })}
      </span>
    </div>
  );
}

function VerseRow({verse, ch, level, segOpts, ans, hinted, setAns, checked}){
  const verseSeed = segOpts.seed != null ? hashSeed(segOpts.seed, `${ch}-${verse.v}`) : null;
  const uniquePrefix = VERSE_UNIQUE_PREFIX[`${ch}-${verse.v}`] ?? 5;
  const opts = {...segOpts, seed: verseSeed, uniquePrefix};
  const segs = useMemo(()=>buildSegs(verse.t, level, opts), [verse.t, level, verseSeed, segOpts.specialty]);
  const vnKey=`${ch}-${verse.v}-vnum`;
  const vnVal=ans[vnKey]||'';
  const vnOk=checked && norm(vnVal)===String(verse.v);
  const vnBad=checked && norm(vnVal)!==String(verse.v);
  return (
    <div className="verse">
      <span className="vnum">
        <input className={'blank vnum-blank'+(vnOk?' ok':vnBad?' bad':'')} value={vnVal}
          onChange={e=>setAns(vnKey,e.target.value)} onKeyDown={onSpace} disabled={checked}
          autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
          name={`q_${vnKey}`}
          data-bkey={vnKey} data-correct={String(verse.v)} data-ch={ch} placeholder="#" title="Verse number"/>
        {vnBad&&checked&&<span className="hint-ans" style={{fontSize:'.65rem'}}>({verse.v})</span>}
      </span>
      <span className="vtext">
        {segs.map((s,i)=>{
          if(s.type==='text') return <span key={i}>{s.value}{' '}</span>;
          const k=`${ch}-${verse.v}-${s.idx}`;
          const val=ans[k]||'';
          const wasHinted=hinted[k];
          const isOk=checked&&matchAnswer(val,s.core);
          const isBad=checked&&!matchAnswer(val,s.core);
          const w=Math.max(s.core.length*9,28);
          return (
            <span key={i}>
              {s.pre}
              <input className={'blank'+(isOk?' ok':isBad?' bad':wasHinted&&!checked?' hinted':'')}
                style={{width:w+'px'}} value={val}
                onChange={e=>setAns(k,e.target.value)} onKeyDown={onSpace} disabled={checked}
                autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
                name={`q_${k}`}
                data-bkey={k} data-correct={s.core} data-ch={ch} placeholder="…"/>
              {isBad&&checked&&<span className="hint-ans">({s.core})</span>}
              {s.post}{' '}
            </span>
          );
        })}
      </span>
    </div>
  );
}

const TIMER_MAX = 20;

function KeywordQuiz({ onBack }) {
  const allChapters = CHAPTERS_DATA.map(c => c.ch);

  // ── Setup state ──
  const [phase, setPhase]         = useState('setup'); // 'setup' | 'playing' | 'results'
  const [selChs, setSelChs]       = useState(new Set());
  const [phraseMode, setPhraseMode] = useState(null);  // null | '2' | '3'
  const [reverseMode, setReverseMode] = useState(false);

  // ── Game state ──
  const [pool, setPool]           = useState([]);   // [{item, ch}] shuffled
  const [qIdx, setQIdx]           = useState(0);
  const [picked, setPicked]       = useState(null); // chapter/item user chose, or 'timeout'
  const [timeLeft, setTimeLeft]   = useState(TIMER_MAX);
  const [history, setHistory]     = useState([]);

  const timerRef   = useRef(null);
  const autoRef    = useRef(null);
  const choicesRef = useRef({qIdx:-1, choices:null}); // stable reverse-mode choices per question

  // ── Timer ──
  useEffect(()=>{
    if(phase !== 'playing' || picked !== null) return;
    if(timeLeft <= 0){ handleAnswer('timeout'); return; }
    timerRef.current = setTimeout(()=> setTimeLeft(t => t - 1), 1000);
    return ()=> clearTimeout(timerRef.current);
  }, [phase, timeLeft, picked]);

  function getSourceMap(){
    if(phraseMode==='2') return KEY_PHRASES_2;
    if(phraseMode==='3') return KEY_PHRASES_3;
    return KEYWORD_TO_CHAPTER;
  }

  function buildPool(chs){
    const src=getSourceMap();
    const entries=[];
    chs.forEach(ch=>{
      Object.entries(src).forEach(([item,itemCh])=>{
        if(itemCh===ch) entries.push({item,ch});
      });
    });
    for(let i=entries.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [entries[i],entries[j]]=[entries[j],entries[i]];
    }
    return entries;
  }

  // For reverse mode: given current chapter, generate choices {item,ch}
  // Returns {correct, choices[]} where choices is 4 items shuffled
  function buildReverseChoices(pool, qIdx, rng){
    const correct=pool[qIdx];
    // Distractors: items from other chapters in the pool
    const others=pool.filter((_,i)=>i!==qIdx && _.ch!==correct.ch);
    // Shuffle others deterministically
    const shuffled=others.slice().sort(()=>Math.random()-.5);
    const distractors=shuffled.slice(0,3);
    const choices=[correct,...distractors].sort(()=>Math.random()-.5);
    return {correct,choices};
  }

  function startQuiz(){
    if(selChs.size===0) return;
    const p=buildPool([...selChs]);
    if(p.length===0) return;
    setPool(p); setQIdx(0); setHistory([]); setPicked(null); setTimeLeft(TIMER_MAX);
    choicesRef.current = {qIdx:-1, choices:null};
    setPhase('playing');
    if(window.BgMgr) window.BgMgr.setChapter([...selChs][0]);
  }

  function handleAnswer(ans){
    clearTimeout(timerRef.current); clearTimeout(autoRef.current);
    const current=pool[qIdx];
    const isTimeout=ans==='timeout';
    let correct;
    if(reverseMode){
      correct=!isTimeout && ans===current.item;
    } else {
      correct=!isTimeout && ans===current.ch;
    }
    setPicked(ans);
    setHistory(h=>[...h,{
      item:current.item, correctCh:current.ch,
      picked:ans, correct, timedOut:isTimeout,
      correctItem:current.item
    }]);
    if(correct) autoRef.current=setTimeout(()=>advance(),1800);
    // On wrong/timeout, don't auto-advance — let user see & click Next
  }

  function advance(){
    clearTimeout(autoRef.current);
    const nextIdx=qIdx+1;
    if(nextIdx>=pool.length){ setPhase('results'); return; }
    setQIdx(nextIdx); setPicked(null); setTimeLeft(TIMER_MAX);
    if(window.BgMgr) window.BgMgr.setChapter(pool[nextIdx].ch);
  }

  function restart(){ setPhase('setup'); setPicked(null); setTimeLeft(TIMER_MAX); setHistory([]); clearTimeout(timerRef.current); clearTimeout(autoRef.current); }

  function toggleCh(ch){ setSelChs(prev=>{ const n=new Set(prev); n.has(ch)?n.delete(ch):n.add(ch); return n; }); }
  function togglePhrase(mode){ setPhraseMode(prev=>prev===mode?null:mode); }

  // ── Keyboard: number keys → submit chapter (forward mode) ──
  useEffect(()=>{
    if(phase!=='playing'||picked!==null||reverseMode) return;
    let buf=''; let bufTimer=null;
    function onKey(e){
      if(e.key==='Escape'){ restart(); return; }
      if(/^\d$/.test(e.key)){
        buf+=e.key; clearTimeout(bufTimer);
        bufTimer=setTimeout(()=>{
          const ch=parseInt(buf,10);
          if([...selChs].includes(ch)) handleAnswer(ch);
          buf='';
        },400);
      }
    }
    window.addEventListener('keydown',onKey);
    return ()=>{ window.removeEventListener('keydown',onKey); clearTimeout(bufTimer); };
  },[phase,picked,qIdx,reverseMode]);

  /* ── RENDER: SETUP ── */
  if(phase==='setup'){
    const poolSize=buildPool([...selChs]).length;
    const modeLabel=phraseMode==='2'?'2-word phrases':phraseMode==='3'?'3-word phrases':'keywords';
    return (
      <div className="kq-wrap">
        <div className="top-nav">
          <button className="kq-nav-btn" onClick={onBack}>← Memory Quiz</button>
        </div>
        <div className="kq-title">Keywords Quiz</div>
        <div className="kq-subtitle">Identify which chapter each unique {modeLabel} belongs to</div>

        {/* Chapter select */}
        <div className="range-card">
          <div className="kq-section-label">SELECT CHAPTERS TO QUIZ</div>
          <div className="kq-ch-grid">
            {allChapters.map(ch=>(
              <button key={ch} className={'kq-ch-btn'+(selChs.has(ch)?' kq-sel':'')}
                onClick={()=>toggleCh(ch)}>{ch}</button>
            ))}
          </div>
          <div className="kq-sel-row">
            <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.3rem .9rem'}} onClick={()=>setSelChs(new Set(allChapters))}>Select All</button>
            <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.3rem .9rem'}} onClick={()=>setSelChs(new Set())}>Clear</button>
          </div>
          <div className="kq-sel-count">
            {selChs.size===0 ? 'No chapters selected' : `${selChs.size} chapter${selChs.size>1?'s':''} selected · ${poolSize} ${modeLabel}`}
          </div>
        </div>

        {/* Word type options */}
        <div className="range-card" style={{marginTop:'.7rem'}}>
          <div className="kq-section-label">QUIZ TYPE</div>
          <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap',marginBottom:'.75rem'}}>
            <button
              className={'kq-ch-btn'+(phraseMode===null?' kq-sel':'')}
              onClick={()=>setPhraseMode(null)}
              style={{padding:'.7rem 1.4rem',minWidth:'130px',fontSize:'.88rem',lineHeight:1.4}}>
              🔑 Keywords
            </button>
            <button
              className={'kq-ch-btn'+(phraseMode==='2'?' kq-sel':'')}
              onClick={()=>togglePhrase('2')}
              style={{padding:'.7rem 1.4rem',minWidth:'150px',fontSize:'.88rem',lineHeight:1.4}}>
              ✦✦ 2-Word Phrases
            </button>
            <button
              className={'kq-ch-btn'+(phraseMode==='3'?' kq-sel':'')}
              onClick={()=>togglePhrase('3')}
              style={{padding:'.7rem 1.4rem',minWidth:'150px',fontSize:'.88rem',lineHeight:1.4}}>
              ✦✦✦ 3-Word Phrases
            </button>
          </div>
          <div style={{textAlign:'center',fontSize:'.75rem',fontStyle:'italic',color:'var(--c-vmuted)',lineHeight:1.6}}>
            {phraseMode===null && 'Words unique to one verse in all of Acts · phrases excluded'}
            {phraseMode==='2' && '2-word sequences unique to one verse · not containing any keyword'}
            {phraseMode==='3' && '3-word sequences unique to one verse · not containing any keyword'}
          </div>
        </div>

        {/* Reverse mode */}
        <div className="range-card" style={{marginTop:'.7rem'}}>
          <div className="kq-section-label">DIRECTION</div>
          <div style={{display:'flex',gap:'1rem',justifyContent:'center',marginBottom:'.6rem',flexWrap:'wrap'}}>
            <button className={'kq-ch-btn'+(!reverseMode?' kq-sel':'')} onClick={()=>setReverseMode(false)}
              style={{padding:'.7rem 1.6rem',minWidth:'160px',fontSize:'.88rem',lineHeight:1.4}}>
              → Word → Chapter
            </button>
            <button className={'kq-ch-btn'+(reverseMode?' kq-sel':'')} onClick={()=>setReverseMode(true)}
              style={{padding:'.7rem 1.6rem',minWidth:'160px',fontSize:'.88rem',lineHeight:1.4}}>
              ↩ Chapter → Word
            </button>
          </div>
          <div style={{textAlign:'center',fontSize:'.75rem',fontStyle:'italic',color:'var(--c-vmuted)',lineHeight:1.6}}>
            {reverseMode
              ? 'Given a chapter, pick the correct keyword/phrase from 4 choices'
              : 'Given a keyword/phrase, click the chapter it belongs to'}
          </div>
        </div>

        <div style={{textAlign:'center',marginBottom:'1rem',marginTop:'.8rem',fontSize:'.83rem',fontStyle:'italic',color:'var(--c-vmuted)'}}>
          You have {TIMER_MAX} seconds per question.
        </div>

        <div className="btn-row" style={{marginTop:0}}>
          <button className="btn btn-gold" disabled={selChs.size===0||poolSize===0} onClick={startQuiz}>
            Start Quiz
          </button>
        </div>

        <div className="footer-note" style={{marginTop:'2rem'}}>
          {phraseMode===null && 'Keywords appear in only one verse across the entire book of Acts'}
          {phraseMode==='2' && '2-word key phrases: unique across Acts, no word is itself a keyword'}
          {phraseMode==='3' && '3-word key phrases: unique across Acts, no word is itself a keyword'}
        </div>
      </div>
    );
  }

  /* ── RENDER: PLAYING ── */
  if(phase==='playing'){
    const current=pool[qIdx];
    const answered=picked!==null;
    const isTimeout=picked==='timeout';
    const isCorrect=!isTimeout&&answered&&(reverseMode ? picked===current.item : picked===current.ch);
    const correctCount=history.filter(h=>h.correct).length;
    const attempted=history.length;
    const pct=Math.round((timeLeft/TIMER_MAX)*100);
    const urgent=timeLeft<=5;
    const sortedChs=[...selChs].sort((a,b)=>a-b);

    // Stable reverse choices: only rebuilt when qIdx changes (uses top-level choicesRef)
    if(reverseMode && choicesRef.current.qIdx !== qIdx){
      const others=pool.filter((_,i)=>i!==qIdx&&_.ch!==current.ch);
      const shuffled=others.slice().sort(()=>Math.random()-.5);
      const distractors=shuffled.slice(0,3);
      choicesRef.current={qIdx, choices:[current,...distractors].sort(()=>Math.random()-.5)};
    }
    const choices = reverseMode ? choicesRef.current.choices : null;

    const modeLabel=phraseMode==='2'?'KEY PHRASE (2-WORD)':phraseMode==='3'?'KEY PHRASE (3-WORD)':'KEYWORD';

    // Verse ref helper
    function getVerseRef(item,ch){
      const srcMap=phraseMode?null:KEYWORD_TO_CHAPTER;
      if(phraseMode){
        const map=phraseMode==='2'?buildPhraseMap(2):buildPhraseMap(3);
        // find verse
        const entry=map[item];
        return entry?`Acts ${ch} · v.${entry.v}`:`Acts ${ch}`;
      }
      // keyword
      const verse=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.find(v=>
        v.t.split(/\s+/).some(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()===item)
      );
      return verse?`Acts ${ch} · v.${verse.v}`:`Acts ${ch}`;
    }

    return (
      <div className="kq-wrap">
        <div className="top-nav">
          <button className="kq-nav-btn" onClick={restart}>✕ Exit</button>
        </div>

        <div className="kq-title" style={{marginBottom:'.2rem'}}>Keywords Quiz</div>
        <div className="kq-subtitle" style={{marginBottom:'1rem'}}>
          Question {qIdx+1} of {pool.length}
          {reverseMode && <span style={{marginLeft:'.6rem',fontSize:'.72rem',opacity:.6}}>↩ reverse</span>}
          {phraseMode && <span style={{marginLeft:'.6rem',fontSize:'.72rem',opacity:.6}}>{phraseMode==='2'?'✦✦':'✦✦✦'} phrases</span>}
        </div>

        <div className="kq-card">
          <div className={'kq-progress-bar'+(urgent?' urgent':'')}
            style={{width:answered?'0%':pct+'%'}}/>

          <div className="kq-meta-row">
            <div className="kq-score-pill">Score: <span>{correctCount}</span> / {attempted}</div>
            <div className="kq-timer-wrap">
              <svg className="kq-timer-svg" width="28" height="28" viewBox="0 0 28 28">
                <circle cx="14" cy="14" r="11" fill="none" stroke="var(--c-border)" strokeWidth="2.5"/>
                <circle cx="14" cy="14" r="11" fill="none"
                  stroke={urgent?'#e05555':'var(--c-accent)'} strokeWidth="2.5" strokeLinecap="round"
                  strokeDasharray={`${2*Math.PI*11}`}
                  strokeDashoffset={`${2*Math.PI*11*(1-(answered?0:pct/100))}`}
                  transform="rotate(-90 14 14)"
                  style={{transition:answered?'none':'stroke-dashoffset .25s linear, stroke .3s'}}/>
              </svg>
              <span className={'kq-timer-num'+(urgent?' urgent':'')}>{answered?'–':timeLeft}</span>
            </div>
          </div>

          {reverseMode ? (
            <>
              <div className="kq-q-label">WHICH {modeLabel} BELONGS TO CHAPTER {current.ch}?</div>
              <div className="kq-word" style={{fontSize:'2.2rem',letterSpacing:'.12em',color:'var(--c-accent)'}}>{current.ch}</div>
              <div className="kq-verse-ref">
                {answered && getVerseRef(current.item, current.ch)}
              </div>
              <div className="kq-choices" style={{flexDirection:'column',gap:'.5rem',alignItems:'stretch',marginTop:'.8rem'}}>
                {choices && choices.map((c,i)=>{
                  let cls='kq-choice';
                  let extraStyle={textAlign:'left',padding:'.6rem 1rem',fontFamily:"'Crimson Pro',serif",fontSize:phraseMode?'.92rem':undefined,letterSpacing:phraseMode?'.01em':undefined};
                  if(answered){
                    if(c.item===current.item) cls+=' kq-reveal';
                    else if(c.item===picked&&!isCorrect) cls+=' kq-wrong';
                  }
                  return (
                    <button key={i} className={cls} style={extraStyle}
                      disabled={answered}
                      onClick={()=>!answered&&handleAnswer(c.item)}>
                      {c.item}
                      {answered && c.item===current.item && <span style={{float:'right',opacity:.6,fontSize:'.75rem'}}>Ch {c.ch}</span>}
                    </button>
                  );
                })}
              </div>
            </>
          ) : (
            <>
              <div className="kq-q-label">WHICH CHAPTER CONTAINS THIS {modeLabel}?</div>
              <div className="kq-word" style={phraseMode?{fontSize:'1.35rem',letterSpacing:'.04em',fontFamily:"'Crimson Pro',serif",fontStyle:'italic'}:{}}>
                {current.item}
              </div>
              <div className="kq-verse-ref">
                {answered && getVerseRef(current.item, current.ch)}
              </div>
              <div className="kq-choices">
                {sortedChs.map(ch=>{
                  let cls='kq-choice';
                  if(answered){
                    if(ch===current.ch) cls+=' kq-reveal';
                    else if(ch===picked&&!isCorrect) cls+=' kq-wrong';
                  }
                  return (
                    <button key={ch} className={cls} disabled={answered}
                      onClick={()=>!answered&&handleAnswer(ch)}>
                      Ch {ch}
                    </button>
                  );
                })}
              </div>
            </>
          )}

          <div className={'kq-feedback'+
            (answered?(isTimeout?' kq-fb-timeout':isCorrect?' kq-fb-correct':' kq-fb-wrong'):'')}>
            {answered
              ? isTimeout ? `Time's up — ${reverseMode?`"${current.item}"`:''} Chapter ${current.ch}`
                : isCorrect ? '✦ Correct!'
                : reverseMode ? `✗  "${current.item}" — Chapter ${current.ch}` : `✗  Chapter ${current.ch}`
              : <span style={{opacity:0}}>·</span>}
          </div>
        </div>

        {answered && (
          <div className="kq-next-row">
            <button className="btn btn-gold" onClick={advance}>
              {qIdx+1>=pool.length?'See Results':'Next →'}
            </button>
          </div>
        )}

        <div style={{textAlign:'center',fontSize:'.7rem',color:'var(--c-vmuted)',opacity:.55,marginTop:'.8rem',fontStyle:'italic'}}>
          {reverseMode ? 'Click the correct keyword/phrase · Esc to exit' : 'Type chapter number + Enter · Esc to exit'}
        </div>
      </div>
    );
  }

  /* ── RENDER: RESULTS ── */
  const correct=history.filter(h=>h.correct).length;
  const total=history.length;
  const pctScore=total>0?Math.round((correct/total)*100):0;
  const modeLabel=phraseMode==='2'?'2-word phrases':phraseMode==='3'?'3-word phrases':'keywords';

  return (
    <div className="kq-wrap">
      <div className="top-nav">
        <button className="kq-nav-btn" onClick={onBack}>← Memory Quiz</button>
      </div>

      <div className="kq-title">Keywords Quiz</div>
      <div className="kq-subtitle">Results</div>

      <div className="kq-results-card">
        <div className={'kq-results-pct'+(pctScore===100?' score perfect':pctScore>=70?' score good':' score low')}
          style={{color:pctScore===100?'#7ee09a':pctScore>=70?'var(--c-accent)':'#e8a0a0'}}>
          {pctScore}%
        </div>
        <div className="kq-results-label">
          {pctScore===100?'Perfect — every item placed correctly!':`${correct} of ${total} correct`}
        </div>
        <div className="kq-results-stats">
          <div className="kq-stat"><span className="kq-stat-num green">{correct}</span><span className="kq-stat-lbl">CORRECT</span></div>
          <div className="kq-stat"><span className="kq-stat-num red">{history.filter(h=>!h.correct&&!h.timedOut).length}</span><span className="kq-stat-lbl">WRONG</span></div>
          <div className="kq-stat"><span className="kq-stat-num" style={{color:'var(--c-vmuted)'}}>{history.filter(h=>h.timedOut).length}</span><span className="kq-stat-lbl">TIMED OUT</span></div>
        </div>

        {history.length>0 && (
          <div className="kq-history">
            {history.map((h,i)=>(
              <div key={i} className={'kq-history-row '+(h.correct?'h-ok':'h-bad')}>
                <span className="kq-h-word" style={phraseMode?{fontStyle:'italic',fontFamily:"'Crimson Pro',serif"}:{}}>{h.item}</span>
                <span className={'kq-h-info '+(h.correct?'ok':'bad')}>
                  {h.correct ? `Ch ${h.correctCh} ✓`
                    : h.timedOut ? `Ch ${h.correctCh} (timed out)`
                    : reverseMode ? `You: "${h.picked}" · Answer: "${h.correctItem}"`
                    : `You: Ch ${h.picked} · Answer: Ch ${h.correctCh}`}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="btn-row">
        <button className="btn btn-gold" onClick={restart}>Try Again</button>
      </div>
      <div className="footer-note" style={{marginTop:'1.5rem'}}>
        Quizzed on {modeLabel}{reverseMode?' (reverse mode)':''}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   CUSTOM VERSE PICKER
════════════════════════════════════════════ */
const STORAGE_KEY = 'wardify_custom_selection';

function loadSaved(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(Array.isArray(parsed) && parsed.length > 0) return new Set(parsed);
  } catch(e){}
  return null;
}

function CustomPicker({ onBack, onApply }){
  const allChapters = CHAPTERS_DATA.map(c => c.ch);
  const [openChs, setOpenChs] = React.useState(new Set());
  const [picked, setPicked] = React.useState(() => loadSaved() || new Set());
  const [saveFlash, setSaveFlash] = React.useState(false);

  // Which chapters have any picked verses
  function chHasPicked(ch){
    return CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.some(v=>picked.has(`${ch}-${v.v}`));
  }

  // Max 2 chapters open at once
  function toggleChapter(ch){
    setOpenChs(prev=>{
      const next = new Set(prev);
      if(next.has(ch)){
        next.delete(ch);
      } else {
        if(next.size >= 2){
          // close the oldest (first) one
          const first = [...next][0];
          next.delete(first);
        }
        next.add(ch);
      }
      return next;
    });
  }

  function toggleVerse(ch, v){
    const key = `${ch}-${v}`;
    setPicked(prev=>{
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  }

  function selectAllCh(ch){
    const verses = CHAPTERS_DATA.find(c=>c.ch===ch)?.verses || [];
    setPicked(prev=>{
      const next = new Set(prev);
      verses.forEach(v => next.add(`${ch}-${v.v}`));
      return next;
    });
  }

  function clearCh(ch){
    const verses = CHAPTERS_DATA.find(c=>c.ch===ch)?.verses || [];
    setPicked(prev=>{
      const next = new Set(prev);
      verses.forEach(v => next.delete(`${ch}-${v.v}`));
      return next;
    });
  }

  function saveSelection(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...picked]));
      setSaveFlash(true);
      setTimeout(()=>setSaveFlash(false), 1800);
    } catch(e){}
  }

  function applySelection(){
    // Build ordered verse array from CHAPTERS_DATA order
    const verses = [];
    CHAPTERS_DATA.forEach(cd=>{
      cd.verses.forEach(v=>{
        if(picked.has(`${cd.ch}-${v.v}`)) verses.push({ch:cd.ch, ...v});
      });
    });
    if(verses.length > 0) onApply(verses);
  }

  const totalPicked = picked.size;

  return (
    <div className="cp-page">
      <div className="top-nav-left" style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
        <button className="kq-nav-btn" onClick={onBack}>← Back</button>
      </div>

      <div style={{paddingTop:'3rem'}}>
        <div className="cp-title">Custom Selection</div>
        <div className="cp-subtitle">Choose up to 2 chapters · pick any verses you want</div>

        <div className="range-card" style={{marginBottom:'1.2rem'}}>
          <div className="range-label" style={{marginBottom:'.8rem'}}>SELECT CHAPTERS (UP TO 2)</div>
          <div className="cp-ch-grid">
            {allChapters.map(ch=>{
              const isOpen = openChs.has(ch);
              const hasPicked = chHasPicked(ch);
              return (
                <button key={ch}
                  className={'cp-ch-btn'+(isOpen?' cp-ch-open':hasPicked?' cp-ch-has':'')}
                  onClick={()=>toggleChapter(ch)}>
                  {ch}
                  {hasPicked && !isOpen && <span className="cp-ch-dot"/>}
                </button>
              );
            })}
          </div>
          {openChs.size===0 && (
            <div style={{textAlign:'center',fontStyle:'italic',fontSize:'.82rem',color:'var(--c-vmuted)'}}>
              Click a chapter number to expand its verses
            </div>
          )}
        </div>

        {[...openChs].sort((a,b)=>a-b).map(ch=>{
          const chData = CHAPTERS_DATA.find(c=>c.ch===ch);
          if(!chData) return null;
          return (
            <div key={ch} className="cp-verses-block">
              <div className="cp-verses-header">
                <span className="cp-verses-label">CHAPTER {ch}</span>
                <div className="cp-verses-actions">
                  <button className="cp-mini-btn" onClick={()=>selectAllCh(ch)}>All</button>
                  <button className="cp-mini-btn" onClick={()=>clearCh(ch)}>None</button>
                </div>
              </div>
              <div className="cp-verse-chips">
                {chData.verses.map(v=>{
                  const key = `${ch}-${v.v}`;
                  const on = picked.has(key);
                  return (
                    <button key={v.v} className={'cp-chip'+(on?' cp-chip-on':'')}
                      onClick={()=>toggleVerse(ch, v.v)}
                      title={v.t.substring(0,60)+'…'}>
                      {v.v}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Sticky footer */}
      <div className="cp-footer">
        <span className="cp-count-label">
          <span>{totalPicked}</span> verse{totalPicked!==1?'s':''} selected
        </span>
        <button className="btn btn-ghost" style={{fontSize:'.72rem',padding:'.42rem 1.1rem'}}
          onClick={saveSelection}>
          {saveFlash ? '✓ Saved!' : '💾 Save Selection'}
        </button>
        <button className="btn btn-gold" style={{fontSize:'.72rem',padding:'.42rem 1.3rem'}}
          disabled={totalPicked===0}
          onClick={applySelection}>
          Use These Verses →
        </button>
      </div>
    </div>
  );
}
