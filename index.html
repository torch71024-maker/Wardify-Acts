            </div>
            {feedbackState==='correct'&&(
              <div style={{marginTop:'.45rem',fontFamily:'Cinzel,serif',fontSize:'.8rem',color:'rgba(80,230,120,0.9)'}}>✓ Correct!</div>
            )}
            {feedbackWrong&&(
              <div style={{marginTop:'.45rem',fontFamily:'Cinzel,serif',fontSize:'.8rem',color:'rgba(230,80,80,0.9)'}}>
                {timedOut?'⏱ Time\'s up! ':'✗ '}{timedOut?'The odd one was from Ch.':'That belonged to Ch.'} {wrongCh}
              </div>
            )}
          </div>

          {/* Choices */}
          <div style={{display:'flex',flexDirection:'column',gap:'.55rem'}}>
            {choices.map((choice,i)=>{
              const isChosen=chosen===i;
              const revealed=chosen!==null;
              const isOdd=choice.isOdd;
              let bg,border,color;
              if(!revealed){
                bg='rgba(10,6,6,0.82)'; border='rgba(160,40,40,0.3)'; color='rgba(220,160,160,0.85)';
              } else if(isOdd&&isChosen){
                bg='rgba(20,120,50,0.28)'; border='rgba(50,220,100,0.65)'; color='rgba(120,240,160,0.95)';
              } else if(isOdd){
                bg='rgba(20,120,50,0.15)'; border='rgba(50,200,90,0.4)'; color='rgba(100,220,140,0.7)';
              } else if(!isOdd&&isChosen){
                bg='rgba(140,20,20,0.28)'; border='rgba(220,50,50,0.65)'; color='rgba(240,100,100,0.9)';
              } else {
                bg='rgba(8,5,5,0.55)'; border='rgba(100,25,25,0.2)'; color='rgba(160,80,80,0.38)';
              }
              return (
                <button key={i} onClick={()=>handleChoice(i)} disabled={chosen!==null}
                  style={{fontFamily:"'Crimson Pro',serif",fontSize:'1rem',lineHeight:1.5,
                    padding:'.78rem 1.1rem',borderRadius:10,border:`1px solid ${border}`,
                    background:bg,color,cursor:chosen===null?'pointer':'default',
                    textAlign:'left',transition:'all .2s',
                    display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.5rem',
                    wordBreak:'break-word'}}>
                  <span style={{flex:1}}>{mode==='keywords'?choice.text:choice.text.length>120?choice.text.slice(0,117)+'…':choice.text}</span>
                  {revealed&&isOdd&&<span style={{fontSize:'1.1rem',flexShrink:0}}>✓</span>}
                  {revealed&&!isOdd&&isChosen&&<span style={{fontSize:'1.1rem',flexShrink:0}}>✗</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  /* ── RESULTS ── */
  const pct=total>0?Math.round((score/total)*100):0;
  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:3,maxWidth:580,margin:'0 auto',padding:'1rem 1rem 5rem',fontFamily:"'Crimson Pro',serif"}}>
        <div style={{paddingTop:'3rem',textAlign:'center',marginBottom:'1.4rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'1.35rem',letterSpacing:'.08em',color:'rgba(220,80,80,0.9)'}}>
            {hearts>0?'Round Complete':'Game Over'}
          </div>
        </div>
        <div style={{...dc,padding:'1.4rem',textAlign:'center',marginBottom:'1.2rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'2.8rem',color:pct>=80?'rgba(70,220,120,0.9)':pct>=50?'rgba(210,170,40,0.9)':'rgba(210,60,60,0.85)',marginBottom:'.25rem'}}>{pct}%</div>
          <div style={{fontSize:'.88rem',color:'rgba(180,70,70,0.55)'}}>{score} of {total} correct</div>
          <div style={{marginTop:'.7rem',display:'flex',gap:'.35rem',justifyContent:'center'}}>
            {[0,1,2].map(i=><span key={i} style={{fontSize:'1.3rem',filter:i<hearts?'none':'grayscale(1) brightness(0.4)'}}>❤️</span>)}
          </div>
        </div>
        <div style={{display:'flex',gap:'.8rem',justifyContent:'center',flexWrap:'wrap'}}>
          <button onClick={startGame} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.6rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#8c1a1a,#5c0e0e)',color:'rgba(240,140,140,0.9)',cursor:'pointer',boxShadow:'0 4px 18px rgba(160,20,20,0.35)'}}>Play Again</button>
          <button onClick={()=>setPhase('setup')} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.3rem',borderRadius:9,border:'1px solid rgba(140,30,30,0.4)',background:'rgba(10,6,6,0.88)',color:'rgba(180,70,70,0.55)',cursor:'pointer'}}>Change Setup</button>
          <button onClick={onBack} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.2rem',borderRadius:9,border:'1px solid rgba(120,25,25,0.3)',background:'rgba(10,6,6,0.88)',color:'rgba(150,60,60,0.45)',cursor:'pointer'}}>← Back</button>
        </div>
      </div>
    </div>
  );
}

function useSectionLocatorBg(canvasRef){
  React.useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    c.width=window.innerWidth;c.height=window.innerHeight;
    let cleanup=window.bgForestGrid?window.bgForestGrid(c):null;
    function onRes(){c.width=window.innerWidth;c.height=window.innerHeight;}
    window.addEventListener('resize',onRes);
    return()=>{if(cleanup)cleanup();window.removeEventListener('resize',onRes);};
  },[]);
}

function SectionLocatorPage({ onBack }){
  const canvasRef=React.useRef(null);
  useSectionLocatorBg(canvasRef);
  React.useEffect(()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(true); return()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(false); }; },[]);

  const allChapters=CHAPTERS_DATA.map(c=>c.ch);

  /* ── Setup state ── */
  const [phase,setPhase]=React.useState('setup');
  const [selChs,setSelChs]=React.useState(new Set([1,2,3,4,5,6]));
  const [direction,setDirection]=React.useState('heading->chapter'); // or 'chapter->heading'

  /* ── Quiz state ── */
  const [questions,setQuestions]=React.useState([]);
  const [qIdx,setQIdx]=React.useState(0);
  const [chosen,setChosen]=React.useState(null);
  const [history,setHistory]=React.useState([]);
  const [shake,setShake]=React.useState(false);

  /* ── helpers ── */
  const dc={background:'rgba(5,20,14,0.88)',border:'1px solid rgba(80,190,140,0.22)',borderRadius:14,backdropFilter:'blur(10px)'};
  const acc='rgba(100,220,160,0.85)';
  const accDim='rgba(80,180,130,0.45)';
  const btnBase={fontFamily:'Cinzel,serif',fontSize:'.74rem',padding:'.48rem .95rem',borderRadius:8,cursor:'pointer',transition:'all .15s',border:'1px solid'};

  function shuffleArr(arr){ return arr.slice().sort(()=>Math.random()-.5); }

  function buildQuestions(){
    const chs=[...selChs].sort((a,b)=>a-b);
    // gather all (chapter, heading) pairs
    const pairs=[];
    chs.forEach(ch=>{
      (CHAPTER_SECTIONS[ch]||[]).forEach(sec=>pairs.push({ch,heading:sec.heading}));
    });
    if(pairs.length<4) return null;
    const shuffled=shuffleArr(pairs);
    return shuffled.map(pair=>{
      if(direction==='heading->chapter'){
        // prompt=heading, answer=chapter, distractors=other chapters
        const otherChs=chs.filter(c=>c!==pair.ch);
        const wrong=shuffleArr(otherChs).slice(0,3);
        const choices=shuffleArr([pair.ch,...wrong]);
        return {prompt:pair.heading,promptLabel:'Section Heading',answer:pair.ch,choices,displayFn:c=>`Chapter ${c}`};
      } else {
        // prompt=chapter, answer=heading, distractors=other headings from other chapters
        const otherHeadings=pairs.filter(p=>p.ch!==pair.ch).map(p=>p.heading);
        const wrong=shuffleArr(otherHeadings).slice(0,3);
        const choices=shuffleArr([pair.heading,...wrong]);
        return {prompt:`Chapter ${pair.ch}`,promptLabel:'Chapter',answer:pair.heading,choices,displayFn:h=>h};
      }
    });
  }

  function startGame(){
    const qs=buildQuestions();
    if(!qs||qs.length<1) return;
    setQuestions(qs);
    setQIdx(0);
    setChosen(null);
    setHistory([]);
    setPhase('playing');
  }

  function handleChoice(choice){
    if(chosen!==null) return;
    const q=questions[qIdx];
    const correct=choice===q.answer;
    setChosen(choice);
    if(!correct){ setShake(true); setTimeout(()=>setShake(false),500); }
    setTimeout(()=>{
      setHistory(h=>[...h,{prompt:q.prompt,answer:q.answer,chosen:choice,correct}]);
      const next=qIdx+1;
      if(next>=questions.length){ setPhase('results'); }
      else{ setQIdx(next); setChosen(null); }
    }, correct?700:1100);
  }

  /* ── SETUP ── */
  if(phase==='setup'){
    const chs=[...selChs];
    const totalSections=chs.reduce((s,ch)=>(s+(CHAPTER_SECTIONS[ch]||[]).length),0);
    const enough=totalSections>=4;
    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,maxWidth:640,margin:'0 auto',padding:'1rem 1rem 6rem',fontFamily:"'Crimson Pro',serif"}}>
          <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
            <button className="kq-nav-btn" onClick={onBack}>← Back</button>
          </div>
          <div style={{paddingTop:'3.5rem',textAlign:'center',marginBottom:'1.5rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'1.5rem',letterSpacing:'.08em',color:'rgba(140,230,180,0.9)',marginBottom:'.3rem'}}>Section Locator</div>
            <div style={{fontStyle:'italic',fontSize:'.85rem',color:'rgba(90,185,130,0.45)'}}>Match headings to chapters — or chapters to headings</div>
          </div>

          {/* Chapter selection */}
          <div style={{...dc,padding:'1rem 1.1rem',marginBottom:'.8rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.55rem',letterSpacing:'.14em',color:'rgba(80,190,140,0.4)',marginBottom:'.65rem'}}>CHAPTERS TO INCLUDE</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'.38rem',justifyContent:'center',marginBottom:'.55rem'}}>
              {allChapters.map(ch=>{
                const on=selChs.has(ch);
                const scount=(CHAPTER_SECTIONS[ch]||[]).length;
                return (
                  <button key={ch} onClick={()=>setSelChs(p=>{const n=new Set(p);n.has(ch)?n.delete(ch):n.add(ch);return n;})}
                    title={`${scount} section${scount!==1?'s':''}`}
                    style={{fontFamily:'Cinzel,serif',fontSize:'.68rem',width:'2.5rem',height:'2.5rem',borderRadius:7,position:'relative',
                      border:`1px solid ${on?'rgba(80,210,145,0.65)':'rgba(50,140,90,0.22)'}`,
                      background:on?'rgba(30,140,80,0.2)':'rgba(5,18,12,0.7)',
                      color:on?'rgba(130,230,170,0.9)':'rgba(60,140,90,0.35)',cursor:'pointer',transition:'all .14s'}}>
                    {ch}
                  </button>
                );
              })}
            </div>
            <div style={{display:'flex',gap:'.45rem',justifyContent:'center'}}>
              <button onClick={()=>setSelChs(new Set(allChapters))} style={{...btnBase,borderColor:'rgba(50,140,90,0.28)',background:'rgba(5,18,12,0.6)',color:'rgba(80,190,130,0.4)'}}>All</button>
              <button onClick={()=>setSelChs(new Set())} style={{...btnBase,borderColor:'rgba(50,140,90,0.28)',background:'rgba(5,18,12,0.6)',color:'rgba(80,190,130,0.4)'}}>None</button>
            </div>
            <div style={{textAlign:'center',marginTop:'.55rem',fontFamily:'Cinzel,serif',fontSize:'.58rem',color:enough?'rgba(80,190,130,0.42)':'rgba(210,90,60,0.7)'}}>
              {totalSections} section{totalSections!==1?'s':''}{!enough?' — need at least 4 sections':''}
            </div>
          </div>

          {/* Direction */}
          <div style={{...dc,padding:'1rem 1.1rem',marginBottom:'1.2rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.55rem',letterSpacing:'.14em',color:'rgba(80,190,140,0.4)',marginBottom:'.65rem'}}>DIRECTION</div>
            <div style={{display:'flex',gap:'.55rem',justifyContent:'center',flexWrap:'wrap'}}>
              {[
                {val:'heading->chapter',label:'Heading → Chapter',desc:'See a section heading, pick the chapter'},
                {val:'chapter->heading',label:'Chapter → Heading',desc:'See a chapter number, pick the right heading'},
              ].map(opt=>{
                const on=direction===opt.val;
                return (
                  <button key={opt.val} onClick={()=>setDirection(opt.val)}
                    style={{...btnBase,flex:'1 1 180px',minWidth:180,flexDirection:'column',display:'flex',alignItems:'center',gap:'.25rem',padding:'.65rem .9rem',
                      borderColor:on?'rgba(80,210,145,0.65)':'rgba(50,140,90,0.22)',
                      background:on?'rgba(30,140,80,0.2)':'rgba(5,18,12,0.6)',
                      color:on?'rgba(130,230,170,0.9)':'rgba(60,140,90,0.38)'}}>
                    <span style={{fontFamily:'Cinzel,serif',fontSize:'.74rem',letterSpacing:'.04em'}}>{opt.label}</span>
                    <span style={{fontFamily:"'Crimson Pro',serif",fontSize:'.78rem',fontStyle:'italic',color:on?'rgba(100,210,155,0.55)':'rgba(50,120,75,0.35)'}}>{opt.desc}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{textAlign:'center'}}>
            <button onClick={startGame} disabled={!enough}
              style={{fontFamily:'Cinzel,serif',fontSize:'.9rem',letterSpacing:'.06em',padding:'.72rem 2.2rem',borderRadius:10,border:'none',
                background:enough?'linear-gradient(135deg,#1a6640,#0d4429)':'rgba(10,40,20,0.38)',
                color:enough?'rgba(140,240,180,0.9)':'rgba(50,120,75,0.35)',cursor:enough?'pointer':'default',
                boxShadow:enough?'0 4px 22px rgba(20,140,70,0.35)':'none',transition:'all .2s'}}>
              Begin
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ── PLAYING ── */
  if(phase==='playing'){
    const q=questions[qIdx];
    const prog=qIdx+1;
    const total=questions.length;
    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,maxWidth:600,margin:'0 auto',padding:'1rem 1rem 4rem',fontFamily:"'Crimson Pro',serif"}}>
          {/* Nav */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:'.5rem'}}>
            <button className="kq-nav-btn" onClick={()=>setPhase('setup')}>✕ Exit</button>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.62rem',color:'rgba(80,190,130,0.5)',textAlign:'center'}}>
              {prog} / {total}
              <div style={{color:'rgba(60,200,110,0.6)'}}>{history.filter(h=>h.correct).length} correct</div>
            </div>
            <div style={{width:56}}/>
          </div>

          {/* Progress bar */}
          <div style={{height:3,borderRadius:2,background:'rgba(30,80,50,0.4)',marginBottom:'1.4rem',overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:2,background:'linear-gradient(90deg,#1a7a40,#2fb870)',width:`${(prog/total)*100}%`,transition:'width .4s'}}/>
          </div>

          {/* Prompt */}
          <div style={{...dc,padding:'1.4rem 1.2rem',marginBottom:'1.1rem',textAlign:'center'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.52rem',letterSpacing:'.16em',color:'rgba(80,190,140,0.38)',marginBottom:'.55rem'}}>{q.promptLabel}</div>
            <div style={{fontFamily:"'Crimson Pro',serif",fontSize:'1.18rem',lineHeight:1.5,color:'rgba(190,245,215,0.88)',fontStyle:'italic'}}>{q.prompt}</div>
          </div>

          {/* Choices */}
          <div style={{display:'flex',flexDirection:'column',gap:'.55rem',
            animation:shake?'slShake .45s ease':'none'}}>
            <style>{`@keyframes slShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}`}</style>
            {q.choices.map((choice,i)=>{
              const isChosen=chosen===choice;
              const isCorrect=choice===q.answer;
              const revealed=chosen!==null;
              let bg,border,color;
              if(!revealed){
                bg='rgba(5,22,14,0.75)'; border='rgba(60,160,100,0.28)'; color='rgba(150,230,185,0.8)';
              } else if(isCorrect){
                bg='rgba(20,120,55,0.28)'; border='rgba(50,220,110,0.65)'; color='rgba(120,240,165,0.95)';
              } else if(isChosen){
                bg='rgba(140,25,25,0.28)'; border='rgba(220,60,60,0.55)'; color='rgba(240,110,110,0.9)';
              } else {
                bg='rgba(5,18,12,0.4)'; border='rgba(40,100,65,0.18)'; color='rgba(80,160,110,0.35)';
              }
              return (
                <button key={i} onClick={()=>handleChoice(choice)} disabled={chosen!==null}
                  style={{fontFamily:"'Crimson Pro',serif",fontSize:'1.02rem',lineHeight:1.45,
                    padding:'.78rem 1.1rem',borderRadius:10,border:`1px solid ${border}`,
                    background:bg,color,cursor:chosen===null?'pointer':'default',
                    textAlign:'left',transition:'all .2s',
                    display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.5rem'}}>
                  <span>{q.displayFn(choice)}</span>
                  {revealed&&isCorrect&&<span style={{fontSize:'1.1rem'}}>✓</span>}
                  {revealed&&isChosen&&!isCorrect&&<span style={{fontSize:'1.1rem'}}>✗</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  /* ── RESULTS ── */
  const correct=history.filter(h=>h.correct).length;
  const pct=history.length>0?Math.round((correct/history.length)*100):0;
  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:3,maxWidth:600,margin:'0 auto',padding:'1rem 1rem 5rem',fontFamily:"'Crimson Pro',serif"}}>
        <div style={{paddingTop:'3rem',textAlign:'center',marginBottom:'1.4rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'1.35rem',letterSpacing:'.08em',color:'rgba(140,230,180,0.9)'}}>Results</div>
        </div>
        <div style={{...dc,padding:'1.4rem',textAlign:'center',marginBottom:'1rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'2.8rem',color:pct>=80?'rgba(70,220,120,0.9)':pct>=50?'rgba(210,170,40,0.9)':'rgba(210,60,60,0.85)',marginBottom:'.25rem'}}>{pct}%</div>
          <div style={{fontSize:'.88rem',color:'rgba(90,190,130,0.55)'}}>{correct} of {history.length} correct</div>
        </div>

        {/* Review */}
        <div style={{...dc,padding:'.85rem 1rem',marginBottom:'1.2rem',maxHeight:'45vh',overflowY:'auto'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'.52rem',letterSpacing:'.14em',color:'rgba(70,180,120,0.38)',marginBottom:'.55rem'}}>REVIEW</div>
          {history.map((h,i)=>(
            <div key={i} style={{borderBottom:'1px solid rgba(40,100,65,0.18)',paddingBottom:'.55rem',marginBottom:'.55rem',lastChild:{border:'none'}}}>
              <div style={{fontSize:'.78rem',color:'rgba(100,190,140,0.55)',marginBottom:'.18rem',fontStyle:'italic'}}>{h.prompt}</div>
              <div style={{display:'flex',alignItems:'center',gap:'.45rem',flexWrap:'wrap'}}>
                <span style={{fontSize:'.88rem',color:h.correct?'rgba(70,220,120,0.85)':'rgba(210,60,60,0.85)'}}>{h.correct?'✓':'✗'}</span>
                {!h.correct&&<span style={{fontSize:'.82rem',color:'rgba(210,80,80,0.7)',textDecoration:'line-through'}}>{h.chosen}</span>}
                <span style={{fontSize:'.88rem',color:'rgba(130,240,170,0.8)'}}>{h.answer}</span>
              </div>
            </div>
          ))}
        </div>

        <div style={{display:'flex',gap:'.8rem',justifyContent:'center'}}>
          <button onClick={()=>{ startGame(); }} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.6rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#1a6640,#0d4429)',color:'rgba(140,240,180,0.9)',cursor:'pointer',boxShadow:'0 4px 18px rgba(20,140,70,0.3)'}}>Again</button>
          <button onClick={()=>setPhase('setup')} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.4rem',borderRadius:9,border:'1px solid rgba(50,140,90,0.38)',background:'rgba(5,20,14,0.88)',color:'rgba(90,190,130,0.55)',cursor:'pointer'}}>Change Setup</button>
          <button onClick={onBack} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.2rem',borderRadius:9,border:'1px solid rgba(50,140,90,0.28)',background:'rgba(5,20,14,0.88)',color:'rgba(70,160,105,0.45)',cursor:'pointer'}}>← Back</button>
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════════
   SITUATION QUOTATIONS PAGE
   ═══════════════════════════════════════════════════════════ */
function SituationQuotationsPage({ onBack }){
  const [selChs, setSelChs] = useState(new Set([1]));
  const [phase, setPhase] = useState('setup');    // 'setup' | 'browse'
  const [quotations, setQuotations] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);

  React.useEffect(()=>{
    if(window.BgMgr) window.BgMgr.setSituationMode(true);
    return ()=>{ if(window.BgMgr) window.BgMgr.setSituationMode(false); };
  },[]);

  // ── Verb list for speaker detection ──
  const SPEECH_VERBS = /\b(said|replied|answered|declared|told|asked|cried|called|shouted|responded|testified|confessed|stated|urged|insisted|exclaimed|warned|commanded|ordered|added|pleaded|demanded|questioned|announced|spoke up|cried out)\b/i;

  // ── Parse a verse text into alternating [narration, quote, narration, quote…] segments ──
  // Returns array of {type:'narr'|'quote', text}
  function parseSegments(text){
    const segs = [];
    const re = /\"([^\"]*)\"/g;
    let last = 0, m;
    while((m = re.exec(text)) !== null){
      if(m.index > last) segs.push({type:'narr', text: text.slice(last, m.index)});
      segs.push({type:'quote', text: m[1]});
      last = m.index + m[0].length;
    }
    if(last < text.length) segs.push({type:'narr', text: text.slice(last)});
    return segs;
  }

  // ── Extract one quotation per verse (first speaker's run only) ──
  // A "run" = one or more consecutive quoted segments that belong to the SAME speaker
  // (i.e. not interrupted by a narration containing a speech verb for a different person).
  // Returns array of { speaker, context, fullQuote, ref, ch, v }
  function extractQuotations(ch, verse){
    const text = verse.t;
    const segs = parseSegments(text);
    const quoteSegs = segs.filter(s=>s.type==='quote');
    if(quoteSegs.length === 0) return [];

    // Must have at least one speech verb anywhere in the verse
    if(!SPEECH_VERBS.test(text)) return [];

    // Identify the first speaker from the narration BEFORE the first quote
    const narrBefore = segs.filter((s,i)=>s.type==='narr' && i < segs.indexOf(segs.find(s=>s.type==='quote'))).map(s=>s.text).join(' ');
    if(!SPEECH_VERBS.test(narrBefore) && !SPEECH_VERBS.test(text.split('"')[0]||'')) {
      // No attribution before first quote — skip
      // (handles cases like scripture being "quoted" but no speaker verb)
      if(!SPEECH_VERBS.test(text)) return [];
    }

    // Walk segments and collect the first speaker's contiguous quoted run.
    // A new speech verb in a narration segment between two quotes signals a speaker change.
    let firstQuoteIdx = segs.findIndex(s=>s.type==='quote');
    if(firstQuoteIdx < 0) return [];

    // Speaker name: pull from narration before firstQuote
    let speakerRaw = segs.slice(0, firstQuoteIdx).map(s=>s.text).join(' ');
    let speaker = extractSpeakerName(speakerRaw);

    // Collect first speaker's run: include subsequent quoted segments only if the
    // narration between them does NOT introduce a *new* speaker.
    // An inline attribution like `"Sir," she said, "…"` has a speech verb but no
    // sentence-ending punctuation — that's the same speaker continuing, not a new one.
    const runQuotes = [segs[firstQuoteIdx].text];
    for(let i = firstQuoteIdx + 1; i < segs.length; i++){
      const seg = segs[i];
      if(seg.type === 'narr'){
        if(SPEECH_VERBS.test(seg.text)){
          // Only stop if there's sentence-ending punctuation (real new speaker).
          // A narration like ` the woman said, ` has no `.!?` → same speaker, keep going.
          if(/[.!?]/.test(seg.text)) break;
        }
        // No speech verb, or inline attribution without sentence end → continue
      } else {
        runQuotes.push(seg.text);
      }
    }

    // Build fullQuote: join, strip inner parenthetical asides, clean up
    const fullQuote = runQuotes
      .map(q => q
        .replace(/\s*\([^)]+\)\s*/g, ' ')
        .trim()
      )
      .join(' ')
      .replace(/\s+/g,' ')
      .trim();

    if(fullQuote.length < 4) return [];
    // Skip quotes that are fewer than 5 words — too short to be a meaningful spoken quote
    if(fullQuote.split(/\s+/).filter(Boolean).length < 5) return [];

    return [{
      speaker,
      context: text,
      fullQuote,
      ref: `Acts ${ch}:${verse.v}`,
      ch,
      v: verse.v,
    }];
  }

  function extractSpeakerName(narrText){
    if(!narrText || !narrText.trim()) return 'A voice';
    // Strip leading connectors
    let s = narrText
      .replace(/^(Then|And|But|So|Now|Finally|Meanwhile|Again|Later|After this,?|When [^,]+,|In reply,?|At this,?|To this,?|To them,?|To him,?|To her,?|Once more,?)\s+/i, '')
      .trim();
    // Pull up to the verb
    const vm = s.match(/^(.*?)(?:said|replied|answered|declared|told|asked|cried|called|responded|testified|confessed|stated|urged|exclaimed|warned|commanded|ordered|added|pleaded|demanded|announced|spoke up|cried out)\b/i);
    if(!vm) return 'A voice';
    let name = vm[1]
      .replace(/,\s*$/, '')
      .replace(/\s+/g,' ')
      .trim();
    if(!name || name.length < 2) return 'A voice';
    // Clean up long narration fragments
    if(name.split(' ').length > 6) name = name.split(' ').slice(0,4).join(' ');
    return name;
  }

  // ── Build all quotations from selected chapters ──
  function buildQuotations(chapters){
    // First: extract ALL quotes from the entire book for uniqueness computation
    const allQuotes = [];
    CHAPTERS_DATA.forEach(cd=>{
      cd.verses.forEach(v=>{
        extractQuotations(cd.ch, v).forEach(q=>allQuotes.push(q));
      });
    });

    // Now extract from selected chapters and attach uniquePoint
    // Use ch+v identity for index lookup so each quote is excluded from its own uniqueness check
    const results = [];
    CHAPTERS_DATA.forEach(cd=>{
      if(!chapters.has(cd.ch)) return;
      cd.verses.forEach(v=>{
        extractQuotations(cd.ch, v).forEach(q=>{
          // Find this quote's index in allQuotes by matching ch and v
          const idx = allQuotes.findIndex(aq => aq.ch === q.ch && aq.v === q.v);
          results.push({...q, uniquePoint: computeUniquePoint(q.fullQuote, allQuotes, idx)});
        });
      });
    });
    // Shuffle for randomised order
    for(let i = results.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [results[i], results[j]] = [results[j], results[i]];
    }
    return results;
  }

  // ── Unique point: shortest word-prefix of this quote not shared by any other ──
  // Uses index-based exclusion so two quotes with the same text are still treated separately.
  function computeUniquePoint(quote, allQuotes, selfIdx){
    const normalize = s => s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
    const nQuote = normalize(quote);
    const words = nQuote.split(' ');
    // Exclude only the exact entry at selfIdx (not all entries with the same text)
    const others = allQuotes
      .filter((_, i) => i !== selfIdx)
      .map(q => normalize(q.fullQuote));
    // For prefix checking, add a trailing space so "sir" doesn't match "sirius"
    for(let len = 1; len <= words.length; len++){
      const prefix = words.slice(0, len).join(' ');
      if(!others.some(o => o === prefix || o.startsWith(prefix + ' '))) {
        // Return with original casing preserved
        const origWords = quote.split(/\s+/);
        return origWords.slice(0, len).join(' ');
      }
    }
    return quote;
  }

  const allChapters = CHAPTERS_DATA.map(cd=>cd.ch);

  function startBrowse(){
    const qs = buildQuotations(selChs);
    if(qs.length === 0) return;
    setQuotations(qs);
    setQIdx(0);
    setRevealed(false);
    setPhase('browse');
  }

  // Count quotes quickly for setup screen
  function countQuotes(chapters){
    let n = 0;
    CHAPTERS_DATA.forEach(cd=>{
      if(!chapters.has(cd.ch)) return;
      cd.verses.forEach(v=>{ n += extractQuotations(cd.ch,v).length; });
    });
    return n;
  }

  const sqCard = {
    background:'rgba(0,0,0,0.35)',
    border:'1px solid rgba(0,0,0,0.45)',
    borderRadius:14,
    padding:'1.4rem 1.6rem',
    backdropFilter:'blur(6px)',
    marginBottom:'1rem',
  };
  const sqLabel = {
    fontFamily:"'Cinzel',serif",
    fontSize:'.58rem',
    letterSpacing:'.15em',
    color:'rgba(0,0,0,0.55)',
    marginBottom:'.5rem',
  };
  const sqBtn = {
    fontFamily:"'Cinzel',serif",
    fontSize:'.78rem',
    letterSpacing:'.07em',
    padding:'.58rem 1.6rem',
    borderRadius:8,
    border:'none',
    cursor:'pointer',
    transition:'all .18s',
    background:'rgba(0,0,0,0.55)',
    color:'#f5e8a0',
    fontWeight:600,
  };
  const sqBtnGhost = {
    ...sqBtn,
    background:'rgba(0,0,0,0.25)',
    color:'rgba(0,0,0,0.55)',
    border:'1px solid rgba(0,0,0,0.25)',
  };

  /* ── SETUP ── */
  if(phase === 'setup'){
    const total = countQuotes(selChs);
    return (
      <div style={{minHeight:'100vh',position:'relative'}}>
        <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
          <button className="kq-nav-btn" onClick={onBack} style={{background:'rgba(0,0,0,0.55)',color:'#f5e8a0',borderColor:'rgba(0,0,0,0.4)'}}>← Back</button>
        </div>
        <div style={{maxWidth:640,margin:'0 auto',padding:'5rem 1rem 4rem',fontFamily:"'Crimson Pro',serif"}}>
          <div style={{textAlign:'center',marginBottom:'2rem'}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:'clamp(1.3rem,4vw,2rem)',fontWeight:600,letterSpacing:'.08em',color:'rgba(0,0,0,0.75)',textShadow:'0 1px 0 rgba(255,255,255,0.25)',marginBottom:'.3rem'}}>
              Situation Quotations
            </div>
            <div style={{fontStyle:'italic',fontSize:'.9rem',color:'rgba(0,0,0,0.5)',background:'rgba(0,0,0,0.15)',display:'inline-block',padding:'.2rem .8rem',borderRadius:20}}>
              What was the unique start of each spoken word?
            </div>
          </div>

          <div style={{...sqCard,marginBottom:'1rem'}}>
            <div style={sqLabel}>SELECT CHAPTERS</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'.4rem',justifyContent:'center',marginBottom:'.8rem'}}>
              {allChapters.map(ch=>{
                const on=selChs.has(ch);
                return (
                  <button key={ch} onClick={()=>setSelChs(p=>{const n=new Set(p); n.has(ch)?n.delete(ch):n.add(ch); return n;})}
                    style={{fontFamily:"'Cinzel',serif",fontSize:'.72rem',width:'2.5rem',height:'2.5rem',borderRadius:8,
                      border:`1px solid ${on?'rgba(0,0,0,0.6)':'rgba(0,0,0,0.25)'}`,
                      background:on?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.2)',
                      color:on?'#f5e8a0':'rgba(0,0,0,0.5)',cursor:'pointer',transition:'all .14s'}}>
                    {ch}
                  </button>
                );
              })}
            </div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'center',marginBottom:'.6rem'}}>
              <button onClick={()=>setSelChs(new Set(allChapters))} style={{...sqBtnGhost,fontSize:'.68rem',padding:'.3rem .9rem'}}>All</button>
              <button onClick={()=>setSelChs(new Set())} style={{...sqBtnGhost,fontSize:'.68rem',padding:'.3rem .9rem'}}>None</button>
            </div>
            <div style={{textAlign:'center',fontFamily:"'Cinzel',serif",fontSize:'.62rem',color:'rgba(0,0,0,0.45)'}}>
              {total} quotation{total!==1?'s':''} in selected chapters
            </div>
          </div>

          <div style={{textAlign:'center',marginTop:'1.4rem'}}>
            <button onClick={startBrowse} disabled={selChs.size===0||total===0}
              style={{...sqBtn,fontSize:'.9rem',padding:'.72rem 2.4rem',
                background:'rgba(0,0,0,0.6)',
                opacity:selChs.size===0||total===0?.4:1,
                cursor:selChs.size===0||total===0?'default':'pointer',
                boxShadow:'0 4px 20px rgba(0,0,0,0.25)'}}>
              Begin
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ── BROWSE ── */
  const q = quotations[qIdx];
  if(!q) return null;

  return (
    <div style={{minHeight:'100vh',position:'relative'}}>
      <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
        <button className="kq-nav-btn" onClick={()=>{setPhase('setup');setRevealed(false);}}
          style={{background:'rgba(0,0,0,0.55)',color:'#f5e8a0',borderColor:'rgba(0,0,0,0.4)'}}>← Back</button>
      </div>
      <div style={{position:'fixed',top:'1.1rem',right:'1rem',zIndex:60,
        fontFamily:"'Cinzel',serif",fontSize:'.7rem',color:'rgba(0,0,0,0.55)',
        background:'rgba(0,0,0,0.2)',padding:'.3rem .8rem',borderRadius:20}}>
        {qIdx+1} / {quotations.length}
      </div>

      <div style={{maxWidth:640,margin:'0 auto',padding:'5rem 1rem 4rem',fontFamily:"'Crimson Pro',serif"}}>
        <div style={{textAlign:'center',marginBottom:'1.6rem'}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:'1.5rem',fontWeight:600,letterSpacing:'.08em',color:'rgba(0,0,0,0.72)',textShadow:'0 1px 0 rgba(255,255,255,0.2)'}}>
            Situation Quotations
          </div>
        </div>

        {/* Unique Point only — no speaker, no ref */}
        <div style={sqCard}>
          <div style={sqLabel}>UNIQUE POINT OF QUOTE</div>
          <div style={{fontSize:'1.3rem',lineHeight:1.65,fontWeight:700,color:'rgba(0,0,0,0.88)'}}>
            {q.uniquePoint}
          </div>
          <div style={{fontSize:'1.15rem',color:'rgba(0,0,0,0.32)',marginTop:'.35rem',letterSpacing:'.05em'}}>
            …
          </div>
        </div>

        {/* Show Answer / revealed */}
        {!revealed ? (
          <div style={{textAlign:'center',marginBottom:'1rem'}}>
            <button onClick={()=>setRevealed(true)} style={{...sqBtn,boxShadow:'0 4px 16px rgba(0,0,0,0.25)'}}>
              Show Answer
            </button>
          </div>
        ) : (
          <div style={{...sqCard,borderColor:'rgba(0,0,0,0.55)',background:'rgba(0,0,0,0.45)'}}>
            <div style={{...sqLabel,color:'rgba(255,255,255,0.9)'}}>VERSE</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:'.72rem',color:'rgba(255,255,255,0.7)',letterSpacing:'.07em',marginBottom:'.55rem'}}>
              {q.ref}
            </div>
            <div style={{fontSize:'1.05rem',lineHeight:1.75,color:'rgba(255,255,255,1)',fontStyle:'italic'}}>
              {q.context}
            </div>
          </div>
        )}

        {/* Navigation — always at bottom */}
        <div style={{display:'flex',gap:'.8rem',justifyContent:'center',marginTop:'1rem',flexWrap:'wrap'}}>
          <button onClick={()=>{if(qIdx>0){setQIdx(qIdx-1);setRevealed(false);}}}
            disabled={qIdx===0}
            style={{...sqBtnGhost,opacity:qIdx===0?.35:1,cursor:qIdx===0?'default':'pointer'}}>
            ← Prev
          </button>
          <button onClick={()=>{if(qIdx<quotations.length-1){setQIdx(qIdx+1);setRevealed(false);}}}
            disabled={qIdx>=quotations.length-1}
            style={{...sqBtn,opacity:qIdx>=quotations.length-1?.35:1,cursor:qIdx>=quotations.length-1?'default':'pointer'}}>
            Next →
          </button>
        </div>
        <div style={{display:'flex',gap:'.6rem',justifyContent:'center',marginTop:'.8rem'}}>
          <button onClick={()=>{setPhase('setup');setRevealed(false);}} style={{...sqBtnGhost,fontSize:'.68rem',padding:'.3rem .9rem'}}>
            Change Chapters
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ANSWER JUDGE MATERIAL PAGE
   ═══════════════════════════════════════════════════════════ */
function AnswerJudgeMaterialPage({ onBack }){
  const [ajPhase, setAjPhase] = useState('chapters'); // 'chapters' | 'verses' | 'reader'
  const [ajCh, setAjCh] = useState(null);
  const [ajVerse, setAjVerse] = useState(null);
  const [searchInput, setSearchInput] = useState('');
  const [searchRefs, setSearchRefs] = useState(null);

  // Activate crimson background for this page
  React.useEffect(()=>{
    if(window.BgMgr) window.BgMgr.setAnswerJudgeMode(true);
    return ()=>{ if(window.BgMgr) window.BgMgr.setAnswerJudgeMode(false); };
  },[]);

  // ALL hooks at top level — no hooks after conditional returns
  const readerRef = React.useRef(null);
  React.useEffect(()=>{
    if(ajPhase === 'reader'){
      setTimeout(()=>{
        const el = document.getElementById('aj-selected-verse');
        if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
      }, 120);
    }
  }, [ajPhase, ajCh, ajVerse]);

  const allChapters = CHAPTERS_DATA.map(cd => cd.ch);

  function getVerseList(ch){
    return CHAPTERS_DATA.find(cd => cd.ch === ch)?.verses || [];
  }

  function openVerse(ch, v){
    setAjCh(ch); setAjVerse(v);
    setSearchInput(''); setSearchRefs(null);
    setAjPhase('reader');
  }

  function getContextVerses(ch, v){
    const all = [];
    CHAPTERS_DATA.forEach(cd => cd.verses.forEach(vv => all.push({ch:cd.ch, v:vv.v, t:vv.t})));
    const selIdx = all.findIndex(x => x.ch === ch && x.v === v);
    if(selIdx < 0) return [];
    const start = Math.max(0, selIdx - 10);
    const end = Math.min(all.length - 1, selIdx + 10);
    return all.slice(start, end + 1).map(x => ({...x, isSelected: x.ch === ch && x.v === v}));
  }

  function renderVerseText(text){
    return text.split(/(\s+)/).map((token, i) => {
      const core = token.replace(/[^a-zA-Z]/g,'').toLowerCase();
      if(core && KEY_WORDS.has(core)){
        return <span key={i} style={{color:'#e05555',fontWeight:600}}>{token}</span>;
      }
      return <span key={i}>{token}</span>;
    });
  }

  function handleSearch(val){
    setSearchInput(val);
    if(!val.trim()){ setSearchRefs(null); return; }
    const query = val.trim().toLowerCase();
    // Escape regex special chars, then wrap in word boundaries so
    // "ate" matches "ate" but not "participate", "rate", etc.
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const wordRe = new RegExp('\\b' + escaped + '\\b', 'i');
    // Strip punctuation from verse text before testing, but preserve word structure
    const normalize = s => s.replace(/[-–—"'"'.,;:!?(){}\[\]\/\\]/g, ' ');
    const refs = [];
    CHAPTERS_DATA.forEach(cd => cd.verses.forEach(vv => {
      if(wordRe.test(normalize(vv.t))) refs.push(`Acts ${cd.ch}:${vv.v}`);
    }));
    setSearchRefs(refs);
  }

  const navBtn = {
    fontFamily:"'Cinzel',serif", fontSize:'.72rem', letterSpacing:'.07em',
    padding:'.45rem 1.2rem', borderRadius:8, border:'1px solid var(--c-accent-a)',
    background:'var(--c-sel)', color:'var(--c-accent)', cursor:'pointer', transition:'all .18s',
  };

  /* ── CHAPTER SELECTION ── */
  if(ajPhase === 'chapters'){
    return (
      <div style={{minHeight:'100vh', position:'relative'}}>
        <div style={{position:'fixed',top:'1.1rem',right:'1rem',zIndex:60}}>
          <button className="kq-nav-btn" onClick={onBack}>Exit</button>
        </div>
        <div style={{maxWidth:600, margin:'0 auto', padding:'5rem 1rem 4rem', fontFamily:"'Crimson Pro',serif", color:'var(--c-body)'}}>
          <div style={{textAlign:'center', marginBottom:'2.2rem'}}>
            <div style={{fontFamily:"'Cinzel',serif", fontSize:'clamp(1.2rem,3.5vw,1.8rem)', fontWeight:600, letterSpacing:'.08em', color:'var(--c-title)', marginBottom:'.3rem'}}>
              Answer Judge Material
            </div>
          </div>
          <div style={{display:'flex', flexWrap:'wrap', gap:'.5rem', justifyContent:'center'}}>
            {allChapters.map(ch => (
              <button key={ch}
                onClick={()=>{ setAjCh(ch); setAjPhase('verses'); }}
                style={{fontFamily:"'Cinzel',serif", fontSize:'.82rem', width:'3rem', height:'3rem',
                  borderRadius:10, border:'1px solid var(--c-accent-a)',
                  background:'var(--c-sel)', color:'var(--c-title)', cursor:'pointer',
                  transition:'all .15s', letterSpacing:'.04em'}}
                onMouseEnter={e=>{e.currentTarget.style.background='var(--c-card)';e.currentTarget.style.borderColor='var(--c-accent)';}}
                onMouseLeave={e=>{e.currentTarget.style.background='var(--c-sel)';e.currentTarget.style.borderColor='var(--c-accent-a)';}}>
                {ch}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* ── VERSE SELECTION ── */
  if(ajPhase === 'verses'){
    const verses = getVerseList(ajCh);
    return (
      <div style={{minHeight:'100vh', position:'relative'}}>
        <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
          <button className="kq-nav-btn" onClick={()=>setAjPhase('chapters')}>← Back</button>
        </div>
        <div style={{position:'fixed',top:'1.1rem',right:'1rem',zIndex:60}}>
          <button className="kq-nav-btn" onClick={onBack}>Exit</button>
        </div>
        <div style={{maxWidth:600, margin:'0 auto', padding:'5rem 1rem 4rem', fontFamily:"'Crimson Pro',serif", color:'var(--c-body)'}}>
          <div style={{textAlign:'center', marginBottom:'1.8rem', fontFamily:"'Cinzel',serif", fontSize:'1rem', letterSpacing:'.1em', color:'var(--c-accent)'}}>
            CHAPTER {ajCh}
          </div>
          <div style={{display:'flex', flexWrap:'wrap', gap:'.45rem', justifyContent:'center'}}>
            {verses.map(vv => (
              <button key={vv.v}
                onClick={()=>openVerse(ajCh, vv.v)}
                style={{fontFamily:"'Cinzel',serif", fontSize:'.78rem',
                  minWidth:'2.6rem', height:'2.6rem', padding:'0 .4rem',
                  borderRadius:8, border:'1px solid var(--c-border)',
                  background:'var(--c-sel)', color:'var(--c-muted)', cursor:'pointer', transition:'all .15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='var(--c-card)';e.currentTarget.style.color='var(--c-title)';e.currentTarget.style.borderColor='var(--c-accent-a)';}}
                onMouseLeave={e=>{e.currentTarget.style.background='var(--c-sel)';e.currentTarget.style.color='var(--c-muted)';e.currentTarget.style.borderColor='var(--c-border)';}}>
                {vv.v}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* ── READER VIEW ── */
  const contextVerses = getContextVerses(ajCh, ajVerse);

  return (
    <div style={{minHeight:'100vh', position:'relative'}}>
      {/* Back button top-left */}
      <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
        <button className="kq-nav-btn" onClick={()=>setAjPhase('chapters')}>← Back</button>
      </div>
      {/* Reference label top-right */}
      <div style={{position:'fixed', top:'1.1rem', right:'1rem', zIndex:60,
        fontFamily:"'Cinzel',serif", fontSize:'.7rem', color:'var(--c-muted)',
        background:'var(--c-sel)', padding:'.3rem .8rem', borderRadius:20,
        border:'1px solid var(--c-border)', pointerEvents:'none'}}>
        Acts {ajCh}:{ajVerse}
      </div>

      {/* Scrollable verse list */}
      <div ref={readerRef} style={{maxWidth:680, margin:'0 auto', padding:'5rem 1rem 10rem', fontFamily:"'Crimson Pro',serif", color:'var(--c-body)'}}>
        {contextVerses.map(cv => (
          <div key={`${cv.ch}-${cv.v}`}
            id={cv.isSelected ? 'aj-selected-verse' : undefined}
            style={{
              display:'flex', gap:'.6rem', marginBottom:'.6rem',
              padding:'.85rem 1rem', borderRadius:10,
              background: cv.isSelected ? 'rgba(201,162,39,0.14)' : 'var(--c-card)',
              border: cv.isSelected ? '1px solid rgba(201,162,39,0.55)' : '1px solid var(--c-border)',
              boxShadow: cv.isSelected ? '0 0 22px rgba(201,162,39,0.32), 0 0 6px rgba(201,162,39,0.2)' : 'none',
              opacity: cv.isSelected ? 1 : 0.52,
              backdropFilter:'blur(4px)',
            }}>
            <div style={{fontFamily:"'Cinzel',serif", fontSize:'.65rem',
              color: cv.isSelected ? 'var(--c-accent)' : 'var(--c-vmuted)',
              minWidth:'2.8rem', paddingTop:'.25rem', letterSpacing:'.03em', flexShrink:0}}>
              {cv.ch}:{cv.v}
            </div>
            <div style={{flex:1, lineHeight:1.85, fontSize:'1.02rem',
              color: cv.isSelected ? 'var(--c-title)' : 'var(--c-body)'}}>
              {renderVerseText(cv.t)}
            </div>
          </div>
        ))}
      </div>

      {/* Fixed search bar at very bottom */}
      <div style={{position:'fixed', bottom:0, left:0, right:0, zIndex:50,
        background:'rgba(13,2,33,0.96)', borderTop:'1px solid var(--c-border)',
        backdropFilter:'blur(8px)', padding:'.75rem 1rem'}}>
        <div style={{maxWidth:680, margin:'0 auto'}}>
          <input
            type="text"
            placeholder="Search a word or phrase… exact word matches only"
            value={searchInput}
            onChange={e=>handleSearch(e.target.value)}
            style={{width:'100%', background:'var(--c-input)', border:'1px solid var(--c-accent-a)',
              borderRadius:8, padding:'.5rem .9rem', fontFamily:"'Crimson Pro',serif",
              fontSize:'1rem', color:'var(--c-title)', outline:'none',
              marginBottom: searchRefs ? '.5rem' : 0}}
          />
          {searchRefs !== null && (
            <div style={{fontFamily:"'Cinzel',serif", fontSize:'.7rem', color:'var(--c-muted)',
              lineHeight:1.9, maxHeight:'5.5rem', overflowY:'auto', letterSpacing:'.03em'}}>
              {searchRefs.length === 0
                ? <span style={{fontStyle:'italic', color:'var(--c-vmuted)'}}>No matches found</span>
                : searchRefs.map((r,i) => (
                    <span key={i} style={{marginRight:'.7rem', color:'var(--c-accent)'}}>{r}</span>
                  ))
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function MoreToolsPage({ onBack, onKeywords, onStudy, onRefMatch, onDrag, onSectionLocator, onOddOneOut, onSituationQuotations, onAnswerJudge }) {
  const canvasRef = React.useRef(null);

  React.useEffect(()=>{
    if(window.BgMgr) window.BgMgr.setToolsMode(true);
    return ()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(false); };
  },[]);

  React.useEffect(()=>{
    const c = canvasRef.current;
    if(!c) return;
    let W = c.width = window.innerWidth;
    let H = c.height = window.innerHeight;
    const ctx = c.getContext('2d');

    const N = 55;
    const nodes = Array.from({length:N},()=>({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.38, vy: (Math.random()-.5)*.38,
      r: 1.5+Math.random()*3.5,
      hue: 38+Math.random()*30,
      pulse: Math.random()*Math.PI*2,
      pSpd: .012+Math.random()*.018,
    }));

    let t = 0;
    let raf;
    function draw(){
      raf = requestAnimationFrame(draw);
      t += .006;

      // Solid black base — no bleed-through from chapter bg
      ctx.fillStyle = '#000000';
      ctx.fillRect(0,0,W,H);

      // Black pulsing ripples (subtle)
      for(let i=0;i<5;i++){
        const prog = (t*.10 + i/5) % 1;
        const r = prog * Math.max(W,H) * .85;
        const a = (1-prog) * .07;
        ctx.strokeStyle=`rgba(28,28,28,${a})`;
        ctx.lineWidth=1.4;
        ctx.beginPath(); ctx.arc(W/2,H/2,r,0,Math.PI*2); ctx.stroke();
      }

      // Node connections
      for(let i=0;i<N;i++){
        for(let j=i+1;j<N;j++){
          const dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<120){
            const a = (1-d/120)*.18;
            ctx.strokeStyle=`rgba(201,162,39,${a})`;
            ctx.lineWidth=.7;
            ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke();
          }
        }
      }

      // Nodes
      nodes.forEach(n=>{
        n.pulse += n.pSpd;
        n.x += n.vx; n.y += n.vy;
        if(n.x<0||n.x>W) n.vx*=-1;
        if(n.y<0||n.y>H) n.vy*=-1;
        const a = .45+Math.sin(n.pulse)*.3;
        const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*2.5);
        g.addColorStop(0,`hsla(${n.hue},90%,70%,${a})`);
        g.addColorStop(1,`hsla(${n.hue},80%,40%,0)`);
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r*2.5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=`hsla(${n.hue},95%,82%,${a+.2})`;
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
      });

      // Slow golden expanding rings — limitlessness
      for(let i=0;i<3;i++){
        const phase = (t*.18 + i/3) % 1;
        const r = phase * Math.max(W,H) * .8;
        const a = (1-phase)*.06;
        ctx.strokeStyle=`rgba(201,162,39,${a})`;
        ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(W/2,H/2,r,0,Math.PI*2); ctx.stroke();
      }
    }
    draw();

    function onResize(){
      W = c.width = window.innerWidth;
      H = c.height = window.innerHeight;
    }
    window.addEventListener('resize', onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);

  const tools = [
    { icon:'🔑', name:'Keywords Quiz', desc:'Keywords, phrases, or reverse mode — one chapter at a time', action: onKeywords },
    { icon:'📖', name:'Chapter Material Study', desc:'Sections, key verses & keywords for any chapter', action: onStudy },
    { icon:'↔', name:'Reference Matching', desc:'Match verses to references — or references to verses', action: onRefMatch },
    { icon:'🧺', name:'Drag Study Game', desc:'Sort keywords, phrases & jump points into chapter baskets', action: onDrag },
    { icon:'🧭', name:'Section Locator', desc:'Match section headings to chapters — or flip it around', action: onSectionLocator },
    { icon:'odd', name:'Odd One Out', desc:'Three from one chapter, one from another — spot the intruder', action: onOddOneOut },
    { icon:'🌱', name:'Situation Quotations', desc:'What was the unique start of each spoken word in Acts?', action: onSituationQuotations },
    { icon:'⚖️', name:'Answer Judge Material', desc:'Navigate Acts by chapter and verse — glowing context reader', action: onAnswerJudge },
  ];

  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div className="tools-page" style={{position:'relative',zIndex:3}}>
        <div className="top-nav-left">
          <button className="kq-nav-btn" onClick={onBack}>← Back</button>
        </div>
        <div style={{paddingTop:'3rem'}}>
          <div className="tools-title" style={{textShadow:'0 2px 8px rgba(0,0,0,0.8)',background:'rgba(0,0,0,0.35)',display:'inline-block',padding:'.3rem 1.2rem',borderRadius:10}}>More Tools</div>
          <div className="tools-subtitle" style={{textShadow:'0 1px 4px rgba(0,0,0,0.7)',background:'rgba(0,0,0,0.25)',display:'inline-block',padding:'.15rem .9rem',borderRadius:8}}>Study smarter · every verse, every angle</div>
          <div className="tools-grid">
            {tools.map((tool,i)=>(
              <div key={i} className="tool-card"
                style={{opacity: tool.action ? 1 : .38, cursor: tool.action ? 'pointer' : 'default'}}
                onClick={()=>tool.action && tool.action()}>
                <div className="tool-card-icon">{tool.icon==='odd'
                  ? <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="6" r="4" fill="#e05050" opacity="0.9"/><circle cx="16" cy="6" r="4" fill="white" opacity="0.85"/><circle cx="6" cy="16" r="4" fill="white" opacity="0.85"/><circle cx="16" cy="16" r="4" fill="white" opacity="0.85"/></svg>
                  : tool.icon}</div>
                <div className="tool-card-name">{tool.name}</div>
                <div className="tool-card-desc">{tool.desc}</div>
              </div>
            ))}
          </div>

        </div>
      </div>
    </div>
  );
}

function App({ onScore }){
  const [page, setPage] = useState('main'); // 'main'|'tools'|'keywords'|'custom'|'study'|'refmatch'|'drag'
  const [sChIdx,setSChIdx]=useState(0);
  const [sV,setSV]=useState(1);
  const [eChIdx,setEChIdx]=useState(0);
  const [eV,setEV]=useState(CHAPTERS_DATA[0].verses.length);
  const [level,setLevel]=useState(null);
  const [modeRandom,setModeRandom]=useState(false);
  const [modeSpecialty,setModeSpecialty]=useState(false);
  const [quizSeed,setQuizSeed]=useState(()=>Math.floor(Math.random()*1e9));
  const [ans,setAns]=useState({});
  const [hinted,setHinted]=useState({});
  const [chk,setChk]=useState(false);
  const [score,setScore]=useState(null);
  const [customVerses,setCustomVerses]=useState(null); // null = use range, array = custom
  const [showJump,setShowJump]=useState(true);

  useEffect(()=>{
    function onFocusIn(e){
      const el=e.target;
      if(el.matches&&el.matches('input.blank')&&el.dataset.ch){
        const ch=parseInt(el.dataset.ch,10);
        if(!isNaN(ch)&&window.BgMgr) window.BgMgr.setChapter(ch);
      }
    }
    document.addEventListener('focusin',onFocusIn);
    return ()=>document.removeEventListener('focusin',onFocusIn);
  },[]);

  useEffect(()=>{
    if(window.BgMgr) window.BgMgr.setChapter(CHAPTERS_DATA[sChIdx].ch);
  },[sChIdx]);

  useEffect(()=>{
    function onKey(e){
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='h'){
        e.preventDefault();
        const inputs=Array.from(document.querySelectorAll('input.blank:not([disabled])'));
        const empty=inputs.find(inp=>!inp.value.trim());
        if(empty&&empty.dataset.correct&&empty.dataset.bkey){
          const k=empty.dataset.bkey, correct=empty.dataset.correct;
          setAns(a=>({...a,[k]:correct}));
          setHinted(h=>({...h,[k]:true}));
          setTimeout(()=>empty.focus(),10);
        }
      }
    }
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  const selVerses=useMemo(()=>{
    if(customVerses) return customVerses;
    const sk=vkey(CHAPTERS_DATA[sChIdx].ch,sV);
    const ek=vkey(CHAPTERS_DATA[eChIdx].ch,eV);
    const out=[];
    CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{
      const k=vkey(cd.ch,v.v);
      if(k>=sk&&k<=ek) out.push({ch:cd.ch,...v});
    }));
    return out;
  },[sChIdx,sV,eChIdx,eV,customVerses]);

  const displayVerses=useMemo(()=>{
    if(modeSpecialty && selVerses.length>0) return shuffleArr(selVerses, makeRng(quizSeed));
    return selVerses;
  },[selVerses, modeSpecialty, quizSeed]);

  const byChapter=useMemo(()=>{
    if(modeSpecialty) return null;
    const map=[];
    displayVerses.forEach(v=>{
      const last=map[map.length-1];
      if(last&&last.ch===v.ch) last.verses.push(v);
      else map.push({ch:v.ch,verses:[v]});
    });
    return map;
  },[displayVerses,modeSpecialty]);

  const segOpts=useMemo(()=>({
    seed: modeRandom ? quizSeed : null,
    specialty: modeSpecialty,
  }),[modeRandom, modeSpecialty, quizSeed]);

  function newSeed(){ setQuizSeed(Math.floor(Math.random()*1e9)); }
  function reset(){ setAns({}); setHinted({}); setChk(false); setScore(null); newSeed(); }
  function fullReset(){ setAns({}); setHinted({}); setChk(false); setScore(null); newSeed(); setCustomVerses(null); }

  function toggleRandom(){
    if(!modeRandom) setModeSpecialty(false);
    setModeRandom(v=>!v); reset();
  }
  function toggleSpecialty(){
    if(!modeSpecialty) setModeRandom(false);
    setModeSpecialty(v=>!v); reset();
  }

  function goSCh(i){
    const ni=+i, mx=CHAPTERS_DATA[ni].verses.length, sv=Math.min(sV,mx);
    setSChIdx(ni); setSV(sv);
    if(vkey(CHAPTERS_DATA[eChIdx].ch,eV)<vkey(CHAPTERS_DATA[ni].ch,sv)){setEChIdx(ni);setEV(mx);}
    fullReset();
  }
  function goSV(v){
    const nv=+v; setSV(nv);
    if(vkey(CHAPTERS_DATA[eChIdx].ch,eV)<vkey(CHAPTERS_DATA[sChIdx].ch,nv)){setEChIdx(sChIdx);setEV(CHAPTERS_DATA[sChIdx].verses.length);}
    fullReset();
  }
  function goECh(i){
    const ni=+i, mx=CHAPTERS_DATA[ni].verses.length;
    if(vkey(CHAPTERS_DATA[ni].ch,mx)<vkey(CHAPTERS_DATA[sChIdx].ch,sV)) return;
    setEChIdx(ni); setEV(Math.min(eV,mx)); fullReset();
  }
  function goEV(v){
    const nv=+v;
    if(vkey(CHAPTERS_DATA[eChIdx].ch,nv)<vkey(CHAPTERS_DATA[sChIdx].ch,sV)) return;
    setEV(nv); fullReset();
  }

  function check(){
    let c=0, tot=0, ptsEarned=0;
    selVerses.forEach(verse=>{
      tot++;
      const vnKey=`${verse.ch}-${verse.v}-vnum`;
      const vnOk = norm(ans[vnKey])===String(verse.v);
      if(vnOk){ c++; if(!hinted[vnKey]) ptsEarned+=0.5; }
      const verseSeed = segOpts.seed != null ? hashSeed(segOpts.seed, `${verse.ch}-${verse.v}`) : null;
      const uniquePrefix = VERSE_UNIQUE_PREFIX[`${verse.ch}-${verse.v}`] ?? 5;
      buildSegs(verse.t, level+1, {...segOpts, seed: verseSeed, uniquePrefix}).filter(s=>s.type==='blank').forEach(s=>{
        tot++;
        const k=`${verse.ch}-${verse.v}-${s.idx}`;
        if(matchAnswer(ans[k],s.core)){ c++; if(!hinted[k]) ptsEarned+=0.5; }
      });
    });
    setScore({c,tot}); setChk(true);
  }

  const sc=score?(score.c===score.tot?'perfect':score.c>=score.tot*.7?'good':'low'):'';
  const sCh=CHAPTERS_DATA[sChIdx], eCh=CHAPTERS_DATA[eChIdx];
  const modeTag = modeRandom ? ' · 🎲 Random' : modeSpecialty ? ' · ⭐ Specialty' : '';

  if(page === 'custom'){
    return <CustomPicker
      onBack={()=>setPage('main')}
      onApply={(verses)=>{ setCustomVerses(verses); setAns({}); setHinted({}); setChk(false); setScore(null); newSeed(); setPage('main'); }}
    />;
  }

  if(page === 'refmatch'){
    return <RefMatchPage onBack={()=>setPage('tools')} initialCustomVerses={customVerses} />;
  }

  if(page === 'study'){
    return <ChapterStudyPage onBack={()=>setPage('tools')} />;
  }

  if(page === 'drag'){
    return <DragStudyPage onBack={()=>setPage('tools')} initialCustomVerses={customVerses} />;
  }

  if(page === 'seclocator'){
    return <SectionLocatorPage onBack={()=>setPage('tools')} />;
  }

  if(page === 'answerjudge'){
    return <AnswerJudgeMaterialPage onBack={()=>setPage('tools')} />;
  }

  if(page === 'situationquotations'){
    return <SituationQuotationsPage onBack={()=>setPage('tools')} />;
  }

  if(page === 'oddoneout'){
    return <OddOneOutPage onBack={()=>setPage('tools')} />;
  }

  if(page === 'tools'){
    return <MoreToolsPage
      onBack={()=>setPage('main')}
      onKeywords={()=>{ if(window.BgMgr) window.BgMgr.setKeyMode(true); setPage('keywords'); }}
      onStudy={()=>setPage('study')}
      onRefMatch={()=>setPage('refmatch')}
      onDrag={()=>setPage('drag')}
      onSectionLocator={()=>setPage('seclocator')}
      onOddOneOut={()=>setPage('oddoneout')}
      onSituationQuotations={()=>setPage('situationquotations')}
      onAnswerJudge={()=>setPage('answerjudge')}
    />;
  }

  if(page === 'keywords'){
    return <KeywordQuiz onBack={()=>{ if(window.BgMgr) window.BgMgr.setKeyMode(false); setPage('tools'); }} />;
  }

  return (
    <div className="wrap">
      <div className="top-nav">
        <button className="kq-nav-btn" onClick={()=>setPage('tools')}>More Tools</button>
      </div>
      <div className="title">Wardify — Acts</div>
      <div className="subtitle">New International Version</div>
      <div className="range-card">
        <div className="range-label">PASSAGE SELECTION</div>
        {customVerses ? (
          <div style={{textAlign:'center',padding:'.4rem 0 .6rem'}}>
            <span className="cp-active-badge">
              ✦ Custom · {customVerses.length} verse{customVerses.length!==1?'s':''}
            </span>
            <div style={{marginTop:'.6rem',display:'flex',gap:'.5rem',justifyContent:'center',flexWrap:'wrap'}}>
              <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.32rem .9rem'}}
                onClick={()=>setPage('custom')}>Edit Selection</button>
              <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.32rem .9rem'}}
                onClick={fullReset}>✕ Clear Custom</button>
            </div>
          </div>
        ) : (
          <>
            <div className="range-row">
              <div className="range-group">
                <label>FROM CH</label>
                <select className="rsel" value={sChIdx} onChange={e=>goSCh(e.target.value)}>
                  {CHAPTERS_DATA.map((c,i)=><option key={i} value={i}>{c.ch}</option>)}
                </select>
                <label>V.</label>
                <select className="rsel" value={sV} onChange={e=>goSV(e.target.value)}>
                  {sCh.verses.map(vr=><option key={vr.v} value={vr.v}>{vr.v}</option>)}
                </select>
              </div>
              <span className="range-sep">—</span>
              <div className="range-group">
                <label>TO CH</label>
                <select className="rsel" value={eChIdx} onChange={e=>goECh(e.target.value)}>
                  {CHAPTERS_DATA.map((c,i)=><option key={i} value={i}>{c.ch}</option>)}
                </select>
                <label>V.</label>
                <select className="rsel" value={eV} onChange={e=>goEV(e.target.value)}>
                  {eCh.verses.map(vr=><option key={vr.v} value={vr.v} disabled={vkey(eCh.ch,vr.v)<vkey(sCh.ch,sV)}>{vr.v}</option>)}
                </select>
              </div>
            </div>
            <div className="range-info">
              {selVerses.length===0 ? 'Select a passage above to begin' : `${selVerses.length} verse${selVerses.length>1?'s':''} selected`}
            </div>
            <div style={{textAlign:'center',marginTop:'.65rem'}}>
              <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.32rem 1.1rem'}}
                onClick={()=>setPage('custom')}>✦ Custom</button>
            </div>
          </>
        )}
      </div>

      {selVerses.length>0 && <>
        <div className="level-bar" style={{marginTop:'1rem'}}>
          <button className={'lv-btn'+(level===null?' active':'')} onClick={()=>{ setLevel(null); reset(); }}>📖 Read</button>
          {LEVELS.map((l,i)=>(
            <button key={i} className={'lv-btn'+(level===i?' active':'')} onClick={()=>{ setLevel(i); reset(); }}>{l.label}</button>
          ))}
        </div>

        {level!==null && (
          <div className="mode-bar">
            <label className={'mode-toggle'+(modeRandom?' mode-on':'')+(modeSpecialty?' mode-disabled':'')}>
              <input type="checkbox" checked={modeRandom} disabled={modeSpecialty} onChange={toggleRandom}/>
              <span className="mode-icon">🎲</span> Random
              <span className="mode-tip">Words blanked randomly at each level's rate</span>
            </label>
            <label className={'mode-toggle'+(modeSpecialty?' mode-on':'')+(modeRandom?' mode-disabled':'')}>
              <input type="checkbox" checked={modeSpecialty} disabled={modeRandom} onChange={toggleSpecialty}/>
              <span className="mode-icon">⭐</span> Specialty
              <span className="mode-tip">Verses shuffled · Opening words given until verse is unique</span>
            </label>
          </div>
        )}

        {level===null
          ? <div className="level-desc" style={{marginBottom:'.8rem',display:'flex',alignItems:'center',justifyContent:'center',gap:'.8rem',flexWrap:'wrap'}}>
              <span>Reading mode · <span style={{color:'var(--c-title)',fontWeight:700}}>Bold words</span> appear in only one verse anywhere in Acts</span>
              <label className={'mode-toggle'+(showJump?' mode-on':'')} style={{fontSize:'.68rem',padding:'.28rem .8rem .28rem .6rem'}}>
                <input type="checkbox" checked={showJump} onChange={()=>setShowJump(v=>!v)}/>
                <span className="mode-icon" style={{fontSize:'.8rem'}}>/</span> Jump marks
                <span className="mode-tip">Show FTV jump point markers in read mode</span>
              </label>
            </div>
          : <div className="level-desc" style={{marginBottom:'.4rem'}}>
              {LEVELS[level].desc}{modeTag} · Verse number always required
            </div>
        }
        {level!==null && (
          <div className="kbd-tips"><kbd>Space</kbd> = next blank &nbsp;·&nbsp; <kbd>Ctrl+H</kbd> = hint next word</div>
        )}

        {modeSpecialty && level!==null
          ? <div>
              {displayVerses.map(verse=>(
                <div key={`${verse.ch}-${verse.v}`}>
                  <VerseRow verse={verse} ch={verse.ch} level={level+1} segOpts={segOpts}
                    ans={ans} hinted={hinted} setAns={(k,v)=>setAns(a=>({...a,[k]:v}))} checked={chk}/>
                </div>
              ))}
            </div>
          : level===null
            ? (byChapter||[]).map(({ch,verses})=>(
                <div key={ch}>
                  <div className="ch-heading">CHAPTER {ch}</div>
                  {verses.map(verse=>(<ReadingVerse key={`${ch}-${verse.v}`} verse={verse} ch={ch} showJump={showJump}/>))}
                </div>
              ))
            : (byChapter||[]).map(({ch,verses})=>(
                <div key={ch}>
                  <div className="ch-heading">CHAPTER {ch}</div>
                  {verses.map(verse=>(
                    <VerseRow key={`${ch}-${verse.v}`} verse={verse} ch={ch} level={level+1}
                      segOpts={segOpts} ans={ans} hinted={hinted}
                      setAns={(k,v)=>setAns(a=>({...a,[k]:v}))} checked={chk}/>
                  ))}
                </div>
              ))
        }

        {level!==null && <>
          <div className="btn-row">
            {!chk
              ? <button className="btn btn-gold" onClick={check}>Check Answers</button>
              : <button className="btn btn-gold" onClick={reset}>Try Again</button>}
            <button className="btn btn-ghost" onClick={reset}>Reset</button>
          </div>
          {score && (
            <div className={'score '+sc}>
              {score.c===score.tot ? `✦ Perfect — ${score.c} / ${score.tot} ✦` : `${score.c} / ${score.tot} correct`}
              {Object.keys(hinted).length>0 && (
                <span style={{fontSize:'.8rem',opacity:.7,marginLeft:'.5rem'}}>({Object.keys(hinted).length} hinted)</span>
              )}
            </div>
          )}
          {chk&&score&&score.c===score.tot&&level<4 && (
            <div className="next-banner" style={{marginTop:'.8rem'}}>
              <button className="btn btn-gold" onClick={()=>{setLevel(l=>l+1);reset();}}>Next Level →</button>
            </div>
          )}
        </>}
      </>}

      <div className="footer-note">New International Version · Bold words are unique to one verse in Acts</div>
    </div>
  );
}

/* ════════════════════════════════════════════
   COMPETITIVE COMPONENTS
════════════════════════════════════════════ */

function ScoreToast({ toasts }){
  return (
    <div className="score-toast-wrap">
      {toasts.map(t=>(
        <div key={t.id} className="score-toast">{t.msg}</div>
      ))}
    </div>
  );
}

function LeaderboardPage({ scores, user, onBack }){
  const [view, setView] = useState('teams');
  const teamNums = [1,2,3];

  const teamEntries = teamNums.map(t=>({
    id: `team${t}`,
    label: TEAMS[t].label,
    color: TEAMS[t].color,
    pts: round2(scores?.[`team${t}`]?.total || 0),
    isMe: user?.team === t,
    members: TEAMS[t].members.map(name=>({
      name,
      pts: round2(scores?.[`team${t}`]?.[name] || 0),
      isMe: user?.team === t && user?.name === name
    })).sort((a,b)=>b.pts-a.pts)
  })).sort((a,b)=>b.pts-a.pts);

  const indivEntries = [];
  teamNums.forEach(t=>{
    TEAMS[t].members.forEach(name=>{
      indivEntries.push({
        id: `t${t}-${name}`, name,
        color: TEAMS[t].color,
        teamLabel: TEAMS[t].label,
        pts: round2(scores?.[`team${t}`]?.[name] || 0),
        isMe: user?.team === t && user?.name === name
      });
    });
  });
  indivEntries.sort((a,b)=>b.pts-a.pts);

  function medalClass(i){ return i===0?'lb-medal-1':i===1?'lb-medal-2':i===2?'lb-medal-3':''; }
  function medalLabel(i){ return i===0?'1st':i===1?'2nd':i===2?'3rd':`${i+1}`; }

  return (
    <div className="lb-page">
      <div className="lb-page-title">Leaderboard</div>
      <div className="lb-page-sub">Matthew — Memory Quiz Competition</div>

      <div className="lb-toggle-row">
        <button className={'lb-toggle-btn'+(view==='teams'?' active':'')} onClick={()=>setView('teams')}>◀ Teams</button>
        <button className={'lb-toggle-btn'+(view==='individual'?' active':'')} onClick={()=>setView('individual')}>Individual ▶</button>
      </div>

      {view === 'teams' ? (
        <div>
          {teamEntries.map((team, ti)=>(
            <div key={team.id} className="lb-team-block"
              style={{borderColor: team.isMe ? team.color+'55' : 'var(--c-border)'}}>
              <div className="lb-team-header">
                <div style={{display:'flex',alignItems:'center',gap:'.7rem'}}>
                  <div className={`lb-rank-badge ${medalClass(ti)}`}>{medalLabel(ti)}</div>
                  <span className="lb-team-name" style={{color: team.color}}>{team.label}</span>
                </div>
                <span className="lb-team-total" style={{color: team.color}}>{team.pts.toFixed(1)}</span>
              </div>
              <div className="lb-team-members">
                {team.members.map(m=>(
                  <div key={m.name} className="lb-member-row">
                    <div className="lb-member-left">
                      <span className={'lb-member-name'+(m.isMe?' lb-me-name':'')}>{m.name}</span>
                    </div>
                    <span className="lb-member-pts" style={{color: team.color}}>{m.pts.toFixed(1)}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div className="lb-indiv-list">
          {indivEntries.map((e, i)=>(
            <div key={e.id} className={'lb-indiv-row'+(e.isMe?' lb-me-row':'')}>
              <div className={`lb-rank-badge ${medalClass(i)}`}>{medalLabel(i)}</div>
              <span className={'lb-indiv-name'+(e.isMe?' lb-me-name':'')}>{e.name}</span>
              <div className="lb-indiv-team-dot" style={{background: e.color}} title={e.teamLabel}/>
              <span className="lb-indiv-pts" style={{color: e.color}}>{e.pts.toFixed(1)}</span>
            </div>
          ))}
        </div>
      )}

      <div className="btn-row" style={{marginTop:'1.8rem'}}>
        <button className="btn btn-ghost" onClick={onBack}>← Back to Quiz</button>
      </div>
    </div>
  );
}

function Login({ onLogin }){
  const [teamSel, setTeamSel] = useState(null);

  function handleName(name){
    if(!teamSel) return;
    onLogin({ team: teamSel, name });
  }

  return (
    <div className="login-bg">
      <div className="login-card">
        <div className="login-title">Matthew — Memory Quiz</div>
        <div className="login-sub">Competition Mode</div>

        <div className="login-step-label">
          {!teamSel ? 'STEP 1 — SELECT YOUR TEAM' : 'STEP 2 — SELECT YOUR NAME'}
        </div>

        {!teamSel ? (
          <div className="login-teams">
            {[1,2,3].map(t=>(
              <button key={t} className="login-team-btn"
                style={{borderColor: TEAMS[t].color+'88', color: TEAMS[t].color}}
                onClick={()=>setTeamSel(t)}>
                <span className="login-team-num">{t}</span>
                <span className="login-team-lbl">TEAM</span>
              </button>
            ))}
          </div>
        ) : (
          <>
            <div style={{textAlign:'center',marginBottom:'.3rem'}}>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.75rem',color:TEAMS[teamSel].color,letterSpacing:'.06em'}}>
                {TEAMS[teamSel].label}
              </span>
            </div>
            <div className="login-names">
              {TEAMS[teamSel].members.map(name=>(
                <button key={name} className="login-name-btn"
                  style={{borderColor: TEAMS[teamSel].color+'55'}}
                  onClick={()=>handleName(name)}>
                  {name}
                </button>
              ))}
            </div>
            <button className="login-back-btn" onClick={()=>setTeamSel(null)}>← Back to teams</button>
          </>
        )}
      </div>
    </div>
  );
}

function Root(){
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
