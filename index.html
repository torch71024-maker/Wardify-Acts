    ctx.save();ctx.globalAlpha=.6;ctx.fillStyle='rgba(90,75,50,1)';ctx.fillRect(altarX-W*.022,altarY,W*.044,H*.1);ctx.fillRect(altarX-W*.03,groundY-H*.018,W*.06,H*.018);ctx.restore();
    const orbCx=cx,orbCy=H*.35;orbits.forEach(orb=>{orb.angle+=orb.spd;const MR=Math.min(W,H)*orb.r;ctx.save();ctx.translate(orbCx+Math.cos(orb.angle)*MR,orbCy+Math.sin(orb.angle)*MR*.6);ctx.rotate(t*(orb.sides*.1));ctx.globalAlpha=orb.al*(0.6+0.4*Math.sin(t+orb.r*4));ctx.strokeStyle='rgba(180,160,255,1)';ctx.lineWidth=.8;ctx.beginPath();for(let v=0;v<=orb.sides;v++){const a=v/orb.sides*Math.PI*2,r=MR*.8;if(v===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.stroke();ctx.restore();});
  });
  const rmR=makeResizer(c,()=>{W=c.width;H=c.height;});return()=>{stop();rmR();};
}

/* ── Acts Ch 18 — PLASMA WAVE ───────────────────────────────────────────────
   Not chapter-relevant — pure chromatic insanity. Fourteen coloured radial
   gradients orbit one another on Lissajous paths, blended in 'lighter'
   (additive) mode. The result is an endlessly mutating plasma of pure hue. */
function bgPlasmaWave(c){
  let W,H;const ctx=initCanvas(c);W=c.width;H=c.height;
  const N=14;
  const nodes=Array.from({length:N},(_,i)=>({
    ax:.15+Math.random()*.7,ay:.15+Math.random()*.7,
    rx:.08+Math.random()*.18,ry:.08+Math.random()*.18,
    spd:.003+Math.random()*.009,phase:Math.random()*Math.PI*2,
    phaseY:Math.random()*Math.PI*2,spdY:.002+Math.random()*.007,
    hue:i/N*360,hspd:.5+Math.random()*.9,
    size:.22+Math.random()*.32
  }));
  let t=0;
  const stop=mkLoop(()=>{
    t+=.012;W=c.width;H=c.height;
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.globalCompositeOperation='lighter';
    nodes.forEach(n=>{
      n.phase+=n.spd;n.phaseY+=n.spdY;n.hue=(n.hue+n.hspd)%360;
      const nx=(n.ax+Math.sin(n.phase)*n.rx)*W;
      const ny=(n.ay+Math.cos(n.phaseY)*n.ry)*H;
      const r=n.size*Math.min(W,H);
      const h=Math.round(n.hue),h2=Math.round((n.hue+60)%360);
      const g=ctx.createRadialGradient(nx,ny,0,nx,ny,r);
      g.addColorStop(0,`hsla(${h},100%,62%,0.52)`);
      g.addColorStop(.35,`hsla(${h2},100%,48%,0.16)`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    });
    ctx.restore();
  });
  const rmR=makeResizer(c,()=>{W=c.width;H=c.height;});return()=>{stop();rmR();};
}

/* ── Acts Ch 19 — RIOT AT EPHESUS ───────────────────────────────────────────
   "Great is Artemis of the Ephesians!" The whole city in uproar. The great
   theater fills with a raging crowd. Silver shrine fragments flash. */
function bgEphesusRiot(c){
  let W,H;const ctx=initCanvas(c);W=c.width;H=c.height;
  const crowd=Array.from({length:200},()=>({tier:Math.floor(Math.random()*6),angle:Math.random()*Math.PI*2,phase:Math.random()*Math.PI*2,spd:.01+Math.random()*.025,al:.3+Math.random()*.5,r:1.2+Math.random()*2}));
  const silver=Array.from({length:60},()=>({x:.3+Math.random()*.4,y:.2+Math.random()*.6,vx:(Math.random()-.5)*.006,vy:(Math.random()-.5)*.006,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-.5)*.08,size:W*.005+Math.random()*W*.015,life:Math.random(),al:.3+Math.random()*.6}));
  const torches=Array.from({length:16},(_,i)=>({angle:i/16*Math.PI*2,phase:Math.random()*Math.PI*2,spd:.02+Math.random()*.015}));
  let t=0;
  const stop=mkLoop(()=>{
    t+=.015;W=c.width;H=c.height;
    ctx.fillStyle='rgba(4,1,0,0.28)';ctx.fillRect(0,0,W,H);
    const cx=W/2,cy=H*.75,MR=Math.min(W,H)*.55;
    const stageG=ctx.createRadialGradient(cx,cy+H*.05,0,cx,cy,MR*.7);stageG.addColorStop(0,`rgba(200,150,50,${.15+.08*Math.sin(t*.5)})`);stageG.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=stageG;ctx.fillRect(0,0,W,H);
    for(let tier=6;tier>=0;tier--){const tr=MR*(0.12+tier*.14);ctx.save();ctx.globalAlpha=.25+tier*.06;ctx.strokeStyle=`hsl(28,30%,${12+tier*4}%)`;ctx.lineWidth=H*.022;ctx.beginPath();ctx.arc(cx,cy,tr,Math.PI,Math.PI*2);ctx.stroke();ctx.restore();}
    crowd.forEach(cr=>{cr.angle+=cr.spd*(1+.5*Math.sin(t*2+cr.phase));const tr=MR*(0.15+cr.tier*.14),px=cx+Math.cos(cr.angle)*tr,py=cy+Math.sin(cr.angle)*tr*.28;if(py>cy)return;const fist=Math.sin(cr.phase+t*3)>.5;ctx.save();ctx.globalAlpha=cr.al*(fist?.9:.5);ctx.fillStyle=fist?'rgba(255,160,40,1)':'rgba(180,140,80,1)';ctx.beginPath();ctx.arc(px,py,cr.r*(fist?1.3:1),0,Math.PI*2);ctx.fill();ctx.restore();cr.phase+=.03;});
    torches.forEach(tor=>{tor.phase+=tor.spd;const tx=cx+Math.cos(tor.angle)*MR*.98,ty=cy+Math.sin(tor.angle)*MR*.27;if(ty>cy+5)return;ctx.save();ctx.globalAlpha=.7+.2*Math.sin(tor.phase);ctx.shadowColor='rgba(255,100,0,0.9)';ctx.shadowBlur=10;const fg=ctx.createRadialGradient(tx,ty,0,tx,ty,H*.025);fg.addColorStop(0,'rgba(255,200,80,0.9)');fg.addColorStop(1,'rgba(255,60,0,0)');ctx.fillStyle=fg;ctx.beginPath();ctx.arc(tx,ty,H*.025,0,Math.PI*2);ctx.fill();ctx.restore();});
    silver.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.rot+=s.rotSpd;s.life-=.004;if(s.life<=0){s.x=.35+Math.random()*.3;s.y=.5+Math.random()*.3;s.life=.5+Math.random()*.5;s.vx=(Math.random()-.5)*.006;s.vy=(Math.random()-.5)*.006;}ctx.save();ctx.translate(s.x*W,s.y*H);ctx.rotate(s.rot);ctx.globalAlpha=s.al*s.life;ctx.shadowColor='rgba(200,200,150,0.8)';ctx.shadowBlur=4;ctx.fillStyle='rgba(210,200,160,1)';ctx.fillRect(-s.size/2,-s.size/4,s.size,s.size/2);ctx.restore();});
  });
  const rmR=makeResizer(c,()=>{W=c.width;H=c.height;});return()=>{stop();rmR();};
}

/* ── Acts Ch 20 — JUBILEE ───────────────────────────────────────────────────
   Eutychus raised from the dead — "the people were greatly comforted."
   Firework bursts of gold and white. A celebration of life, grace, and the
   unstoppable power of the gospel reaching the ends of the earth. */
function bgJubilee(c){
  let W,H;const ctx=initCanvas(c);W=c.width;H=c.height;
  const HUES=[45,55,35,20,200,15];
  function newBurst(){
    const hue=HUES[Math.floor(Math.random()*HUES.length)];
    return {cx:.1+Math.random()*.8,cy:.05+Math.random()*.7,
      sparks:Array.from({length:55},()=>{
        const a=Math.random()*Math.PI*2,spd=.003+Math.random()*.009;
        return {vx:Math.cos(a)*spd,vy:Math.sin(a)*spd*.75,x:0,y:0,life:1,hue:hue+(Math.random()-.5)*25,r:.8+Math.random()*2.5};
      })};
  }
  const bursts=[];for(let i=0;i<3;i++)bursts.push(newBurst());
  let burstTimer=0;
  const shimmer=Array.from({length:70},()=>({x:Math.random(),y:Math.random(),phase:Math.random()*Math.PI*2,spd:.025+Math.random()*.05,r:.4+Math.random()*1.8,hue:40+Math.random()*40}));
  const stop=mkLoop(()=>{
    W=c.width;H=c.height;
    ctx.fillStyle='rgba(255,252,235,0.16)';ctx.fillRect(0,0,W,H);
    const cg=ctx.createRadialGradient(W/2,H*.45,0,W/2,H*.45,Math.min(W,H)*.7);cg.addColorStop(0,'rgba(255,240,160,0.15)');cg.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
    shimmer.forEach(s=>{s.phase+=s.spd;ctx.save();ctx.globalAlpha=Math.max(0,.25+.75*Math.sin(s.phase))*.55;ctx.shadowColor=`hsl(${s.hue},100%,70%)`;ctx.shadowBlur=5;ctx.fillStyle=`hsl(${s.hue},90%,62%)`;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    burstTimer++;if(burstTimer>32){burstTimer=0;bursts.push(newBurst());}
    for(let bi=bursts.length-1;bi>=0;bi--){
      const b=bursts[bi];let alive=false;
      b.sparks.forEach(s=>{
        s.x+=s.vx;s.y+=s.vy;s.vy+=.00025;s.life-=.013;if(s.life<=0)return;alive=true;
        const px=(b.cx+s.x)*W,py=(b.cy+s.y)*H;
        ctx.save();ctx.globalAlpha=s.life*(.7+.3*Math.sin(s.life*Math.PI));
        ctx.shadowColor=`hsl(${s.hue},100%,72%)`;ctx.shadowBlur=7;
        ctx.fillStyle=`hsl(${s.hue},95%,${48+s.life*35}%)`;
        ctx.beginPath();ctx.arc(px,py,s.r*(.4+s.life*.6),0,Math.PI*2);ctx.fill();
        ctx.restore();
      });
      if(!alive)bursts.splice(bi,1);
    }
  });
  const rmR=makeResizer(c,()=>{W=c.width;H=c.height;});return()=>{stop();rmR();};
}

const LIGHT_CHAPTERS=new Set([3,6,8,15,20]);
const BG_BASE_COLORS={1:'#08031a',2:'#080200',3:'#100800',4:'#020006',5:'#02010a',6:'#010108',7:'#06020e',8:'#060300',9:'#fdf8ef',10:'#020008',11:'#00000a',12:'#02050a',13:'#000208',14:'#050108',15:'#fdf5e8',16:'#010204',17:'#080412',18:'#000000',19:'#060200',20:'#fffcf0'};
const BG_FNS_MAP={1:bgAscension,2:bgPentecost,3:bgBeautifulGate,4:bgChains,5:bgJudgment,6:bgAngelFace,7:bgMartyrdom,8:bgDesertRoad,9:bgMorningLight,10:bgHeavenlySheet,11:bgBlueBoom,12:bgAngelRelease,13:bgLichtenberg,14:bgRising,15:bgCouncilCandles,16:bgMidnightQuake,17:bgAreopagus,18:bgPlasmaWave,19:bgEphesusRiot,20:bgJubilee};

const BgMgr={
  cas:null,stops:[null,null],front:0,current:-1,
  keyMode:false,toolsMode:false,dragMode:false,sectionMode:false,situationMode:false,answerJudgeMode:false,
  savedCh:1,savedChTools:1,savedChDrag:1,savedChSect:1,savedChSit:1,savedChAJ:1,
  init(){this.cas=[document.getElementById('bg-a'),document.getElementById('bg-b')];this.cas[1].style.opacity='0';this.setChapter(1);},
  _crossfade(fn,bgCol,isLight){const bk=1-this.front,cb=this.cas[bk],cf=this.cas[this.front];if(this.stops[bk]){this.stops[bk]();this.stops[bk]=null;}cb.width=window.innerWidth;cb.height=window.innerHeight;this.stops[bk]=fn(cb);cb.style.opacity='0';const pf=this.front;setTimeout(()=>{cb.style.opacity='1';cf.style.opacity='0';setTimeout(()=>{if(this.stops[pf]){this.stops[pf]();this.stops[pf]=null;}this.front=bk;},1350);},80);if(isLight)document.documentElement.classList.add('theme-light');else document.documentElement.classList.remove('theme-light');document.body.style.backgroundColor=bgCol;},
  _any(){return this.keyMode||this.toolsMode||this.dragMode||this.sectionMode||this.situationMode||this.answerJudgeMode;},
  setKeyMode(on){if(on===this.keyMode)return;this.keyMode=on;if(on){this.savedCh=this.current;this.current=-1;this._crossfade(bgFallingKeys,'#040512',false);}else{const ch=this.savedCh||1;this.current=-1;this.setChapter(ch);}},
  setToolsMode(on){if(on===this.toolsMode)return;this.toolsMode=on;if(on){this.savedChTools=this.current;this.current=-1;this._crossfade(bgBlackRipples,'#000',false);}else{const ch=this.savedChTools||1;this.current=-1;this.setChapter(ch);}},
  setDragMode(on){if(on===this.dragMode)return;this.dragMode=on;if(on){this.savedChDrag=this.current;this.current=-1;this._crossfade(bgAmberDrag,'#2a1500',false);}else{const ch=this.savedChDrag||1;this.current=-1;this.setChapter(ch);}},
  setSectionMode(on){if(on===this.sectionMode)return;this.sectionMode=on;if(on){this.savedChSect=this.current;this.current=-1;this._crossfade(bgForestGrid,'#021a0a',false);}else{const ch=this.savedChSect||1;this.current=-1;this.setChapter(ch);}},
  setSituationMode(on){if(on===this.situationMode)return;this.situationMode=on;if(on){this.savedChSit=this.current;this.current=-1;this._crossfade(bgLimeRiceRain,'#6abf30',true);}else{const ch=this.savedChSit||1;this.current=-1;this.setChapter(ch);}},
  setAnswerJudgeMode(on){if(on===this.answerJudgeMode)return;this.answerJudgeMode=on;if(on){this.savedChAJ=this.current;this.current=-1;this._crossfade(bgCrimsonSwirl,'#0a0002',false);}else{const ch=this.savedChAJ||1;this.current=-1;this.setChapter(ch);}},
  setChapter(ch){if(this._any())return;if(ch===this.current)return;this.current=ch;const fn=BG_FNS_MAP[ch];if(!fn){document.body.style.backgroundColor='#0d0221';document.documentElement.classList.remove('theme-light');return;}this._crossfade(fn,BG_BASE_COLORS[ch]||'#0d0221',LIGHT_CHAPTERS.has(ch));}
};

window.BgMgr=BgMgr;
window.bgAmberDrag=bgAmberDrag;
window.bgForestGrid=bgForestGrid;
document.addEventListener('DOMContentLoaded',()=>BgMgr.init());
})();
</script>

<script>
/* ════════════════════════════════════════════════════════════
   COMPETITION CONFIG  —  Upstash Redis
   ════════════════════════════════════════════════════════════

   SETUP — 2 minutes, just an email address:

   1. Go to  https://upstash.com  →  click "Start for free"
      →  sign up with email (or Google)

   2. Click  "Create Database"
      →  give it any name  →  pick any region  →  click Create

   3. On the database page scroll down to  "REST API"
      →  copy the  "UPSTASH_REDIS_REST_URL"  value
      →  copy the  "UPSTASH_REDIS_REST_TOKEN"  value

   4. Paste both below  →  save this file  →  re-upload to Netlify

   ══════════════════════════════════════════════════════════ */
const UPSTASH_URL   = "https://concise-narwhal-4442.upstash.io";
const UPSTASH_TOKEN = "ARFaAAImcDI2NGQ2YzZlYzVlMDQ0YzE5YTk2YmRhMGU5OGVhNWM5ZHAyNDQ0Mg";

/* ── Teams & members ── */
const TEAMS = {
  1: { label:'Team 1', color:'#e85d5d', members:['Bob','Joe','Sue','Levi'] },
  2: { label:'Team 2', color:'#5d9ee8', members:['Bob','Joe','Sue','Levi'] },
  3: { label:'Team 3', color:'#5de88a', members:['Bob','Joe','Sue','Levi'] },
};

function isConfigReady(){
  return !!(UPSTASH_URL && UPSTASH_TOKEN);
}

function round2(n){ return Math.round(n * 100) / 100; }

/* ── Upstash REST helpers ──
   Upstash exposes Redis commands as plain HTTP:
   GET  /get/key
   POST /  with body ["HINCRBYFLOAT", "key", "field", amount]        */
async function upstashCmd(...args){
  const r = await fetch(UPSTASH_URL, {
    method: 'POST',
    headers: { Authorization: 'Bearer '+UPSTASH_TOKEN, 'Content-Type':'application/json' },
    body: JSON.stringify(args)
  });
  if(!r.ok) throw new Error('Upstash error '+r.status);
  const j = await r.json();
  return j.result;
}

async function upstashGet(key){
  const r = await fetch(`${UPSTASH_URL}/get/${encodeURIComponent(key)}`, {
    headers: { Authorization: 'Bearer '+UPSTASH_TOKEN }
  });
  const j = await r.json();
  return j.result;
}

async function loadScores(){
  if(!isConfigReady()) return {};
  /* Read all team+member keys in one MGET pipeline */
  const keys = [];
  [1,2,3].forEach(t=>{
    keys.push(`team${t}:total`);
    TEAMS[t].members.forEach(n=> keys.push(`team${t}:${n}`));
  });
  const pipeline = keys.map(k=>['GET', k]);
  const r = await fetch(`${UPSTASH_URL}/pipeline`, {
    method:'POST',
    headers:{ Authorization:'Bearer '+UPSTASH_TOKEN, 'Content-Type':'application/json' },
    body: JSON.stringify(pipeline)
  });
  const results = await r.json(); // array of {result}
  const out = {};
  keys.forEach((k,i)=>{
    const val = parseFloat(results[i]?.result) || 0;
    const [teamKey, field] = k.split(':');
    if(!out[teamKey]) out[teamKey]={};
    out[teamKey][field] = round2(val);
  });
  return out;
}

async function addPointsDB(team, name, pts){
  if(!isConfigReady()) return;
  const pipeline = [
    ['INCRBYFLOAT', `team${team}:total`, pts],
    ['INCRBYFLOAT', `team${team}:${name}`, pts],
  ];
  await fetch(`${UPSTASH_URL}/pipeline`, {
    method:'POST',
    headers:{ Authorization:'Bearer '+UPSTASH_TOKEN, 'Content-Type':'application/json' },
    body: JSON.stringify(pipeline)
  });
}

    {v:15,t:"These people are not drunk, as you suppose. It's only nine in the morning!"},
    {v:16,t:"No, this is what was spoken by the prophet Joel:"},
    {v:17,t:"\"'In the last days, God says, I will pour out my Spirit on all people. Your sons and daughters will prophesy, your young men will see visions, your old men will dream dreams."},
    {v:18,t:"Even on my servants, both men and women, I will pour out my Spirit in those days, and they will prophesy."},
    {v:19,t:"I will show wonders in the heavens above and signs on the earth below, blood and fire and billows of smoke."},
    {v:20,t:"The sun will be turned to darkness and the moon to blood before the coming of the great and glorious day of the Lord."},
    {v:21,t:"And everyone who calls on the name of the Lord will be saved.'"},
    {v:22,t:"\"Fellow Israelites, listen to this: Jesus of Nazareth was a man accredited by God to you by miracles, wonders and signs, which God did among you through him, as you yourselves know."},
    {v:23,t:"This man was handed over to you by God's deliberate plan and foreknowledge; and you, with the help of wicked men, put him to death by nailing him to the cross."},
    {v:24,t:"But God raised him from the dead, freeing him from the agony of death, because it was impossible for death to keep its hold on him."},
    {v:25,t:"David said about him: \"'I saw the Lord always before me. Because he is at my right hand, I will not be shaken."},
    {v:26,t:"Therefore my heart is glad and my tongue rejoices; my body also will rest in hope,"},
    {v:27,t:"because you will not abandon me to the realm of the dead, you will not let your holy one see decay."},
    {v:28,t:"You have made known to me the paths of life; you will fill me with joy in your presence.'"},
    {v:29,t:"\"Fellow Israelites, I can tell you confidently that the patriarch David died and was buried, and his tomb is here to this day."},
    {v:30,t:"But he was a prophet and knew that God had promised him on oath that he would place one of his descendants on his throne."},
    {v:31,t:"Seeing what was to come, he spoke of the resurrection of the Messiah, that he was not abandoned to the realm of the dead, nor did his body see decay."},
    {v:32,t:"God has raised this Jesus to life, and we are all witnesses of it."},
    {v:33,t:"Exalted to the right hand of God, he has received from the Father the promised Holy Spirit and has poured out what you now see and hear."},
    {v:34,t:"For David did not ascend to heaven, and yet he said, \"'The Lord said to my Lord: \"Sit at my right hand"},
    {v:35,t:"until I make your enemies a footstool for your feet.\"'"},
    {v:36,t:"\"Therefore let all Israel be assured of this: God has made this Jesus, whom you crucified, both Lord and Messiah.\""},
    {v:37,t:"When the people heard this, they were cut to the heart and said to Peter and the other apostles, \"Brothers, what shall we do?\""},
    {v:38,t:"Peter replied, \"Repent and be baptized, every one of you, in the name of Jesus Christ for the forgiveness of your sins. And you will receive the gift of the Holy Spirit."},
    {v:39,t:"The promise is for you and your children and for all who are far off—for all whom the Lord our God will call.\""},
    {v:40,t:"With many other words he warned them; and he pleaded with them, \"Save yourselves from this corrupt generation.\""},
    {v:41,t:"Those who accepted his message were baptized, and about three thousand were added to their number that day."},
    {v:42,t:"They devoted themselves to the apostles' teaching and to the fellowship, to the breaking of bread and to prayer."},
    {v:43,t:"Everyone was filled with awe at the many wonders and signs performed by the apostles."},
    {v:44,t:"All the believers were together and had everything in common."},
    {v:45,t:"They sold property and possessions to give to anyone who had need."},
    {v:46,t:"Every day they continued to meet together in the temple courts. They broke bread in their homes and ate together with glad and sincere hearts,"},
    {v:47,t:"praising God and enjoying the favor of all the people. And the Lord added to their number daily those who were being saved."}
  ]},
  { ch:3, verses:[
    {v:1,t:"One day Peter and John were going up to the temple at the time of prayer—at three in the afternoon."},
    {v:2,t:"Now a man who was lame from birth was being carried to the temple gate called Beautiful, where he was put every day to beg from those going into the temple courts."},
    {v:3,t:"When he saw Peter and John about to enter, he asked them for money."},
    {v:4,t:"Peter looked straight at him, as did John. Then Peter said, \"Look at us!\""},
    {v:5,t:"So the man gave them his attention, expecting to get something from them."},
    {v:6,t:"Then Peter said, \"Silver or gold I do not have, but what I do have I give you. In the name of Jesus Christ of Nazareth, walk.\""},
    {v:7,t:"Taking him by the right hand, he helped him up, and instantly the man's feet and ankles became strong."},
    {v:8,t:"He jumped to his feet and began to walk. Then he went with them into the temple courts, walking and jumping, and praising God."},
    {v:9,t:"When all the people saw him walking and praising God,"},
    {v:10,t:"they recognized him as the same man who used to sit begging at the temple gate called Beautiful, and they were filled with wonder and amazement at what had happened to him."},
    {v:11,t:"While the man held on to Peter and John, all the people were astonished and came running to them in the place called Solomon's Colonnade."},
    {v:12,t:"When Peter saw this, he said to them: \"Fellow Israelites, why does this surprise you? Why do you stare at us as if by our own power or godliness we had made this man walk?"},
    {v:13,t:"The God of Abraham, Isaac and Jacob, the God of our fathers, has glorified his servant Jesus. You handed him over to be killed, and you disowned him before Pilate, though he had decided to let him go."},
    {v:14,t:"You disowned the Holy and Righteous One and asked that a murderer be released to you."},
    {v:15,t:"You killed the author of life, but God raised him from the dead. We are witnesses of this."},
    {v:16,t:"By faith in the name of Jesus, this man whom you see and know was made strong. It is Jesus' name and the faith that comes through him that has completely healed this man, as you can all see."},
    {v:17,t:"\"Now, fellow Israelites, I know that you acted in ignorance, as did your leaders."},
    {v:18,t:"But this is how God fulfilled what he had foretold through all the prophets, saying that his Messiah would suffer."},
    {v:19,t:"Repent, then, and turn to God, so that your sins may be wiped out, that times of refreshing may come from the Lord,"},
    {v:20,t:"and that he may send the Messiah, who has been appointed for you—even Jesus."},
    {v:21,t:"Heaven must receive him until the time comes for God to restore everything, as he promised long ago through his holy prophets."},
    {v:22,t:"For Moses said, 'The Lord your God will raise up for you a prophet like me from among your own people; you must listen to everything he tells you."},
    {v:23,t:"Anyone who does not listen to him will be completely cut off from their people.'"},
    {v:24,t:"\"Indeed, beginning with Samuel, all the prophets who have spoken have foretold these days."},
    {v:25,t:"And you are heirs of the prophets and of the covenant God made with your fathers. He said to Abraham, 'Through your offspring all peoples on earth will be blessed.'"},
    {v:26,t:"When God raised up his servant, he sent him first to you to bless you by turning each of you from your wicked ways.\""}
  ]},
  { ch:4, verses:[
    {v:1,t:"The priests and the captain of the temple guard and the Sadducees came up to Peter and John while they were speaking to the people."},
    {v:2,t:"They were greatly disturbed because the apostles were teaching the people, proclaiming in Jesus the resurrection of the dead."},
    {v:3,t:"They seized Peter and John and, because it was evening, they put them in jail until the next day."},
    {v:4,t:"But many who heard the message believed; so the number of men who believed grew to about five thousand."},
    {v:5,t:"The next day the rulers, the elders and the teachers of the law met in Jerusalem."},
    {v:6,t:"Annas the high priest was there, and so were Caiaphas, John, Alexander and others of the high priest's family."},
    {v:7,t:"They had Peter and John brought before them and began to question them: \"By what power or what name did you do this?\""},
    {v:8,t:"Then Peter, filled with the Holy Spirit, said to them: \"Rulers and elders of the people!"},
    {v:9,t:"If we are being called to account today for an act of kindness shown to a man who was lame and are being asked how he was healed,"},
    {v:10,t:"then know this, you and all the people of Israel: It is by the name of Jesus Christ of Nazareth, whom you crucified but whom God raised from the dead, that this man stands before you healed."},
    {v:11,t:"Jesus is \"'the stone you builders rejected, which has become the cornerstone.'"},
    {v:12,t:"Salvation is found in no one else, for there is no other name under heaven given to mankind by which we must be saved.\""},
    {v:13,t:"When they saw the courage of Peter and John and realized that they were unschooled, ordinary men, they were astonished and they took note that these men had been with Jesus."},
    {v:14,t:"But since they could see the man who had been healed standing there with them, there was nothing they could say."},
    {v:15,t:"So they ordered them to withdraw from the Sanhedrin and then conferred together."},
    {v:16,t:"\"What are we going to do with these men?\" they asked. \"Everyone living in Jerusalem knows they have performed a notable sign, and we cannot deny it."},
    {v:17,t:"But to stop this thing from spreading any further among the people, we must warn them to speak no longer to anyone in this name.\""},
    {v:18,t:"Then they called them in again and commanded them not to speak or teach at all in the name of Jesus."},
    {v:19,t:"But Peter and John replied, \"Judge for yourselves whether it is right in God's sight to obey you rather than God."},
    {v:20,t:"For we cannot help speaking about what we have seen and heard.\""},
    {v:21,t:"After further threats they let them go. They could not decide how to punish them, because all the people were praising God for what had happened."},
    {v:22,t:"For the man who was miraculously healed was over forty years old."},
    {v:23,t:"On their release, Peter and John went back to their own people and reported all that the chief priests and the elders had said to them."},
    {v:24,t:"When they heard this, they raised their voices together in prayer to God. \"Sovereign Lord,\" they said, \"you made the heavens and the earth and the sea, and everything in them."},
    {v:25,t:"You spoke by the Holy Spirit through the mouth of your servant David: \"'Why do the nations rage and the peoples plot in vain?"},
    {v:26,t:"The kings of the earth rise up and the rulers band together against the Lord and against his anointed one.'"},
    {v:27,t:"Indeed Herod and Pontius Pilate met together with the Gentiles and the people of Israel in this city to conspire against your holy servant Jesus, whom you anointed."},
    {v:28,t:"They did what your power and will had decided beforehand should happen."},
    {v:29,t:"Now, Lord, consider their threats and enable your servants to speak your word with great boldness."},
    {v:30,t:"Stretch out your hand to heal and perform signs and wonders through the name of your holy servant Jesus.\""},
    {v:31,t:"After they prayed, the place where they were meeting was shaken. And they were all filled with the Holy Spirit and spoke the word of God boldly."},
    {v:32,t:"All the believers were one in heart and mind. No one claimed that any of their possessions was their own, but they shared everything they had."},
    {v:33,t:"With great power the apostles continued to testify to the resurrection of the Lord Jesus. And God's grace was so powerfully at work in them all"},
    {v:34,t:"that there were no needy persons among them. For from time to time those who owned land or houses sold them, brought the money from the sales"},
    {v:35,t:"and put it at the apostles' feet, and it was distributed to anyone who had need."},
    {v:36,t:"Joseph, a Levite from Cyprus, whom the apostles called Barnabas (which means \"son of encouragement\"),"},
    {v:37,t:"sold a field he owned and brought the money and put it at the apostles' feet."}
  ]},
  { ch:5, verses:[
    {v:1,t:"Now a man named Ananias, together with his wife Sapphira, also sold a piece of property."},
    {v:2,t:"With his wife's full knowledge he kept back part of the money for himself, but brought the rest and put it at the apostles' feet."},
    {v:3,t:"Then Peter said, \"Ananias, how is it that Satan has so filled your heart that you have lied to the Holy Spirit and have kept for yourself some of the money you received for the land?"},
    {v:4,t:"Didn't it belong to you before it was sold? And after it was sold, wasn't the money at your disposal? What made you think of doing such a thing? You have not lied just to us but to God.\""},
    {v:5,t:"When Ananias heard this, he fell down and died. And great fear seized all who heard what had happened."},
    {v:6,t:"Then some young men came forward, wrapped up his body, and carried him out and buried him."},
    {v:7,t:"About three hours later his wife came in, not knowing what had happened."},
    {v:8,t:"Peter asked her, \"Tell me, is this the price you and Ananias got for the land?\" \"Yes,\" she said, \"that is the price.\""},
    {v:9,t:"Peter said to her, \"How could you conspire to test the Spirit of the Lord? Listen! The feet of the men who buried your husband are at the door, and they will carry you out also.\""},
    {v:10,t:"At that moment she fell down at his feet and died. Then the young men came in and, finding her dead, carried her out and buried her beside her husband."},
    {v:11,t:"Great fear seized the whole church and all who heard about these events."},
    {v:12,t:"The apostles performed many signs and wonders among the people. And all the believers used to meet together in Solomon's Colonnade."},
    {v:13,t:"No one else dared join them, even though they were highly regarded by the people."},
    {v:14,t:"Nevertheless, more and more men and women believed in the Lord and were added to their number."},
    {v:15,t:"As a result, people brought the sick into the streets and laid them on beds and mats so that at least Peter's shadow might fall on some of them as he passed by."},
    {v:16,t:"Crowds gathered also from the towns around Jerusalem, bringing their sick and those tormented by impure spirits, and all of them were healed."},
    {v:17,t:"Then the high priest and all his associates, who were members of the party of the Sadducees, were filled with jealousy."},
    {v:18,t:"They arrested the apostles and put them in the public jail."},
    {v:19,t:"But during the night an angel of the Lord opened the doors of the jail and brought them out."},
    {v:20,t:"\"Go, stand in the temple courts,\" he said, \"and tell the people all about this new life.\""},
    {v:21,t:"At daybreak they entered the temple courts, as they had been told, and began to teach the people. When the high priest and his associates arrived, they called together the Sanhedrin—the full assembly of the elders of Israel—and sent to the jail for the apostles."},
    {v:22,t:"But on arriving at the jail, the officers did not find them there. So they went back and reported,"},
    {v:23,t:"\"We found the jail securely locked, with the guards standing at the doors; but when we opened them, we found no one inside.\""},
    {v:24,t:"On hearing this report, the captain of the temple guard and the chief priests were at a loss, wondering what this might lead to."},
    {v:25,t:"Then someone came and said, \"Look! The men you put in jail are standing in the temple courts teaching the people.\""},
    {v:26,t:"At that, the captain went with his officers and brought the apostles. They did not use force, because they feared that the people would stone them."},
    {v:27,t:"The apostles were brought in and made to stand before the Sanhedrin. The high priest questioned them:"},
    {v:28,t:"\"We gave you strict orders not to teach in this name,\" he said. \"Yet you have filled Jerusalem with your teaching and are determined to make us guilty of this man's blood.\""},
    {v:29,t:"Peter and the other apostles replied: \"We must obey God rather than human beings!"},
    {v:30,t:"The God of our ancestors raised Jesus from the dead—whom you killed by hanging him on a cross."},
    {v:31,t:"God exalted him to his own right hand as Prince and Savior that he might bring Israel to repentance and forgive their sins."},
    {v:32,t:"We are witnesses of these things, and so is the Holy Spirit, whom God has given to those who obey him.\""},
    {v:33,t:"When they heard this, they were furious and wanted to put them to death."},
    {v:34,t:"But a Pharisee named Gamaliel, a teacher of the law, who was honored by all the people, stood up in the Sanhedrin and ordered that the men be put outside for a little while."},
    {v:35,t:"Then he addressed the Sanhedrin: \"Men of Israel, consider carefully what you intend to do to these men."},
    {v:36,t:"Some time ago Theudas appeared, claiming to be somebody, and about four hundred men rallied to him. He was killed, all his followers were dispersed, and it all came to nothing."},
    {v:37,t:"After him, Judas the Galilean appeared in the days of the census and led a band of people in revolt. He too was killed, and all his followers were scattered."},
    {v:38,t:"Therefore, in the present case I advise you: Leave these men alone! Let them go! For if their purpose or activity is of human origin, it will fail."},
    {v:39,t:"But if it is from God, you will not be able to stop these men; you will only find yourselves fighting against God.\""},
    {v:40,t:"His speech persuaded them. They called the apostles in and had them flogged. Then they ordered them not to speak in the name of Jesus, and let them go."},
    {v:41,t:"The apostles left the Sanhedrin, rejoicing because they had been counted worthy of suffering disgrace for the Name."},
    {v:42,t:"Day after day, in the temple courts and from house to house, they never stopped teaching and proclaiming the good news that Jesus is the Messiah."}
  ]},
  { ch:6, verses:[
    {v:1,t:"In those days when the number of disciples was increasing, the Hellenistic Jews among them complained against the Hebraic Jews because their widows were being overlooked in the daily distribution of food."},
    {v:2,t:"So the Twelve gathered all the disciples together and said, \"It would not be right for us to neglect the ministry of the word of God in order to wait on tables."},
    {v:3,t:"Brothers and sisters, choose seven men from among you who are known to be full of the Spirit and wisdom. We will turn this responsibility over to them"},
    {v:4,t:"and will give our attention to prayer and the ministry of the word.\""},
    {v:5,t:"This proposal pleased the whole group. They chose Stephen, a man full of faith and of the Holy Spirit; also Philip, Procorus, Nicanor, Timon, Parmenas, and Nicolas from Antioch, a convert to Judaism."},
    {v:6,t:"They presented these men to the apostles, who prayed and laid their hands on them."},
    {v:7,t:"So the word of God spread. The number of disciples in Jerusalem increased rapidly, and a large number of priests became obedient to the faith."},
    {v:8,t:"Now Stephen, a man full of God's grace and power, performed great wonders and signs among the people."},
    {v:9,t:"Opposition arose, however, from members of the Synagogue of the Freedmen (as it was called)—Jews of Cyrene and Alexandria as well as the provinces of Cilicia and Asia—who began to argue with Stephen."},
    {v:10,t:"But they could not stand up against the wisdom the Spirit gave him as he spoke."},
    {v:11,t:"Then they secretly persuaded some men to say, \"We have heard Stephen speak blasphemous words against Moses and against God.\""},
    {v:12,t:"So they stirred up the people and the elders and the teachers of the law. They seized Stephen and brought him before the Sanhedrin."},
    {v:13,t:"They produced false witnesses, who testified, \"This fellow never stops speaking against this holy place and against the law."},
    {v:14,t:"For we have heard him say that this Jesus of Nazareth will destroy this place and change the customs Moses handed down to us.\""},
    {v:15,t:"All who were sitting in the Sanhedrin looked intently at Stephen, and they saw that his face was like the face of an angel."}
  ]},
  { ch:7, verses:[
    {v:1,t:"Then the high priest asked Stephen, \"Are these charges true?\""},
    {v:2,t:"To this he replied: \"Brothers and fathers, listen to me! The God of glory appeared to our father Abraham while he was still in Mesopotamia, before he lived in Harran."},
    {v:3,t:"'Leave your country and your people,' God said, 'and go to the land I will show you.'"},
    {v:4,t:"So he left the land of the Chaldeans and settled in Harran. After the death of his father, God sent him to this land where you are now living."},
    {v:5,t:"He gave him no inheritance here, not even enough ground to set his foot on. But God promised him that he and his descendants after him would possess the land, even though at that time Abraham had no child."},
    {v:6,t:"God spoke to him in this way: 'For four hundred years your descendants will be strangers in a country not their own, and they will be enslaved and mistreated."},
    {v:7,t:"But I will punish the nation they serve as slaves,' God said, 'and afterward they will come out of that country and worship me in this place.'"},
    {v:8,t:"Then he gave Abraham the covenant of circumcision. And Abraham became the father of Isaac and circumcised him eight days after his birth. Later Isaac became the father of Jacob, and Jacob became the father of the twelve patriarchs."},
    {v:9,t:"Because the patriarchs were jealous of Joseph, they sold him as a slave into Egypt. But God was with him"},
    {v:10,t:"and rescued him from all his troubles. He gave Joseph wisdom and enabled him to gain the goodwill of Pharaoh king of Egypt. So Pharaoh made him ruler over Egypt and all his palace."},
    {v:11,t:"Then a famine struck all Egypt and Canaan, bringing great suffering, and our ancestors could not find food."},
    {v:12,t:"When Jacob heard that there was grain in Egypt, he sent our forefathers on their first visit."},
    {v:13,t:"On their second visit, Joseph told his brothers who he was, and Pharaoh learned about Joseph's family."},
    {v:14,t:"After this, Joseph sent for his father Jacob and his whole family, seventy-five in all."},
    {v:15,t:"Then Jacob went down to Egypt, where he and our ancestors died."},
    {v:16,t:"Their bodies were brought back to Shechem and placed in the tomb that Abraham had bought from the sons of Hamor at Shechem for a certain sum of money."},
    {v:17,t:"As the time drew near for God to fulfill his promise to Abraham, the number of our people in Egypt had greatly increased."},
    {v:18,t:"Then 'a new king, to whom Joseph meant nothing, came to power in Egypt.'"},
    {v:19,t:"He dealt treacherously with our people and oppressed our ancestors by forcing them to throw out their newborn babies so that they would die."},
    {v:20,t:"At that time Moses was born, and he was no ordinary child. For three months he was cared for by his family."},
    {v:21,t:"When he was placed outside, Pharaoh's daughter took him and brought him up as her own son."},
    {v:22,t:"Moses was educated in all the wisdom of the Egyptians and was powerful in speech and action."},
    {v:23,t:"When Moses was forty years old, he decided to visit his own people, the Israelites."},
    {v:24,t:"He saw one of them being mistreated by an Egyptian, so he went to his defense and avenged him by killing the Egyptian."},
    {v:25,t:"Moses thought that his own people would realize that God was using him to rescue them, but they did not."},
    {v:26,t:"The next day Moses came upon two Israelites who were fighting. He tried to reconcile them by saying, 'Men, you are brothers; why do you want to hurt each other?'"},
    {v:27,t:"But the man who was mistreating the other pushed Moses aside and said, 'Who made you ruler and judge over us?"},
    {v:28,t:"Do you want to kill me as you killed the Egyptian yesterday?'"},
    {v:29,t:"When Moses heard this, he fled to Midian, where he settled as a foreigner and had two sons."},
    {v:30,t:"After forty years had passed, an angel appeared to Moses in the flames of a burning bush in the desert near Mount Sinai."},
    {v:31,t:"When he saw this, he was amazed at the sight. As he went over to get a closer look, he heard the Lord say:"},
    {v:32,t:"'I am the God of your fathers, the God of Abraham, Isaac and Jacob.' Moses trembled with fear and did not dare to look."},
    {v:33,t:"Then the Lord said to him, 'Take off your sandals, for the place where you are standing is holy ground."},
    {v:34,t:"I have indeed seen the oppression of my people in Egypt. I have heard their groaning and have come down to set them free. Now come, I will send you back to Egypt.'"},
    {v:35,t:"This is the same Moses they had rejected with the words, 'Who made you ruler and judge?' He was sent to be their ruler and deliverer by God himself, through the angel who appeared to him in the bush."},
    {v:36,t:"He led them out of Egypt and performed wonders and signs in Egypt, at the Red Sea and for forty years in the wilderness."},
    {v:37,t:"This is the Moses who told the Israelites, 'God will raise up for you a prophet like me from your own people.'"},
    {v:38,t:"He was in the assembly in the wilderness, with the angel who spoke to him on Mount Sinai, and with our ancestors; and he received living words to pass on to us."},
    {v:39,t:"But our ancestors refused to obey him. Instead, they rejected him and in their hearts turned back to Egypt."},
    {v:40,t:"They told Aaron, 'Make us gods who will go before us. As for this fellow Moses who led us out of Egypt—we don't know what has happened to him!'"},
    {v:41,t:"That is the time they made an idol in the form of a calf. They brought sacrifices to it and reveled in what their own hands had made."},
    {v:42,t:"But God turned away from them and gave them over to the worship of the sun, moon and stars. This agrees with what is written in the book of the prophets: \"'Did you bring me sacrifices and offerings forty years in the wilderness, people of Israel?"},
    {v:43,t:"You have taken up the tabernacle of Molek and the star of your god Rephan, the idols you made to worship. Therefore I will send you into exile' beyond Babylon."},
    {v:44,t:"Our ancestors had the tabernacle of the covenant law with them in the wilderness. It had been made as God directed Moses, according to the pattern he had seen."},
    {v:45,t:"After receiving the tabernacle, our ancestors under Joshua brought it with them when they took the land from the nations God drove out before them. It remained in the land until the time of David,"},
    {v:46,t:"who enjoyed God's favor and asked that he might provide a dwelling place for the God of Jacob."},
    {v:47,t:"But it was Solomon who built a house for him."},
    {v:48,t:"However, the Most High does not live in houses made by human hands. As the prophet says:"},
    {v:49,t:"\"'Heaven is my throne, and the earth is my footstool. What kind of house will you build for me? says the Lord. Or where will my resting place be?"},
    {v:50,t:"Has not my hand made all these things?'"},
    {v:51,t:"You stiff-necked people! Your hearts and ears are still uncircumcised. You are just like your ancestors: You always resist the Holy Spirit!"},
    {v:52,t:"Was there ever a prophet your ancestors did not persecute? They even killed those who predicted the coming of the Righteous One. And now you have betrayed and murdered him—"},
    {v:53,t:"you who have received the law that was given through angels but have not obeyed it.\""},
    {v:54,t:"When the members of the Sanhedrin heard this, they were furious and gnashed their teeth at him."},
    {v:55,t:"But Stephen, full of the Holy Spirit, looked up to heaven and saw the glory of God, and Jesus standing at the right hand of God."},
    {v:56,t:"\"Look,\" he said, \"I see heaven open and the Son of Man standing at the right hand of God.\""},
    {v:57,t:"At this they covered their ears and, yelling at the top of their voices, they all rushed at him,"},
    {v:58,t:"dragged him out of the city and began to stone him. Meanwhile, the witnesses laid their coats at the feet of a young man named Saul."},
    {v:59,t:"While they were stoning him, Stephen prayed, \"Lord Jesus, receive my spirit.\""},
    {v:60,t:"Then he knelt down and cried out, \"Lord, do not hold this sin against them.\" When he had said this, he fell asleep."}
  ]},
  { ch:8, verses:[
    {v:1,t:"And Saul approved of their killing him. On that day a great persecution broke out against the church in Jerusalem, and all except the apostles were scattered throughout Judea and Samaria."},
    {v:2,t:"Godly men buried Stephen and mourned deeply for him."},
    {v:3,t:"But Saul began to destroy the church. Going from house to house, he dragged off both men and women and put them in prison."},
    {v:4,t:"Those who had been scattered preached the word wherever they went."},
    {v:5,t:"Philip went down to a city in Samaria and proclaimed the Messiah there."},
    {v:6,t:"When the crowds heard Philip and saw the signs he performed, they all paid close attention to what he said."},
    {v:7,t:"For with shrieks, impure spirits came out of many, and many who were paralyzed or lame were healed."},
    {v:8,t:"So there was great joy in that city."},
    {v:9,t:"Now for some time a man named Simon had practiced sorcery in the city and amazed all the people of Samaria. He boasted that he was someone great,"},
    {v:10,t:"and all the people, both high and low, gave him their attention and exclaimed, \"This man is rightly called the Great Power of God.\""},
    {v:11,t:"They followed him because he had amazed them for a long time with his sorcery."},
    {v:12,t:"But when they believed Philip as he proclaimed the good news of the kingdom of God and the name of Jesus Christ, they were baptized, both men and women."},
    {v:13,t:"Simon himself believed and was baptized. And he followed Philip everywhere, astonished by the great signs and miracles he saw."},
    {v:14,t:"When the apostles in Jerusalem heard that Samaria had accepted the word of God, they sent Peter and John to Samaria."},
    {v:15,t:"When they arrived, they prayed for the new believers there that they might receive the Holy Spirit,"},
    {v:16,t:"because the Holy Spirit had not yet come on any of them; they had simply been baptized in the name of the Lord Jesus."},
    {v:17,t:"Then Peter and John placed their hands on them, and they received the Holy Spirit."},
    {v:18,t:"When Simon saw that the Spirit was given at the laying on of the apostles' hands, he offered them money"},
    {v:19,t:"and said, \"Give me also this ability so that everyone on whom I lay my hands may receive the Holy Spirit.\""},
    {v:20,t:"Peter answered: \"May your money perish with you, because you thought you could buy the gift of God with money!"},
    {v:21,t:"You have no part or share in this ministry, because your heart is not right before God."},
    {v:22,t:"Repent of this wickedness and pray to the Lord in the hope that he may forgive you for having such a thought in your heart."},
    {v:23,t:"For I see that you are full of bitterness and captive to sin.\""},
    {v:24,t:"Then Simon answered, \"Pray to the Lord for me so that nothing you have said may happen to me.\""},
    {v:25,t:"After they had further proclaimed the word of the Lord and testified about Jesus, Peter and John returned to Jerusalem, preaching the gospel in many Samaritan villages."},
    {v:26,t:"Now an angel of the Lord said to Philip, \"Go south to the road—the desert road—that goes down from Jerusalem to Gaza.\""},
    {v:27,t:"So he started out, and on his way he met an Ethiopian eunuch, an important official in charge of all the treasury of the Kandake (which means \"queen of the Ethiopians\"). This man had gone to Jerusalem to worship,"},
    {v:28,t:"and on his way home was sitting in his chariot reading the Book of Isaiah the prophet."},
    {v:29,t:"The Spirit told Philip, \"Go to that chariot and stay near it.\""},
    {v:30,t:"When Philip ran up to the chariot and heard the man reading Isaiah the prophet, he asked, \"Do you understand what you are reading?\""},
    {v:31,t:"\"How can I,\" he said, \"unless someone explains it to me?\" So he invited Philip to come up and sit with him."},
    {v:32,t:"This is the passage of Scripture the eunuch was reading: \"He was led like a sheep to the slaughter, and as a lamb before its shearer is silent, so he did not open his mouth;"},
    {v:33,t:"in his humiliation he was deprived of justice. Who can speak of his descendants? For his life was taken from the earth.\""},
    {v:34,t:"The eunuch asked Philip, \"Tell me, please, who is the prophet talking about, himself or someone else?\""},
    {v:35,t:"Then Philip began with that very passage of Scripture and told him the good news about Jesus."},
    {v:36,t:"As they traveled along the road, they came to some water and the eunuch said, \"Look, here is water. What can prevent me from being baptized?\""},
    {v:37,t:"Philip said, \"If you believe with all your heart, you may.\" The eunuch answered, \"I believe that Jesus Christ is the Son of God.\""},
    {v:38,t:"And he gave orders to stop the chariot. Then both Philip and the eunuch went down into the water and Philip baptized him."},
    {v:39,t:"When they came up out of the water, the Spirit of the Lord suddenly took Philip away, and the eunuch did not see him again, but went on his way rejoicing."},
    {v:40,t:"Philip, however, appeared at Azotus and traveled about, preaching the gospel in all the towns until he reached Caesarea."}
  ]},
  { ch:9, verses:[
    {v:1,t:"Meanwhile, Saul was still breathing out murderous threats against the Lord's disciples. He went to the high priest"},
    {v:2,t:"and asked him for letters to the synagogues in Damascus, so that if he found any there who belonged to the Way, whether men or women, he might take them as prisoners to Jerusalem."},
    {v:3,t:"As he neared Damascus on his journey, suddenly a light from heaven flashed around him."},
    {v:4,t:"He fell to the ground and heard a voice say to him, \"Saul, Saul, why do you persecute me?\""},
    {v:5,t:"\"Who are you, Lord?\" Saul asked. \"I am Jesus, whom you are persecuting,\" he replied."},
    {v:6,t:"\"Now get up and go into the city, and you will be told what you must do.\""},
    {v:7,t:"The men traveling with Saul stood there speechless; they heard the sound but did not see anyone."},
    {v:8,t:"Saul got up from the ground, but when he opened his eyes he could see nothing. So they led him by the hand into Damascus."},
    {v:9,t:"For three days he was blind, and did not eat or drink anything."},
    {v:10,t:"In Damascus there was a disciple named Ananias. The Lord called to him in a vision, \"Ananias!\" \"Yes, Lord,\" he answered."},
    {v:11,t:"The Lord told him, \"Go to the house of Judas on Straight Street and ask for a man from Tarsus named Saul, for he is praying."},
    {v:12,t:"In a vision he has seen a man named Ananias come and place his hands on him to restore his sight.\""},
    {v:13,t:"\"Lord,\" Ananias answered, \"I have heard many reports about this man and all the harm he has done to your holy people in Jerusalem."},
    {v:14,t:"And he has come here with authority from the chief priests to arrest all who call on your name.\""},
    {v:15,t:"But the Lord said to Ananias, \"Go! This man is my chosen instrument to proclaim my name to the Gentiles and their kings and to the people of Israel."},
    {v:16,t:"I will show him how much he must suffer for my name.\""},
    {v:17,t:"Then Ananias went to the house and entered it. Placing his hands on Saul, he said, \"Brother Saul, the Lord—Jesus, who appeared to you on the road as you were coming here—has sent me so that you may see again and be filled with the Holy Spirit.\""},
    {v:18,t:"Immediately, something like scales fell from Saul's eyes, and he could see again. He got up and was baptized,"},
    {v:19,t:"and after taking some food, he regained his strength. Saul spent several days with the disciples in Damascus."},
    {v:20,t:"At once he began to preach in the synagogues that Jesus is the Son of God."},
    {v:21,t:"All those who heard him were astonished and asked, \"Isn't he the man who raised havoc in Jerusalem among those who call on this name? And hasn't he come here to take them as prisoners to the chief priests?\""},
    {v:22,t:"Yet Saul grew more and more powerful and baffled the Jews living in Damascus by proving that Jesus is the Messiah."},
    {v:23,t:"After many days had gone by, there was a conspiracy among the Jews to kill him,"},
    {v:24,t:"but Saul learned of their plan. Day and night they kept close watch on the city gates in order to kill him."},
    {v:25,t:"But his followers took him by night and lowered him in a basket through an opening in the wall."},
    {v:26,t:"When Saul came to Jerusalem, he tried to join the disciples, but they were all afraid of him, not believing that he really was a disciple."},
    {v:27,t:"But Barnabas took him and brought him to the apostles. He told them how Saul on his journey had seen the Lord and that the Lord had spoken to him, and how in Damascus he had preached fearlessly in the name of Jesus."},
    {v:28,t:"So Saul stayed with them and moved about freely in Jerusalem, speaking boldly in the name of the Lord."},
    {v:29,t:"He talked and debated with the Hellenistic Jews, but they tried to kill him."},
    {v:30,t:"When the believers learned of this, they took him down to Caesarea and sent him off to Tarsus."},
    {v:31,t:"Then the church throughout Judea, Galilee and Samaria enjoyed a time of peace and was strengthened. Living in the fear of the Lord and encouraged by the Holy Spirit, it increased in numbers."},
    {v:32,t:"As Peter traveled about the country, he came to God's people who lived in Lydda."},
    {v:33,t:"There he found a man named Aeneas, who had been bedridden for eight years because he was paralyzed."},
    {v:34,t:"\"Aeneas,\" Peter said to him, \"Jesus Christ heals you. Get up and roll up your mat.\" Immediately Aeneas got up."},
    {v:35,t:"All those who lived in Lydda and Sharon saw him and turned to the Lord."},
    {v:36,t:"In Joppa there was a disciple named Tabitha (in Greek her name is Dorcas); she was always doing good and helping the poor."},
    {v:37,t:"About that time she became sick and died, and her body was washed and placed in an upstairs room."},
    {v:38,t:"Lydda was near Joppa; so when the disciples heard that Peter was in Lydda, they sent two men to him and urged him, \"Please come at once!\""},
    {v:39,t:"Peter went with them, and when he arrived he was taken upstairs to the room. All the widows stood around him, crying and showing him the robes and other clothing that Dorcas had made while she was still with them."},
    {v:40,t:"Peter sent them all out of the room; then he got down on his knees and prayed. Turning toward the dead woman, he said, \"Tabitha, get up.\" She opened her eyes, and seeing Peter she sat up."},
    {v:41,t:"He took her by the hand and helped her to her feet. Then he called for the believers, especially the widows, and presented her to them alive."},
    {v:42,t:"This became known all over Joppa, and many people believed in the Lord."},
    {v:43,t:"Peter stayed in Joppa for some time with a tanner named Simon."}
  ]},
  { ch:10, verses:[
    {v:1,t:"At Caesarea there was a man named Cornelius, a centurion in what was known as the Italian Regiment."},
    {v:2,t:"He and all his family were devout and God-fearing; he gave generously to those in need and prayed to God regularly."},
    {v:3,t:"One day at about three in the afternoon he had a vision. He distinctly saw an angel of God, who came to him and said, \"Cornelius!\""},
    {v:4,t:"Cornelius stared at him in fear. \"What is it, Lord?\" he asked. The angel answered, \"Your prayers and gifts to the poor have come up as a memorial offering before God."},
    {v:5,t:"Now send men to Joppa to bring back a man named Simon who is called Peter."},
    {v:6,t:"He is staying with Simon the tanner, whose house is by the sea.\""},
    {v:7,t:"When the angel who spoke to him had gone, Cornelius called two of his servants and a devout soldier who was one of his attendants."},
    {v:8,t:"He told them everything that had happened and sent them to Joppa."},
    {v:9,t:"About noon the following day as they were on their journey and approaching the city, Peter went up on the roof to pray."},
    {v:10,t:"He became hungry and wanted something to eat, and while the meal was being prepared, he fell into a trance."},
    {v:11,t:"He saw heaven opened and something like a large sheet being let down to earth by its four corners."},
    {v:12,t:"It contained all kinds of four-footed animals, as well as reptiles and birds."},
    {v:13,t:"Then a voice told him, \"Get up, Peter. Kill and eat.\""},
    {v:14,t:"\"Surely not, Lord!\" Peter replied. \"I have never eaten anything impure or unclean.\""},
    {v:15,t:"The voice spoke to him a second time, \"Do not call anything impure that God has made clean.\""},
    {v:16,t:"This happened three times, and immediately the sheet was taken back to heaven."},
    {v:17,t:"While Peter was wondering about the meaning of the vision, the men sent by Cornelius found out where Simon's house was and stopped at the gate."},
    {v:18,t:"They called out, asking if Simon who was known as Peter was staying there."},
    {v:19,t:"While Peter was still thinking about the vision, the Spirit said to him, \"Simon, three men are looking for you."},
    {v:20,t:"So get up and go downstairs. Do not hesitate to go with them, for I have sent them.\""},
    {v:21,t:"Peter went down and said to the men, \"I'm the one you're looking for. Why have you come?\""},
    {v:22,t:"The men replied, \"We have come from Cornelius the centurion. He is a righteous and God-fearing man, who is respected by all the Jewish people. A holy angel told him to ask you to come to his house so that he could hear what you have to say.\""},
    {v:23,t:"Then Peter invited the men in and gave them lodging. The next day Peter started out with them, and some of the believers from Joppa went along."},
    {v:24,t:"The following day he arrived in Caesarea. Cornelius was expecting them and had called together his relatives and close friends."},
    {v:25,t:"As Peter entered the house, Cornelius met him and fell at his feet in reverence."},
    {v:26,t:"But Peter made him get up. \"Stand up,\" he said, \"I am only a man myself.\""},
    {v:27,t:"While talking with him, Peter went inside and found a large gathering of people."},
    {v:28,t:"He said to them: \"You are well aware that it is against our law for a Jew to associate with or visit a Gentile. But God has shown me that I should not call anyone impure or unclean."},
    {v:29,t:"So when I was sent for, I came without raising any objection. May I ask why you sent for me?\""},
    {v:30,t:"Cornelius answered: \"Three days ago I was in my house praying at this hour, at three in the afternoon. Suddenly a man in shining clothes stood before me"},
    {v:31,t:"and said, 'Cornelius, God has heard your prayer and remembered your gifts to the poor."},
    {v:32,t:"Send to Joppa for Simon who is called Peter. He is a guest in the home of Simon the tanner, who lives by the sea.'"},
    {v:33,t:"So I sent for you immediately, and it was good of you to come. Now we are all here in the presence of God to listen to everything the Lord has commanded you to tell us.\""},
    {v:34,t:"Then Peter began to speak: \"I now realize how true it is that God does not show favoritism"},
    {v:35,t:"but accepts from every nation the one who fears him and does what is right."},
    {v:36,t:"You know the message God sent to the people of Israel, announcing the good news of peace through Jesus Christ, who is Lord of all."},
    {v:37,t:"You know what has happened throughout the province of Judea, beginning in Galilee after the baptism that John preached—"},
    {v:38,t:"how God anointed Jesus of Nazareth with the Holy Spirit and power, and how he went around doing good and healing all who were under the power of the devil, because God was with him."},
    {v:39,t:"We are witnesses of everything he did in the country of the Jews and in Jerusalem. They killed him by hanging him on a cross,"},
    {v:40,t:"but God raised him from the dead on the third day and caused him to be seen."},
    {v:41,t:"He was not seen by all the people, but by witnesses whom God had already chosen—by us who ate and drank with him after he rose from the dead."},
    {v:42,t:"He commanded us to preach to the people and to testify that he is the one whom God appointed as judge of the living and the dead."},
    {v:43,t:"All the prophets testify about him that everyone who believes in him receives forgiveness of sins through his name.\""},
    {v:44,t:"While Peter was still speaking these words, the Holy Spirit came on all who heard the message."},
    {v:45,t:"The circumcised believers who had come with Peter were astonished that the gift of the Holy Spirit had been poured out even on Gentiles."},
    {v:46,t:"For they heard them speaking in tongues and praising God. Then Peter said,"},
    {v:47,t:"\"Surely no one can stand in the way of their being baptized with water. They have received the Holy Spirit just as we have.\""},
    {v:48,t:"So he ordered that they be baptized in the name of Jesus Christ. Then they asked Peter to stay with them for a few days."}
  ]},
  { ch:11, verses:[
    {v:1,t:"The apostles and the believers throughout Judea heard that the Gentiles also had received the word of God."},
    {v:2,t:"So when Peter went up to Jerusalem, the circumcised believers criticized him"},
    {v:3,t:"and said, \"You went into the house of uncircumcised men and ate with them.\""},
    {v:4,t:"Starting from the beginning, Peter told them the whole story:"},
    {v:5,t:"\"I was in the city of Joppa praying, and in a trance I saw a vision. I saw something like a large sheet being let down from heaven by its four corners, and it came down to where I was."},
    {v:6,t:"I looked into it and saw four-footed animals of the earth, wild beasts, reptiles and birds."},
    {v:7,t:"Then I heard a voice telling me, 'Get up, Peter. Kill and eat.'"},
    {v:8,t:"\"I replied, 'Surely not, Lord! Nothing impure or unclean has ever entered my mouth.'"},
    {v:9,t:"\"The voice spoke from heaven a second time, 'Do not call anything impure that God has made clean.'"},
    {v:10,t:"This happened three times, and then it was all pulled up to heaven again."},
    {v:11,t:"\"Right then three men who had been sent to me from Caesarea stopped at the house where I was staying."},
    {v:12,t:"The Spirit told me to have no hesitation about going with them. These six brothers also went with me, and we entered the man's house."},
    {v:13,t:"He told us how he had seen an angel appear in his house and say, 'Send to Joppa for Simon who is called Peter."},
    {v:14,t:"He will bring you a message through which you and all your household will be saved.'"},
    {v:15,t:"\"As I began to speak, the Holy Spirit came on them as he had come on us at the beginning."},
    {v:16,t:"Then I remembered what the Lord had said: 'John baptized with water, but you will be baptized with the Holy Spirit.'"},
    {v:17,t:"So if God gave them the same gift he gave us who believed in the Lord Jesus Christ, who was I to think that I could stand in God's way?\""},
    {v:18,t:"When they heard this, they had no further objections and praised God, saying, \"So then, even to Gentiles God has granted repentance that leads to life.\""},
    {v:19,t:"Now those who had been scattered by the persecution that broke out when Stephen was killed traveled as far as Phoenicia, Cyprus and Antioch, spreading the word only among Jews."},
    {v:20,t:"Some of them, however, men from Cyprus and Cyrene, went to Antioch and began to speak to Greeks also, telling them the good news about the Lord Jesus."},
    {v:21,t:"The Lord's hand was with them, and a great number of people believed and turned to the Lord."},
    {v:22,t:"News of this reached the church in Jerusalem, and they sent Barnabas to Antioch."},
    {v:23,t:"When he arrived and saw what the grace of God had done, he was glad and encouraged them all to remain true to the Lord with all their hearts."},
    {v:24,t:"He was a good man, full of the Holy Spirit and faith, and a great number of people were brought to the Lord."},
    {v:25,t:"Then Barnabas went to Tarsus to look for Saul,"},
    {v:26,t:"and when he found him, he brought him to Antioch. So for a whole year Barnabas and Saul met with the church and taught great numbers of people. The disciples were called Christians first at Antioch."},
    {v:27,t:"During this time some prophets came down from Jerusalem to Antioch."},
    {v:28,t:"One of them, named Agabus, stood up and through the Spirit predicted that a severe famine would spread over the entire Roman world. (This happened during the reign of Claudius.)"},
    {v:29,t:"The disciples, as each one was able, decided to provide help for the brothers and sisters living in Judea."},
    {v:30,t:"This they did, sending their gift to the elders by Barnabas and Saul."}
  ]},
  { ch:12, verses:[
    {v:1,t:"It was about this time that King Herod arrested some who belonged to the church, intending to persecute them."},
    {v:2,t:"He had James, the brother of John, put to death with the sword."},
    {v:3,t:"When he saw that this met with approval among the Jews, he proceeded to seize Peter also. This happened during the Festival of Unleavened Bread."},
    {v:4,t:"After arresting him, he put him in prison, handing him over to be guarded by four squads of four soldiers each. Herod intended to bring him out for public trial after the Passover."},
    {v:5,t:"So Peter was kept in prison, but the church was earnestly praying to God for him."},
    {v:6,t:"The night before Herod was to bring him to trial, Peter was sleeping between two soldiers, bound with two chains, and sentries stood guard at the entrance."},
    {v:7,t:"Suddenly an angel of the Lord appeared and a light shone in the cell. He struck Peter on the side and woke him up. \"Quick, get up!\" he said, and the chains fell off Peter's wrists."},
    {v:8,t:"Then the angel said to him, \"Put on your clothes and sandals.\" And Peter did so. \"Wrap your cloak around you and follow me,\" the angel told him."},
    {v:9,t:"Peter followed him out of the prison, but he had no idea that what the angel was doing was really happening; he thought he was seeing a vision."},
    {v:10,t:"They passed the first and second guards and came to the iron gate leading to the city. It opened for them by itself, and they went through it. When they had walked the length of one street, suddenly the angel left him."},
    {v:11,t:"Then Peter came to himself and said, \"Now I know without a doubt that the Lord has sent his angel and rescued me from Herod's clutches and from everything the Jewish people were hoping would happen.\""},
    {v:12,t:"When this had dawned on him, he went to the house of Mary the mother of John, also called Mark, where many people had gathered and were praying."},
    {v:13,t:"Peter knocked at the outer entrance, and a servant named Rhoda came to answer the door."},
    {v:14,t:"When she recognized Peter's voice, she was so overjoyed she ran back without opening it and exclaimed, \"Peter is at the door!\""},
    {v:15,t:"\"You're out of your mind,\" they told her. When she kept insisting that it was so, they said, \"It must be his angel.\""},
    {v:16,t:"But Peter kept on knocking, and when they opened the door and saw him, they were astonished."},
    {v:17,t:"Peter motioned with his hand for them to be quiet and described how the Lord had brought him out of prison. \"Tell James and the other brothers and sisters about this,\" he said, and then he left for another place."},
    {v:18,t:"In the morning, there was no small commotion among the soldiers as to what had become of Peter."},
    {v:19,t:"After Herod had a thorough search made for him and did not find him, he cross-examined the guards and ordered that they be executed. Then Herod went from Judea to Caesarea and stayed there."},
    {v:20,t:"He had been quarreling with the people of Tyre and Sidon; they now joined together and sought an audience with him. After securing the support of Blastus, a trusted personal servant of the king, they asked for peace, because they depended on the king's country for their food supply."},
    {v:21,t:"On the appointed day Herod, wearing his royal robes, sat on his throne and delivered a public address to the people."},
    {v:22,t:"They shouted, \"This is the voice of a god, not of a man.\""},
    {v:23,t:"Immediately, because Herod did not give praise to God, an angel of the Lord struck him down, and he was eaten by worms and died."},
    {v:24,t:"But the word of God continued to spread and flourish."},
    {v:25,t:"When Barnabas and Saul had finished their mission, they returned from Jerusalem, taking with them John, also called Mark."}
  ]},
  { ch:13, verses:[
    {v:1,t:"Now in the church at Antioch there were prophets and teachers: Barnabas, Simeon called Niger, Lucius of Cyrene, Manaen (who had been brought up with Herod the tetrarch) and Saul."},
    {v:2,t:"While they were worshiping the Lord and fasting, the Holy Spirit said, \"Set apart for me Barnabas and Saul for the work to which I have called them.\""},
    {v:3,t:"So after they had fasted and prayed, they placed their hands on them and sent them off."},
    {v:4,t:"The two of them, sent on their way by the Holy Spirit, went down to Seleucia and sailed from there to Cyprus."},
    {v:5,t:"When they arrived at Salamis, they proclaimed the word of God in the Jewish synagogues. John was with them as their helper."},
    {v:6,t:"They traveled through the whole island until they came to Paphos. There they met a Jewish sorcerer and false prophet named Bar-Jesus,"},
    {v:7,t:"who was an attendant of the proconsul, Sergius Paulus. The proconsul, an intelligent man, sent for Barnabas and Saul because he wanted to hear the word of God."},
    {v:8,t:"But Elymas the sorcerer (for that is what his name means) opposed them and tried to turn the proconsul from the faith."},
    {v:9,t:"Then Saul, who was also called Paul, filled with the Holy Spirit, looked straight at Elymas and said,"},
    {v:10,t:"\"You are a child of the devil and an enemy of everything that is right! You are full of all kinds of deceit and trickery. Will you never stop perverting the right ways of the Lord?"},
    {v:11,t:"Now the hand of the Lord is against you. You are going to be blind for a time, not even able to see the light of the sun.\" Immediately mist and darkness came over him, and he groped about, seeking someone to lead him by the hand."},
    {v:12,t:"When the proconsul saw what had happened, he believed, for he was amazed at the teaching about the Lord."},
    {v:13,t:"From Paphos, Paul and his companions sailed to Perga in Pamphylia, where John left them to return to Jerusalem."},
    {v:14,t:"From Perga they went on to Pisidian Antioch. On the Sabbath they entered the synagogue and sat down."},
    {v:15,t:"After the reading from the Law and the Prophets, the leaders of the synagogue sent word to them, saying, \"Brothers, if you have a word of exhortation for the people, please speak.\""},
    {v:16,t:"Standing up, Paul motioned with his hand and said: \"Fellow Israelites and you Gentiles who worship God, listen to me!"},
    {v:17,t:"The God of the people of Israel chose our ancestors; he made the people prosper during their stay in Egypt; with mighty power he led them out of that country;"},
    {v:18,t:"for about forty years he endured their conduct in the wilderness;"},
    {v:19,t:"and he overthrew seven nations in Canaan, giving their land to his people as their inheritance."},
    {v:20,t:"All this took about 450 years. After this, God gave them judges until the time of Samuel the prophet."},
    {v:21,t:"Then the people asked for a king, and he gave them Saul son of Kish, of the tribe of Benjamin, who ruled forty years."},
    {v:22,t:"After removing Saul, he made David their king. God testified concerning him: 'I have found David son of Jesse, a man after my own heart; he will do everything I want him to do.'"},
    {v:23,t:"From this man's descendants God has brought to Israel the Savior Jesus, as he promised."},
    {v:24,t:"Before the coming of Jesus, John preached repentance and baptism to all the people of Israel."},
    {v:25,t:"As John was completing his work, he said: 'Who do you suppose I am? I am not the one you are looking for. But there is one coming after me whose sandals I am not worthy to untie.'"},
    {v:26,t:"Fellow children of Abraham and you God-fearing Gentiles, it is to us that this message of salvation has been sent."},
    {v:27,t:"The people of Jerusalem and their rulers did not recognize Jesus, yet in condemning him they fulfilled the words of the prophets that are read every Sabbath."},
    {v:28,t:"Though they found no proper ground for a death sentence, they asked Pilate to have him executed."},
    {v:29,t:"When they had carried out all that was written about him, they took him down from the cross and laid him in a tomb."},
    {v:30,t:"But God raised him from the dead,"},
    {v:31,t:"and for many days he was seen by those who had traveled with him from Galilee to Jerusalem. They are now his witnesses to our people."},
    {v:32,t:"We tell you the good news: What God promised our ancestors"},
    {v:33,t:"he has fulfilled for us, their children, by raising up Jesus. As it is written in the second Psalm: \"'You are my son; today I have become your father.'"},
    {v:34,t:"God raised him from the dead so that he will never be subject to decay. As God has said, \"'I will give you the holy and sure blessings promised to David.'"},
    {v:35,t:"So it is also stated elsewhere: \"'You will not let your holy one see decay.'"},
    {v:36,t:"Now when David had served God's purpose in his own generation, he fell asleep; he was buried with his ancestors and his body decayed."},
    {v:37,t:"But the one whom God raised from the dead did not see decay."},
    {v:38,t:"Therefore, my friends, I want you to know that through Jesus the forgiveness of sins is proclaimed to you."},
    {v:39,t:"Through him everyone who believes is set free from every sin, a justification you were not able to obtain under the law of Moses."},
    {v:40,t:"Take care that what the prophets have said does not happen to you:"},
    {v:41,t:"\"'Look, you scoffers, wonder and perish, for I am going to do something in your days that you would never believe, even if someone told you.'\""},
    {v:42,t:"As Paul and Barnabas were leaving the synagogue, the people invited them to speak further about these things on the next Sabbath."},
    {v:43,t:"When the congregation was dismissed, many of the Jews and devout converts to Judaism followed Paul and Barnabas, who talked with them and urged them to continue in the grace of God."},
    {v:44,t:"On the next Sabbath almost the whole city gathered to hear the word of the Lord."},
    {v:45,t:"But when the Jews saw the crowds, they were filled with jealousy. They began to contradict what Paul was saying and heaped abuse on him."},
    {v:46,t:"Then Paul and Barnabas answered them boldly: \"We had to speak the word of God to you first. Since you reject it and do not consider yourselves worthy of eternal life, we now turn to the Gentiles."},
    {v:47,t:"For this is what the Lord has commanded us: \"'I have made you a light for the Gentiles, that you may bring salvation to the ends of the earth.'\""},
    {v:48,t:"When the Gentiles heard this, they were glad and honored the word of the Lord; and all who were appointed for eternal life believed."},
    {v:49,t:"The word of the Lord spread through the whole region."},
    {v:50,t:"But the Jewish leaders incited the God-fearing women of high standing and the leading men of the city. They stirred up persecution against Paul and Barnabas, and expelled them from their region."},
    {v:51,t:"So they shook the dust off their feet as a warning to them and went to Iconium."},
    {v:52,t:"And the disciples were filled with joy and with the Holy Spirit."}
  ]},
  { ch:14, verses:[
    {v:1,t:"At Iconium Paul and Barnabas went as usual into the Jewish synagogue. There they spoke so effectively that a great number of Jews and Greeks believed."},
    {v:2,t:"But the Jews who refused to believe stirred up the other Gentiles and poisoned their minds against the brothers."},
    {v:3,t:"So Paul and Barnabas spent considerable time there, speaking boldly for the Lord, who confirmed the message of his grace by enabling them to perform signs and wonders."},
    {v:4,t:"The people of the city were divided; some sided with the Jews, others with the apostles."},
    {v:5,t:"There was a plot afoot among both Gentiles and Jews, together with their leaders, to mistreat them and stone them."},
    {v:6,t:"But they found out about it and fled to the Lycaonian cities of Lystra and Derbe and to the surrounding country,"},
    {v:7,t:"where they continued to preach the gospel."},
    {v:8,t:"In Lystra there sat a man who was lame. He had been lame from birth and had never walked."},
    {v:9,t:"He listened to Paul as he was speaking. Paul looked directly at him, saw that he had faith to be healed"},
    {v:10,t:"and called out, \"Stand up on your feet!\" At that, the man jumped up and began to walk."},
    {v:11,t:"When the crowd saw what Paul had done, they shouted in the Lycaonian language, \"The gods have come down to us in human form!\""},
    {v:12,t:"Barnabas they called Zeus, and Paul they called Hermes because he was the chief speaker."},
    {v:13,t:"The priest of Zeus, whose temple was just outside the city, brought bulls and wreaths to the city gates because he and the crowd wanted to offer sacrifices to them."},
    {v:14,t:"But when the apostles Barnabas and Paul heard of this, they tore their clothes and rushed out into the crowd, shouting:"},
    {v:15,t:"\"Friends, why are you doing this? We too are only human, like you. We are bringing you good news, telling you to turn from these worthless things to the living God, who made the heavens and the earth and the sea and everything in them."},
    {v:16,t:"In the past, he let all nations go their own way."},
    {v:17,t:"Yet he has not left himself without testimony: He has shown kindness by giving you rain from heaven and crops in their seasons; he provides you with plenty of food and fills your hearts with joy.\""},
    {v:18,t:"Even with these words, they had difficulty keeping the crowd from sacrificing to them."},
    {v:19,t:"Then some Jews came from Antioch and Iconium and won the crowd over. They stoned Paul and dragged him outside the city, thinking he was dead."},
    {v:20,t:"But after the disciples had gathered around him, he got up and went back into the city. The next day he and Barnabas left for Derbe."},
    {v:21,t:"They preached the gospel in that city and won a large number of disciples. Then they returned to Lystra, Iconium and Antioch,"},
    {v:22,t:"strengthening the disciples and encouraging them to remain true to the faith. \"We must go through many hardships to enter the kingdom of God,\" they said."},
    {v:23,t:"Paul and Barnabas appointed elders for them in each church and, with prayer and fasting, committed them to the Lord, in whom they had put their trust."},
    {v:24,t:"After going through Pisidia, they came to Pamphylia,"},
    {v:25,t:"and when they had preached the word in Perga, they went down to Attalia."},
    {v:26,t:"From Attalia they sailed back to Antioch, where they had been committed to the grace of God for the work they had now completed."},
    {v:27,t:"On arriving there, they gathered the church together and reported all that God had done through them and how he had opened a door of faith to the Gentiles."},
