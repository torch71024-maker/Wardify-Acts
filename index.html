/* ════════════════════════════════════════════
   CHAPTER MATERIAL STUDY PAGE
════════════════════════════════════════════ */
function ChapterStudyPage({ onBack }) {
  const canvasRef = React.useRef(null);
  const [selectedCh, setSelectedCh] = React.useState(null);
  const [confirmed, setConfirmed] = React.useState(false);

  // Picker view: inky tools bg. Detail view: chapter's own bg
  React.useEffect(()=>{
    if(confirmed && selectedCh){
      // Switch off tools mode so BgMgr allows setChapter
      if(window.BgMgr){ window.BgMgr.toolsMode=false; window.BgMgr.setChapter(selectedCh); }
    } else {
      if(window.BgMgr) window.BgMgr.setToolsMode(true);
    }
    return ()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(false); };
  },[confirmed, selectedCh]);

  // Inky splash canvas
  React.useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');

    // Ink blobs: each has position, radius, spread speed, alpha, hue
    const blobs=Array.from({length:18},(_,i)=>({
      x:(0.05+Math.random()*0.9)*W,
      y:(0.05+Math.random()*0.9)*H,
      r:30+Math.random()*80,
      maxR:(120+Math.random()*200),
      spd:0.12+Math.random()*0.18,
      a:0.55+Math.random()*0.35,
      hue:220+Math.random()*60,   // deep indigo–violet
      phase:Math.random()*Math.PI*2,
      pspd:0.004+Math.random()*0.006,
    }));

    // Ink ripples
    const ripples=Array.from({length:6},(_,i)=>({
      x:(0.15+Math.random()*0.7)*W,
      y:(0.15+Math.random()*0.7)*H,
      r:0, maxR:160+Math.random()*120,
      spd:0.35+Math.random()*0.4,
      a:0,
    }));
    let rRespawn=0;

    let raf, t=0;
    function draw(){
      raf=requestAnimationFrame(draw); t+=1;

      // Deep inky base
      ctx.fillStyle='#04030a';
      ctx.fillRect(0,0,W,H);

      // Subtle ink wash gradient overlay
      const wash=ctx.createRadialGradient(W*0.4,H*0.35,0,W*0.4,H*0.35,Math.max(W,H)*0.75);
      wash.addColorStop(0,'rgba(18,10,40,0.7)');
      wash.addColorStop(0.5,'rgba(8,4,20,0.5)');
      wash.addColorStop(1,'rgba(0,0,0,0.2)');
      ctx.fillStyle=wash; ctx.fillRect(0,0,W,H);

      // Ink blobs — slow pulsing amorphous shapes
      blobs.forEach(b=>{
        b.phase+=b.pspd;
        if(b.r<b.maxR) b.r+=b.spd;
        const pulse=Math.sin(b.phase)*0.08;
        const rx=b.r*(1+pulse), ry=b.r*(1-pulse*0.6);
        const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,rx);
        g.addColorStop(0,`hsla(${b.hue},55%,18%,${b.a})`);
        g.addColorStop(0.55,`hsla(${b.hue},45%,10%,${b.a*0.5})`);
        g.addColorStop(1,`hsla(${b.hue},40%,5%,0)`);
        ctx.save();
        ctx.translate(b.x,b.y);
        ctx.scale(1, ry/rx);
        ctx.beginPath(); ctx.arc(0,0,rx,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
        ctx.restore();
      });

      // Ink droplet splash ripples
      rRespawn++;
      if(rRespawn>90){
        rRespawn=0;
        const rr=ripples[Math.floor(Math.random()*ripples.length)];
        rr.x=(0.1+Math.random()*0.8)*W;
        rr.y=(0.1+Math.random()*0.8)*H;
        rr.r=0; rr.a=0.45+Math.random()*0.3;
      }
      ripples.forEach(rr=>{
        if(rr.r>=rr.maxR){ rr.r=0; return; }
        rr.r+=rr.spd; rr.a*=0.988;
        const hue=230+Math.sin(t*0.02)*20;
        ctx.strokeStyle=`hsla(${hue},60%,55%,${rr.a*0.35})`;
        ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(rr.x,rr.y,rr.r,0,Math.PI*2); ctx.stroke();
      });

      // Fine ink particle dust
      ctx.fillStyle='rgba(140,120,200,0.025)';
      for(let i=0;i<8;i++){
        const px=(Math.sin(t*0.007+i*1.3)*0.4+0.5)*W;
        const py=(Math.cos(t*0.005+i*2.1)*0.4+0.5)*H;
        ctx.beginPath(); ctx.arc(px,py,1.2,0,Math.PI*2); ctx.fill();
      }
    }
    draw();
    function onResize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
    window.addEventListener('resize',onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);

  const allChapters=CHAPTERS_DATA.map(c=>c.ch);

  /* ── Chapter detail view ── */
  if(confirmed && selectedCh){
    const chData=CHAPTERS_DATA.find(c=>c.ch===selectedCh);
    const sections=CHAPTER_SECTIONS[selectedCh]||[];

    // Build chronological keywords list for this chapter
    const chKeywords=[];
    chData.verses.forEach(verse=>{
      verse.t.split(/\s+/).forEach(w=>{
        const core=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
        if(core.length>=3 && KEY_WORDS.has(core) && KEYWORD_TO_CHAPTER[core]===selectedCh){
          chKeywords.push(core);
        }
      });
    });

    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <div style={{position:'relative',zIndex:3,maxWidth:700,margin:'0 auto',padding:'1rem 1.2rem 5rem',fontFamily:"'Crimson Pro',serif",color:'var(--c-body)'}}>

          <div style={{display:'flex',alignItems:'center',gap:'1rem',paddingTop:'.6rem',marginBottom:'1.8rem'}}>
            <button className="kq-nav-btn" onClick={()=>setConfirmed(false)}>← Chapters</button>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.7rem',letterSpacing:'.12em',color:'var(--c-vmuted)'}}>
              CHAPTER {selectedCh} MATERIAL
            </div>
          </div>

          <div style={{textAlign:'center',marginBottom:'2rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'1.6rem',letterSpacing:'.1em',color:'#d4c0f0',textShadow:'0 0 40px rgba(160,120,220,.4)'}}>
              Chapter {selectedCh}
            </div>
            <div style={{fontStyle:'italic',fontSize:'.9rem',color:'rgba(180,160,220,.5)',marginTop:'.3rem'}}>
              {chData.verses.length} verses · {sections.length} section{sections.length!==1?'s':''}
            </div>
          </div>

          {/* Sections */}
          <div style={{marginBottom:'2rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.65rem',letterSpacing:'.14em',color:'rgba(180,160,220,.4)',marginBottom:'1rem',borderBottom:'1px solid rgba(160,120,220,.15)',paddingBottom:'.4rem'}}>
              SECTIONS &amp; KEY VERSES
            </div>
            {sections.map((sec,si)=>{
              const verse=chData.verses.find(v=>v.v===sec.verse);
              if(!verse) return null;
              return (
                <div key={si} style={{marginBottom:'1.5rem',padding:'1rem 1.1rem',background:'rgba(20,10,40,.55)',border:'1px solid rgba(140,100,200,.18)',borderRadius:12,backdropFilter:'blur(6px)'}}>
                  <div style={{fontFamily:'Cinzel,serif',fontSize:'.72rem',letterSpacing:'.08em',color:'#b898e8',marginBottom:'.55rem'}}>
                    {sec.heading}
                  </div>
                  <div style={{fontSize:'1.02rem',lineHeight:1.85,color:'#d8cef0'}}>
                    <span style={{fontFamily:'Cinzel,serif',fontSize:'.62rem',color:'rgba(180,160,220,.45)',marginRight:'.5rem',verticalAlign:'middle'}}>
                      v.{verse.v}
                    </span>
                    {verse.t}
                  </div>
                  <div style={{marginTop:'.5rem',fontFamily:'Cinzel,serif',fontSize:'.6rem',letterSpacing:'.08em',color:'rgba(180,160,220,.35)',textAlign:'right'}}>
                    Acts {selectedCh}:{verse.v}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Keywords */}
          <div style={{marginBottom:'2rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.65rem',letterSpacing:'.14em',color:'rgba(180,160,220,.4)',marginBottom:'1rem',borderBottom:'1px solid rgba(160,120,220,.15)',paddingBottom:'.4rem'}}>
              KEYWORDS — CHRONOLOGICAL ({chKeywords.length} total)
            </div>
            {chKeywords.length===0
              ? <div style={{fontStyle:'italic',color:'rgba(180,160,220,.35)',fontSize:'.85rem',textAlign:'center'}}>No unique keywords in this chapter</div>
              : (
                <div style={{display:'flex',flexWrap:'wrap',gap:'.45rem'}}>
                  {chKeywords.map((kw,i)=>(
                    <span key={i} style={{fontFamily:'Cinzel,serif',fontSize:'.72rem',letterSpacing:'.06em',padding:'.28rem .75rem',background:'rgba(140,100,200,.14)',border:'1px solid rgba(140,100,200,.28)',borderRadius:20,color:'#c4a8f0'}}>
                      {kw}
                    </span>
                  ))}
                </div>
              )
            }
          </div>

        </div>
      </div>
    );
  }

  /* ── Chapter picker view ── */
  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:3,maxWidth:680,margin:'0 auto',padding:'1rem 1.2rem 5rem',fontFamily:"'Crimson Pro',serif",color:'var(--c-body)'}}>

        <div className="top-nav-left" style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
          <button className="kq-nav-btn" onClick={onBack}>← Back</button>
        </div>

        <div style={{paddingTop:'3.5rem',textAlign:'center',marginBottom:'2rem'}}>
          <div className="tools-title" style={{color:'#d4c0f0',textShadow:'0 0 60px rgba(160,120,220,.35)'}}>
            Chapter Material Study
          </div>
          <div className="tools-subtitle" style={{color:'rgba(180,160,220,.55)'}}>
            Select a chapter to review its sections, key verse, and keywords
          </div>
        </div>

        {/* Chapter grid */}
        <div style={{display:'flex',flexWrap:'wrap',gap:'.65rem',justifyContent:'center',marginBottom:'1.8rem'}}>
          {allChapters.map(ch=>{
            const on=selectedCh===ch;
            const secCount=(CHAPTER_SECTIONS[ch]||[]).length;
            return (
              <button key={ch} onClick={()=>setSelectedCh(on?null:ch)}
                style={{
                  fontFamily:'Cinzel,serif',fontSize:'.8rem',letterSpacing:'.06em',
                  width:'3.6rem',height:'3.6rem',borderRadius:10,
                  border:`1px solid ${on?'rgba(180,140,240,.7)':'rgba(140,100,200,.25)'}`,
                  background:on?'rgba(140,100,200,.28)':'rgba(20,10,40,.5)',
                  color:on?'#d4b8f8':'rgba(180,160,220,.5)',
                  cursor:'pointer',transition:'all .18s',
                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'.15rem',
                  boxShadow:on?'0 0 18px rgba(160,120,220,.25)':'none',
                }}>
                <span style={{fontSize:'.92rem'}}>{ch}</span>
                <span style={{fontSize:'.52rem',opacity:.6,letterSpacing:'.04em'}}>{secCount}sec</span>
              </button>
            );
          })}
        </div>

        {selectedCh && (
          <div style={{textAlign:'center',marginBottom:'1rem'}}>
            <div style={{fontStyle:'italic',fontSize:'.88rem',color:'rgba(180,160,220,.55)',marginBottom:'.9rem'}}>
              Chapter {selectedCh} · {(CHAPTER_SECTIONS[selectedCh]||[]).length} sections · {CHAPTERS_DATA.find(c=>c.ch===selectedCh)?.verses.length} verses
            </div>
            <button className="btn btn-gold"
              style={{background:'linear-gradient(135deg,rgba(140,80,220,.35),rgba(100,60,180,.35))',border:'1px solid rgba(160,120,240,.5)',color:'#d4b8f8',fontSize:'.88rem',padding:'.65rem 2rem'}}
              onClick={()=>setConfirmed(true)}>
              Study Chapter {selectedCh} →
            </button>
          </div>
        )}

        {!selectedCh && (
          <div style={{textAlign:'center',fontStyle:'italic',fontSize:'.82rem',color:'rgba(180,160,220,.3)',marginTop:'.5rem'}}>
            Select a chapter above to begin
          </div>
        )}
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════
   REFERENCE MATCHING — racing dots canvas
════════════════════════════════════════════ */
const RM_COLORS=['#ff4444','#ff8c00','#ffe135','#44dd66','#22ccff','#8855ff','#ff44bb','#ff6622','#00ffcc','#ff2277','#66ff22','#4488ff','#ffcc00','#cc44ff','#00ee88','#ff5533','#33ddff','#ff3388','#aaff00','#ff77aa'];
function useRefMatchCanvas(canvasRef){
  React.useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');
    const RADIUS=5, N_DOTS=22;
    const dots=Array.from({length:N_DOTS},(_,i)=>({
      yFrac:(i+0.5)/N_DOTS,
      phase:Math.random()*Math.PI*2,
      speed:0.018+Math.random()*0.032,
      color:RM_COLORS[i%RM_COLORS.length],
    }));
    let raf;
    function draw(){
      raf=requestAnimationFrame(draw);
      ctx.fillStyle='#0c0c0c'; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(55,55,55,0.35)'; ctx.lineWidth=0.5;
      dots.forEach(d=>{
        const y=d.yFrac*H;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
      });
      dots.forEach(d=>{
        d.phase+=d.speed;
        const x=W*(0.5+0.46*Math.sin(d.phase));
        const y=d.yFrac*H;
        const rv=parseInt(d.color.slice(1,3),16), gv=parseInt(d.color.slice(3,5),16), bv=parseInt(d.color.slice(5,7),16);
        const glow=ctx.createRadialGradient(x,y,0,x,y,RADIUS*5);
        glow.addColorStop(0,`rgba(${rv},${gv},${bv},0.4)`);
        glow.addColorStop(1,`rgba(${rv},${gv},${bv},0)`);
        ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,RADIUS*5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=d.color; ctx.beginPath(); ctx.arc(x,y,RADIUS,0,Math.PI*2); ctx.fill();
      });
    }
    draw();
    function onResize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
    window.addEventListener('resize',onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);
}
/* ════════════════════════════════════════════
   REFERENCE MATCHING TOOL
════════════════════════════════════════════ */
const RM_SEL_KEY='wardify_refmatch_sel';
function rmSaveSel(obj){ try{ localStorage.setItem(RM_SEL_KEY,JSON.stringify(obj)); }catch(e){} }
function rmLoadSel(){ try{ const r=localStorage.getItem(RM_SEL_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }

function RefMatchPage({ onBack, initialCustomVerses }) {
  const canvasRef=React.useRef(null);
  useRefMatchCanvas(canvasRef);
  React.useEffect(()=>{ if(window.BgMgr) window.BgMgr.setSectionMode(true); return()=>{ if(window.BgMgr) window.BgMgr.setSectionMode(false); }; },[]);

  const allChapters=CHAPTERS_DATA.map(c=>c.ch);
  const saved=React.useMemo(()=>rmLoadSel(),[]);

  // ── Setup state ──
  const [phase, setPhase]=React.useState('setup');
  const [selMode, setSelMode]=React.useState(saved?.selMode||'chapter');
  const [selChs, setSelChs]=React.useState(()=>new Set(saved?.selChs||[]));
  const [sChIdx, setSChIdx]=React.useState(saved?.sChIdx??0);
  const [sV, setSV]=React.useState(saved?.sV??1);
  const [eChIdx, setEChIdx]=React.useState(saved?.eChIdx??0);
  const [eV, setEV]=React.useState(saved?.eV??CHAPTERS_DATA[0].verses.length);
  const [direction, setDirection]=React.useState(saved?.direction||'refFromVerse');
  const [saveFlash, setSaveFlash]=React.useState(false);

  // ── Inline custom picker state ──
  const [inlineOpenChs, setInlineOpenChs]=React.useState(new Set());
  const [inlinePicked, setInlinePicked]=React.useState(()=>{
    if(saved?.inlinePicked) return new Set(saved.inlinePicked);
    if(initialCustomVerses) return new Set(initialCustomVerses.map(v=>`${v.ch}-${v.v}`));
    return new Set();
  });

  // ── Game state ──
  const [pool, setPool]=React.useState([]);
  const [qIdx, setQIdx]=React.useState(0);
  const [picked, setPicked]=React.useState(null);
  const [history, setHistory]=React.useState([]);
  const [timeLeft, setTimeLeft]=React.useState(20);
  const timerRef=React.useRef(null);
  const autoRef=React.useRef(null);
  const choicesRef=React.useRef({qIdx:-1,choices:null});

  React.useEffect(()=>{
    if(phase!=='playing'||picked!==null) return;
    if(timeLeft<=0){ handlePick('timeout'); return; }
    timerRef.current=setTimeout(()=>setTimeLeft(t=>t-1),1000);
    return()=>clearTimeout(timerRef.current);
  },[phase,timeLeft,picked]);

  // ── Inline picker helpers ──
  function toggleInlineCh(ch){
    setInlineOpenChs(prev=>{
      const n=new Set(prev);
      if(n.has(ch)){ n.delete(ch); } else { if(n.size>=2){ n.delete([...n][0]); } n.add(ch); }
      return n;
    });
  }
  function toggleInlineVerse(ch,v){
    const key=`${ch}-${v}`;
    setInlinePicked(prev=>{ const n=new Set(prev); n.has(key)?n.delete(key):n.add(key); return n; });
  }
  function inlineSelectAll(ch){
    const vv=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses||[];
    setInlinePicked(prev=>{ const n=new Set(prev); vv.forEach(v=>n.add(`${ch}-${v.v}`)); return n; });
  }
  function inlineClearCh(ch){
    const vv=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses||[];
    setInlinePicked(prev=>{ const n=new Set(prev); vv.forEach(v=>n.delete(`${ch}-${v.v}`)); return n; });
  }
  function inlineChHasPicked(ch){ return CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.some(v=>inlinePicked.has(`${ch}-${v.v}`)); }

  function saveSelection(){
    rmSaveSel({ selMode, selChs:[...selChs], sChIdx, sV, eChIdx, eV, direction, inlinePicked:[...inlinePicked] });
    setSaveFlash(true); setTimeout(()=>setSaveFlash(false),1800);
  }

  function getVersePool(){
    if(selMode==='chapter'){
      const verses=[];
      [...selChs].forEach(ch=>{ const cd=CHAPTERS_DATA.find(c=>c.ch===ch); if(cd) cd.verses.forEach(v=>verses.push({ch,v:v.v,t:v.t})); });
      return verses;
    }
    if(selMode==='custom'){
      const verses=[];
      CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{ if(inlinePicked.has(`${cd.ch}-${v.v}`)) verses.push({ch:cd.ch,v:v.v,t:v.t}); }));
      return verses;
    }
    const sk=vkey(CHAPTERS_DATA[sChIdx].ch,sV), ek=vkey(CHAPTERS_DATA[eChIdx].ch,eV);
    const verses=[];
    CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{ const k=vkey(cd.ch,v.v); if(k>=sk&&k<=ek) verses.push({ch:cd.ch,v:v.v,t:v.t}); }));
    return verses;
  }

  function buildChoicesForQ(allVerses,correct){
    const others=allVerses.filter(v=>!(v.ch===correct.ch&&v.v===correct.v));
    const shuffled=others.slice().sort(()=>Math.random()-.5).slice(0,3);
    return [correct,...shuffled].sort(()=>Math.random()-.5);
  }

  function startQuiz(){
    const verses=getVersePool();
    if(verses.length<4) return;
    const shuffled=verses.slice().sort(()=>Math.random()-.5);
    setPool(shuffled); setQIdx(0); setHistory([]); setPicked(null); setTimeLeft(20);
    choicesRef.current={qIdx:-1,choices:null};
    setPhase('playing');
  }

  function handlePick(ans){
    clearTimeout(timerRef.current); clearTimeout(autoRef.current);
    const current=pool[qIdx];
    const isTimeout=ans==='timeout';
    let correct=false;
    if(!isTimeout){
      if(direction==='refFromVerse') correct=(ans===`${current.ch}:${current.v}`);
      else correct=(ans===current.t);
    }
    setPicked(ans);
    setHistory(h=>[...h,{ch:current.ch,v:current.v,t:current.t,picked:ans,correct,timedOut:isTimeout}]);
    if(correct) autoRef.current=setTimeout(advance,1600);
  }

  function advance(){
    clearTimeout(autoRef.current);
    const next=qIdx+1;
    if(next>=pool.length){ setPhase('results'); return; }
    setQIdx(next); setPicked(null); setTimeLeft(20);
    choicesRef.current={qIdx:-1,choices:null};
  }

  function restart(){ setPhase('setup'); setPicked(null); setTimeLeft(20); setHistory([]); clearTimeout(timerRef.current); clearTimeout(autoRef.current); }

  function getChoices(){
    if(choicesRef.current.qIdx!==qIdx){
      const allVerses=getVersePool();
      const correct=pool[qIdx];
      choicesRef.current={qIdx, choices:buildChoicesForQ(allVerses,correct)};
    }
    return choicesRef.current.choices;
  }

  // Dark card style
  const dc={background:'rgba(22,22,28,0.92)',border:'1px solid rgba(90,90,110,0.4)',borderRadius:14,backdropFilter:'blur(8px)'};
  const lbl={fontFamily:'Cinzel,serif',fontSize:'.6rem',letterSpacing:'.12em',color:'rgba(200,200,220,0.45)',marginBottom:'.7rem'};

  /* ─── SETUP ─── */
  if(phase==='setup'){
    const verses=getVersePool();
    const enough=verses.length>=4;
    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,maxWidth:700,margin:'0 auto',padding:'1rem 1.2rem 6rem',fontFamily:"'Crimson Pro',serif"}}>
          <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60,display:'flex',gap:'.6rem'}}>
            <button className="kq-nav-btn" onClick={onBack}>← Back</button>
          </div>
          <div style={{paddingTop:'3.5rem',textAlign:'center',marginBottom:'1.6rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'1.55rem',letterSpacing:'.08em',color:'#e8e8f0',marginBottom:'.3rem'}}>Reference Matching</div>
            <div style={{fontStyle:'italic',fontSize:'.88rem',color:'rgba(180,180,200,0.55)'}}>Match verses to their references — or references to their verses</div>
          </div>

          {/* Passage Selection Mode tabs */}
          <div style={{...dc,padding:'1.1rem 1.2rem',marginBottom:'.8rem'}}>
            <div style={lbl}>PASSAGE SELECTION</div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'center',marginBottom:'1rem',flexWrap:'wrap'}}>
              {['chapter','range','custom'].map(m=>{
                const on=selMode===m;
                return <button key={m} onClick={()=>setSelMode(m)} style={{fontFamily:'Cinzel,serif',fontSize:'.74rem',padding:'.5rem 1rem',borderRadius:8,border:`1px solid ${on?'rgba(160,120,255,0.7)':'rgba(100,100,130,0.35)'}`,background:on?'rgba(120,80,220,0.22)':'rgba(30,30,40,0.6)',color:on?'#c4a8ff':'rgba(180,180,200,0.5)',cursor:'pointer',transition:'all .15s'}}>
                  {m==='chapter'?'Chapter(s)':m==='range'?'Passage Range':'Custom Verses'}
                </button>;
              })}
            </div>

            {selMode==='chapter' && (
              <>
                <div style={{display:'flex',flexWrap:'wrap',gap:'.4rem',justifyContent:'center',marginBottom:'.5rem'}}>
                  {allChapters.map(ch=>{
                    const on=selChs.has(ch);
                    return <button key={ch} onClick={()=>setSelChs(p=>{const n=new Set(p);n.has(ch)?n.delete(ch):n.add(ch);return n;})}
                      style={{fontFamily:'Cinzel,serif',fontSize:'.72rem',width:'2.6rem',height:'2.6rem',borderRadius:7,border:`1px solid ${on?'rgba(160,120,255,0.6)':'rgba(90,90,110,0.35)'}`,background:on?'rgba(120,80,220,0.2)':'rgba(25,25,35,0.7)',color:on?'#c4a8ff':'rgba(160,160,180,0.45)',cursor:'pointer',transition:'all .15s'}}>
                      {ch}</button>;
                  })}
                </div>
                <div style={{display:'flex',gap:'.5rem',justifyContent:'center'}}>
                  <button onClick={()=>setSelChs(new Set(allChapters))} style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',padding:'.2rem .65rem',borderRadius:6,border:'1px solid rgba(90,90,110,0.35)',background:'rgba(30,30,40,0.6)',color:'rgba(180,180,200,0.5)',cursor:'pointer'}}>All</button>
                  <button onClick={()=>setSelChs(new Set())} style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',padding:'.2rem .65rem',borderRadius:6,border:'1px solid rgba(90,90,110,0.35)',background:'rgba(30,30,40,0.6)',color:'rgba(180,180,200,0.5)',cursor:'pointer'}}>None</button>
                </div>
              </>
            )}

            {selMode==='range' && (
              <div style={{display:'flex',gap:'.55rem',justifyContent:'center',alignItems:'center',flexWrap:'wrap'}}>
                <span style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',color:'rgba(180,180,200,0.45)'}}>FROM</span>
                <select className="rsel" value={sChIdx} onChange={e=>{const i=+e.target.value;setSChIdx(i);setSV(1);}}>
                  {CHAPTERS_DATA.map((c,i)=><option key={i} value={i}>Ch.{c.ch}</option>)}
                </select>
                <span style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',color:'rgba(180,180,200,0.45)'}}>v.</span>
                <select className="rsel" value={sV} onChange={e=>setSV(+e.target.value)}>
                  {CHAPTERS_DATA[sChIdx].verses.map(vr=><option key={vr.v} value={vr.v}>{vr.v}</option>)}
                </select>
                <span style={{color:'rgba(140,140,160,0.5)'}}>—</span>
                <span style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',color:'rgba(180,180,200,0.45)'}}>TO</span>
                <select className="rsel" value={eChIdx} onChange={e=>{const i=+e.target.value;setEChIdx(i);setEV(CHAPTERS_DATA[i].verses.length);}}>
                  {CHAPTERS_DATA.map((c,i)=><option key={i} value={i}>Ch.{c.ch}</option>)}
                </select>
                <span style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',color:'rgba(180,180,200,0.45)'}}>v.</span>
                <select className="rsel" value={eV} onChange={e=>setEV(+e.target.value)}>
                  {CHAPTERS_DATA[eChIdx].verses.map(vr=><option key={vr.v} value={vr.v}>{vr.v}</option>)}
                </select>
              </div>
            )}

            {selMode==='custom' && (
              <div>
                {/* Chapter grid for inline picker */}
                <div style={{display:'flex',flexWrap:'wrap',gap:'.4rem',justifyContent:'center',marginBottom:'.6rem'}}>
                  {allChapters.map(ch=>{
                    const isOpen=inlineOpenChs.has(ch);
                    const hasPicked=inlineChHasPicked(ch);
                    return <button key={ch} onClick={()=>toggleInlineCh(ch)}
                      style={{fontFamily:'Cinzel,serif',fontSize:'.72rem',width:'2.6rem',height:'2.6rem',borderRadius:7,position:'relative',
                        border:`1px solid ${isOpen?'rgba(160,120,255,0.7)':hasPicked?'rgba(100,220,140,0.5)':'rgba(90,90,110,0.35)'}`,
                        background:isOpen?'rgba(120,80,220,0.2)':hasPicked?'rgba(80,180,100,0.1)':'rgba(25,25,35,0.7)',
                        color:isOpen?'#c4a8ff':hasPicked?'#80e098':'rgba(160,160,180,0.45)',cursor:'pointer',transition:'all .15s'}}>
                      {ch}
                      {hasPicked&&!isOpen&&<span style={{position:'absolute',top:2,right:3,width:5,height:5,borderRadius:'50%',background:'#80e098'}}/>}
                    </button>;
                  })}
                </div>
                {/* Open chapter verse chips */}
                {[...inlineOpenChs].sort((a,b)=>a-b).map(ch=>{
                  const chData=CHAPTERS_DATA.find(c=>c.ch===ch);
                  return (
                    <div key={ch} style={{...dc,padding:'.7rem .9rem',marginBottom:'.5rem'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.5rem'}}>
                        <span style={{fontFamily:'Cinzel,serif',fontSize:'.6rem',letterSpacing:'.1em',color:'rgba(160,120,255,0.7)'}}>CHAPTER {ch}</span>
                        <div style={{display:'flex',gap:'.35rem'}}>
                          <button onClick={()=>inlineSelectAll(ch)} style={{fontFamily:'Cinzel,serif',fontSize:'.58rem',padding:'.15rem .5rem',borderRadius:5,border:'1px solid rgba(90,90,110,0.35)',background:'rgba(30,30,40,0.6)',color:'rgba(160,160,180,0.5)',cursor:'pointer'}}>All</button>
                          <button onClick={()=>inlineClearCh(ch)} style={{fontFamily:'Cinzel,serif',fontSize:'.58rem',padding:'.15rem .5rem',borderRadius:5,border:'1px solid rgba(90,90,110,0.35)',background:'rgba(30,30,40,0.6)',color:'rgba(160,160,180,0.5)',cursor:'pointer'}}>None</button>
                        </div>
                      </div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:'.32rem'}}>
                        {chData.verses.map(v=>{
                          const on=inlinePicked.has(`${ch}-${v.v}`);
                          return <button key={v.v} onClick={()=>toggleInlineVerse(ch,v.v)} title={v.t.slice(0,60)+'…'}
                            style={{fontFamily:'Cinzel,serif',fontSize:'.65rem',padding:'.25rem .55rem',borderRadius:7,
                              border:`1px solid ${on?'rgba(100,220,140,0.5)':'rgba(90,90,110,0.3)'}`,
                              background:on?'rgba(80,180,100,0.15)':'rgba(25,25,35,0.6)',
                              color:on?'#80e098':'rgba(150,150,170,0.5)',cursor:'pointer',transition:'all .12s'}}>
                            {v.v}</button>;
                        })}
                      </div>
                    </div>
                  );
                })}
                {inlineOpenChs.size===0 && (
                  <div style={{textAlign:'center',fontStyle:'italic',fontSize:'.8rem',color:'rgba(160,160,180,0.4)',marginTop:'.3rem'}}>
                    Tap a chapter number to pick verses
                  </div>
                )}
                <div style={{textAlign:'center',marginTop:'.5rem',fontSize:'.75rem',fontFamily:'Cinzel,serif',color:'rgba(160,160,180,0.45)'}}>
                  {inlinePicked.size} verse{inlinePicked.size!==1?'s':''} selected
                </div>
              </div>
            )}

            <div style={{textAlign:'center',marginTop:'.75rem',fontFamily:'Cinzel,serif',fontSize:'.65rem',color:enough?'rgba(160,160,180,0.5)':'rgba(220,100,80,0.7)'}}>
              {verses.length} verse{verses.length!==1?'s':''} in pool{verses.length<4&&verses.length>0?' · need at least 4':''}
            </div>
          </div>

          {/* Direction */}
          <div style={{...dc,padding:'1.1rem 1.2rem',marginBottom:'.8rem'}}>
            <div style={lbl}>DIRECTION</div>
            <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}>
              {[['refFromVerse','Verse → Reference'],['verseFromRef','Reference → Verse']].map(([val,label])=>{
                const on=direction===val;
                return <button key={val} onClick={()=>setDirection(val)}
                  style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.7rem 1.4rem',minWidth:'165px',borderRadius:9,
                    border:`1px solid ${on?'rgba(160,120,255,0.65)':'rgba(90,90,110,0.35)'}`,
                    background:on?'rgba(120,80,220,0.2)':'rgba(25,25,35,0.6)',
                    color:on?'#c4a8ff':'rgba(160,160,180,0.45)',cursor:'pointer',transition:'all .15s',lineHeight:1.5}}>
                  {label}
                </button>;
              })}
            </div>
            <div style={{textAlign:'center',marginTop:'.55rem',fontStyle:'italic',fontSize:'.73rem',color:'rgba(160,160,180,0.4)'}}>
              {direction==='refFromVerse'?'See a verse — pick the right chapter:verse':'See a reference — pick the right verse text'}
            </div>
          </div>

          {/* Save + Start */}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'.7rem',marginTop:'1.1rem'}}>
            <button onClick={saveSelection}
              style={{fontFamily:'Cinzel,serif',fontSize:'.75rem',padding:'.45rem 1.4rem',borderRadius:8,border:'1px solid rgba(90,90,110,0.4)',background:'rgba(30,30,40,0.7)',color:saveFlash?'#80e098':'rgba(180,180,200,0.55)',cursor:'pointer',transition:'all .2s'}}>
              {saveFlash?'✓ Saved!':'Save Selection'}
            </button>
            <button onClick={startQuiz} disabled={!enough}
              style={{fontFamily:'Cinzel,serif',fontSize:'.9rem',letterSpacing:'.06em',padding:'.75rem 2.4rem',borderRadius:10,border:'none',
                background:enough?'linear-gradient(135deg,#8844cc,#5522aa)':'rgba(60,60,80,0.4)',
                color:enough?'#f0e8ff':'rgba(140,140,160,0.4)',cursor:enough?'pointer':'default',
                boxShadow:enough?'0 4px 22px rgba(120,60,200,0.35)':'none',transition:'all .2s'}}>
              Start Matching
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ─── PLAYING ─── */
  if(phase==='playing'){
    const current=pool[qIdx];
    const answered=picked!==null;
    const isTimeout=picked==='timeout';
    const choices=getChoices();
    const correctCount=history.filter(h=>h.correct).length;
    const pct=Math.round((timeLeft/20)*100);
    const urgent=timeLeft<=5;
    const correctAns=direction==='refFromVerse'?`${current.ch}:${current.v}`:current.t;
    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,maxWidth:700,margin:'0 auto',padding:'1rem 1.2rem 6rem',fontFamily:"'Crimson Pro',serif"}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:'.5rem',marginBottom:'1rem'}}>
            <button className="kq-nav-btn" onClick={restart}>✕ Exit</button>
            <div style={{display:'flex',alignItems:'center',gap:'.7rem'}}>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',color:'rgba(180,180,200,0.5)'}}>{qIdx+1}/{pool.length}</span>
              <div style={{background:'rgba(70,70,90,0.4)',borderRadius:20,height:4,width:80,overflow:'hidden'}}>
                <div style={{height:'100%',background:'#8844cc',width:`${((qIdx+1)/pool.length)*100}%`,transition:'width .3s',borderRadius:20}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:'.4rem'}}>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',color:'#44cc66'}}>{correctCount}✓</span>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',color:'#cc4444'}}>{history.length-correctCount}✗</span>
            </div>
          </div>

          {/* Question card */}
          <div style={{...dc,padding:'1.3rem 1.3rem 1.1rem',marginBottom:'.8rem'}}>
            <div style={{height:3,borderRadius:3,background:'rgba(70,70,90,0.4)',marginBottom:'1rem',overflow:'hidden'}}>
              <div style={{height:'100%',borderRadius:3,background:urgent?'#cc4444':'#8844cc',width:answered?'0%':pct+'%',transition:answered?'none':'width 1s linear'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.6rem'}}>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.6rem',letterSpacing:'.1em',color:'rgba(180,180,200,0.4)'}}>
                {direction==='refFromVerse'?'WHICH REFERENCE?':'WHICH VERSE?'}
              </span>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.65rem',color:urgent&&!answered?'#cc4444':'rgba(160,160,180,0.4)'}}>{answered?'–':timeLeft}s</span>
            </div>
            {direction==='refFromVerse'
              ? <div style={{fontSize:'1.05rem',lineHeight:1.9,color:'#e0d8f8',fontStyle:'italic'}}>"{current.t}"</div>
              : <div style={{fontFamily:'Cinzel,serif',fontSize:'1.75rem',letterSpacing:'.1em',color:'#c4a8ff',textAlign:'center',padding:'.4rem 0'}}>Acts {current.ch}:{current.v}</div>
            }
          </div>

          {/* Choices */}
          <div style={{display:'flex',flexDirection:'column',gap:'.5rem'}}>
            {choices&&choices.map((ch,i)=>{
              const ansVal=direction==='refFromVerse'?`${ch.ch}:${ch.v}`:ch.t;
              const isCorr=ansVal===correctAns, isPick=ansVal===picked;
              let bg='rgba(22,22,30,0.88)', bdr='rgba(80,80,100,0.35)', col='#c8c0e0';
              if(answered){
                if(isCorr){ bg='rgba(40,120,60,0.22)'; bdr='rgba(80,180,100,0.5)'; col='#80e098'; }
                else if(isPick){ bg='rgba(140,30,30,0.22)'; bdr='rgba(200,60,60,0.4)'; col='#e08080'; }
                else { col='rgba(120,120,140,0.4)'; }
              }
              return (
                <button key={i} disabled={answered} onClick={()=>!answered&&handlePick(ansVal)}
                  style={{textAlign:'left',padding:direction==='verseFromRef'?'.85rem 1.1rem':'.65rem 1.1rem',borderRadius:10,border:`1px solid ${bdr}`,background:bg,color:col,cursor:answered?'default':'pointer',transition:'all .14s',fontFamily:"'Crimson Pro',serif",lineHeight:1.7}}>
                  {direction==='refFromVerse'
                    ? <span style={{fontFamily:'Cinzel,serif',fontSize:'.92rem',letterSpacing:'.05em'}}>Acts {ch.ch}:{ch.v}</span>
                    : <span style={{fontStyle:'italic',fontSize:'1rem'}}>"{ch.t}"</span>
                  }
                  {answered&&isCorr&&<span style={{float:'right',fontSize:'.8rem'}}>✓</span>}
                  {answered&&isPick&&!isCorr&&<span style={{float:'right',fontSize:'.8rem'}}>✗</span>}
                </button>
              );
            })}
          </div>

          {answered&&(
            <div style={{textAlign:'center',marginTop:'.75rem',fontFamily:'Cinzel,serif',fontSize:'.73rem',
              color:history[history.length-1]?.correct?'#44cc66':isTimeout?'#cc9944':'#cc4444'}}>
              {history[history.length-1]?.correct?'✦ Correct!':isTimeout?`Time's up — Acts ${current.ch}:${current.v}`:`Correct: Acts ${current.ch}:${current.v}`}
            </div>
          )}
          {answered&&(
            <div style={{textAlign:'center',marginTop:'.8rem'}}>
              <button onClick={advance} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.8rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#8844cc,#5522aa)',color:'#f0e8ff',cursor:'pointer',boxShadow:'0 4px 16px rgba(120,60,200,0.3)'}}>
                {qIdx+1>=pool.length?'See Results':'Next →'}
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ─── RESULTS ─── */
  const correct=history.filter(h=>h.correct).length;
  const total=history.length;
  const pctScore=total>0?Math.round((correct/total)*100):0;
  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:3,maxWidth:620,margin:'0 auto',padding:'1rem 1.2rem 6rem',fontFamily:"'Crimson Pro',serif"}}>
        <div style={{paddingTop:'3rem',textAlign:'center',marginBottom:'1.3rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'1.35rem',letterSpacing:'.08em',color:'#e8e8f0'}}>Results</div>
          <div style={{fontStyle:'italic',fontSize:'.83rem',color:'rgba(180,180,200,0.45)',marginTop:'.2rem'}}>{total} question{total!==1?'s':''}</div>
        </div>
        <div style={{...dc,padding:'1.4rem',textAlign:'center',marginBottom:'1.1rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'2.8rem',letterSpacing:'.05em',marginBottom:'.3rem',
            color:pctScore>=80?'#44cc66':pctScore>=50?'#ccaa33':'#cc4444'}}>{pctScore}%</div>
          <div style={{fontSize:'.85rem',color:'rgba(180,180,200,0.5)',marginBottom:'1rem'}}>{correct} of {total} correct</div>
          <div style={{display:'flex',gap:'1.2rem',justifyContent:'center'}}>
            {[{n:correct,l:'CORRECT',c:'#44cc66'},{n:total-correct,l:'WRONG',c:'#cc4444'}].map(({n,l,c})=>(
              <div key={l}>
                <div style={{fontFamily:'Cinzel,serif',fontSize:'1.3rem',color:c}}>{n}</div>
                <div style={{fontFamily:'Cinzel,serif',fontSize:'.58rem',letterSpacing:'.1em',color:'rgba(160,160,180,0.4)'}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'.38rem',marginBottom:'1.1rem'}}>
          {history.map((h,i)=>(
            <div key={i} style={{...dc,padding:'.55rem .9rem',display:'flex',gap:'.6rem',alignItems:'flex-start'}}>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.68rem',color:h.correct?'#44cc66':'#cc4444',minWidth:'1.2rem'}}>{h.correct?'✓':'✗'}</span>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontFamily:'Cinzel,serif',fontSize:'.7rem',color:'rgba(160,120,255,0.7)',marginRight:'.5rem'}}>Acts {h.ch}:{h.v}</span>
                <span style={{fontSize:'.8rem',color:'rgba(200,195,215,0.7)',fontStyle:'italic'}}>{h.t.length>75?h.t.slice(0,75)+'…':h.t}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:'.8rem',justifyContent:'center'}}>
          <button onClick={restart} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.6rem 1.6rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#8844cc,#5522aa)',color:'#f0e8ff',cursor:'pointer'}}>Try Again</button>
          <button onClick={onBack} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.6rem 1.4rem',borderRadius:9,border:'1px solid rgba(90,90,110,0.4)',background:'rgba(22,22,28,0.85)',color:'rgba(200,195,215,0.6)',cursor:'pointer'}}>← Back</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   DRAG STUDY GAME — shiny blue canvas
════════════════════════════════════════════ */
function useDragBgCanvas(canvasRef){
  React.useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');
    const orbs=Array.from({length:9},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:70+Math.random()*140,
      vx:(Math.random()-.5)*0.2, vy:(Math.random()-.5)*0.2,
      hue:195+Math.random()*50, sat:55+Math.random()*25, lit:72+Math.random()*18,
      a:0.18+Math.random()*0.2,
      phase:Math.random()*Math.PI*2, pspd:0.004+Math.random()*0.005,
    }));
    let sheenX=-W*0.4, raf, t=0;
    let bgG=null;
    function mkBg(){bgG=ctx.createLinearGradient(0,0,W,H);bgG.addColorStop(0,'#c8e8ff');bgG.addColorStop(0.55,'#b0d8f8');bgG.addColorStop(1,'#d4ecff');}
    mkBg();
    function draw(){
      raf=requestAnimationFrame(draw); t++;
      ctx.fillStyle=bgG; ctx.fillRect(0,0,W,H);
      orbs.forEach(o=>{
        o.phase+=o.pspd; o.x+=o.vx; o.y+=o.vy;
        if(o.x<-o.r)o.x=W+o.r; if(o.x>W+o.r)o.x=-o.r;
        if(o.y<-o.r)o.y=H+o.r; if(o.y>H+o.r)o.y=-o.r;
        const rr=o.r*(1+Math.sin(o.phase)*0.05);
        const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,rr);
        g.addColorStop(0,`hsla(${o.hue},${o.sat}%,${o.lit}%,${o.a})`);
        g.addColorStop(0.5,`hsla(${o.hue},${o.sat-8}%,${o.lit-10}%,${o.a*0.38})`);
        g.addColorStop(1,`hsla(${o.hue},${o.sat}%,${o.lit}%,0)`);
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,rr,0,Math.PI*2); ctx.fill();
      });
      if(t%3===0){
        sheenX+=2.7; if(sheenX>W*1.4) sheenX=-W*0.4;
        const sh=ctx.createLinearGradient(sheenX-200,0,sheenX+200,H);
        sh.addColorStop(0,'rgba(255,255,255,0)');sh.addColorStop(0.5,'rgba(255,255,255,0.05)');sh.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=sh; ctx.fillRect(0,0,W,H);
      }
      if(t%2===0){
        for(let i=0;i<2;i++){
          const y=((H*0.5*i+t*0.2)%H);
          ctx.fillStyle=`rgba(180,220,255,${0.024+i*0.007})`; ctx.fillRect(0,y-1,W,2);
        }
      }
    }
    draw();
    function onResize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; mkBg(); }
    window.addEventListener('resize',onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);
}


/* ════════════════════════════════════════
   DRAG STUDY GAME — light shiny blue
════════════════════════════════════════ */
function useLightBlueBg(ref){
  React.useEffect(()=>{
    const c=ref.current;if(!c)return;
    let W=c.width=window.innerWidth,H=c.height=window.innerHeight;
    // Delegate to bgAmberDrag defined in BgMgr script
    let cleanup=window.bgAmberDrag?window.bgAmberDrag(c):null;
    function onRes(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
    window.addEventListener('resize',onRes);
    return()=>{if(cleanup)cleanup();window.removeEventListener('resize',onRes);};
  },[]);
}

function DragStudyPage({ onBack, initialCustomVerses }){
  const bgRef=React.useRef(null);
  useLightBlueBg(bgRef);
  React.useEffect(()=>{
    if(window.BgMgr)window.BgMgr.setDragMode(true);
    return()=>{if(window.BgMgr)window.BgMgr.setDragMode(false);};
  },[]);

  const allChs=CHAPTERS_DATA.map(c=>c.ch);

  /* ── Setup state ── */
  const [phase,setPhase]=React.useState('setup');
  const [selMode,setSelMode]=React.useState('chapter');
  const [selChs,setSelChs]=React.useState(new Set());
  const [sChIdx,setSChIdx]=React.useState(0);
  const [sV,setSV]=React.useState(1);
  const [eChIdx,setEChIdx]=React.useState(0);
  const [eV,setEV]=React.useState(CHAPTERS_DATA[0].verses.length);
  const [openChs,setOpenChs]=React.useState(new Set());
  const [picked,setPicked]=React.useState(()=>{
    if(initialCustomVerses) return new Set(initialCustomVerses.map(v=>`${v.ch}-${v.v}`));
    return new Set();
  });

  /* ── Game state ── */
  const [activeChs,setActiveChs]=React.useState([]);
  const [roundItems,setRoundItems]=React.useState([]);
  const [placed,setPlaced]=React.useState({});  // {[itemId]: chapterNum}
  const [checked,setChecked]=React.useState(false);
  const [score,setScore]=React.useState({correct:0,total:0});
  const [ghost,setGhost]=React.useState(null);  // {id,x,y,offX,offY,item}
  const poolRef=React.useRef([]);
  const usedRef=React.useRef(new Set());

  /* ── Physics refs (no state) ── */
  const physRef=React.useRef({});   // {[id]:{x,y,vx,vy,w,h}}
  const elemRef=React.useRef({});   // {[id]:HTMLElement}
  const trayRef=React.useRef(null);
  const rafRef=React.useRef(null);
  const dragRef=React.useRef(null); // {id} while dragging
  const placedRef=React.useRef({}); // mirror of placed (for rAF closure)

  React.useEffect(()=>{placedRef.current=placed;},[placed]);

  /* ── Physics loop function ── */
  function runLoop(){
    cancelAnimationFrame(rafRef.current);
    function tick(){
      rafRef.current=requestAnimationFrame(tick);
      const tray=trayRef.current;if(!tray)return;
      const W=tray.offsetWidth,H=tray.offsetHeight;
      const dragId=dragRef.current?.id;
      const ids=Object.keys(physRef.current);
      ids.forEach(id=>{
        if(id===dragId||placedRef.current[id]!==undefined)return;
        const p=physRef.current[id];if(!p)return;
        p.x+=p.vx;p.y+=p.vy;
        const m=5;
        if(p.x<m){p.x=m;p.vx=Math.abs(p.vx)*(0.9+Math.random()*0.15);}
        if(p.x+p.w>W-m){p.x=W-m-p.w;p.vx=-Math.abs(p.vx)*(0.9+Math.random()*0.15);}
        if(p.y<m){p.y=m;p.vy=Math.abs(p.vy)*(0.9+Math.random()*0.15);}
        if(p.y+p.h>H-m){p.y=H-m-p.h;p.vy=-Math.abs(p.vy)*(0.9+Math.random()*0.15);}
        const el=elemRef.current[id];
        if(el){el.style.left=p.x+'px';el.style.top=p.y+'px';}
      });
      // Soft repulsion
      for(let i=0;i<ids.length-1;i++){
        const a=physRef.current[ids[i]];
        if(!a||placedRef.current[ids[i]]!==undefined)continue;
        for(let j=i+1;j<ids.length;j++){
          const b=physRef.current[ids[j]];
          if(!b||placedRef.current[ids[j]]!==undefined)continue;
          const dx=(b.x+b.w/2)-(a.x+a.w/2),dy=(b.y+b.h/2)-(a.y+a.h/2);
          const dist=Math.sqrt(dx*dx+dy*dy)||1;
          const md=(a.w+b.w)*0.44;
          if(dist<md){
            const f=(md-dist)/md*0.14,nx=dx/dist,ny=dy/dist;
            a.vx-=nx*f;a.vy-=ny*f;b.vx+=nx*f;b.vy+=ny*f;
            const cap=2.1;
            [a,b].forEach(p=>{const s=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(s>cap){p.vx=p.vx/s*cap;p.vy=p.vy/s*cap;}});
          }
        }
      }
    }
    rafRef.current=requestAnimationFrame(tick);
  }

  /* ── Init physics when round changes ── */
  React.useEffect(()=>{
    if(phase!=='playing')return;
    cancelAnimationFrame(rafRef.current);
    physRef.current={};
    const r1=requestAnimationFrame(()=>{
      const r2=requestAnimationFrame(()=>{
        const tray=trayRef.current;if(!tray)return;
        const W=tray.offsetWidth,H=tray.offsetHeight;
        roundItems.forEach(item=>{
          const el=elemRef.current[item.id];
          const w=el?el.offsetWidth:110,h=el?el.offsetHeight:34;
          const ang=Math.random()*Math.PI*2,spd=0.7+Math.random()*0.9;
          physRef.current[item.id]={
            x:8+Math.random()*Math.max(1,W-w-16),
            y:8+Math.random()*Math.max(1,H-h-16),
            vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,w,h
          };
          if(el){el.style.left=physRef.current[item.id].x+'px';el.style.top=physRef.current[item.id].y+'px';}
        });
        runLoop();
      });
    });
    return()=>{cancelAnimationFrame(r1);cancelAnimationFrame(rafRef.current);};
  },[roundItems,phase]);

  /* ── Stop/resume loop on check ── */
  React.useEffect(()=>{
    if(checked){cancelAnimationFrame(rafRef.current);}
    else if(phase==='playing'&&Object.keys(physRef.current).length>0){runLoop();}
  },[checked]);

  React.useEffect(()=>()=>cancelAnimationFrame(rafRef.current),[]);

  /* ── Drag ── */
  function startDrag(e,item){
    if(checked)return;
    e.preventDefault();e.stopPropagation();
    const pt=e.touches?.[0]||e;
    const el=elemRef.current[item.id];
    const rect=el?el.getBoundingClientRect():{left:pt.clientX-55,top:pt.clientY-17};
    dragRef.current={id:item.id};
    if(el)el.style.opacity='0.15';
    setGhost({id:item.id,x:pt.clientX,y:pt.clientY,offX:pt.clientX-rect.left,offY:pt.clientY-rect.top,item});
  }

  React.useEffect(()=>{
    if(!ghost)return;
    function onMove(e){e.preventDefault();const pt=e.touches?.[0]||e;setGhost(g=>g?{...g,x:pt.clientX,y:pt.clientY}:null);}
    function onEnd(e){
      const pt=e.changedTouches?.[0]||e;
      const el2=document.elementFromPoint(pt.clientX,pt.clientY);
      const basket=el2?.closest('[data-basket-ch]');
      const id=dragRef.current?.id;
      dragRef.current=null;
      if(basket&&id){
        const ch=parseInt(basket.dataset.basketCh);
        setPlaced(prev=>({...prev,[id]:ch}));
        if(elemRef.current[id])elemRef.current[id].style.opacity='1';
      } else {
        if(id&&physRef.current[id]){
          const ang=Math.random()*Math.PI*2;
          physRef.current[id].vx=Math.cos(ang)*1.4;
          physRef.current[id].vy=Math.sin(ang)*1.4;
        }
        if(id&&elemRef.current[id])elemRef.current[id].style.opacity='1';
      }
      setGhost(null);
    }
    window.addEventListener('mousemove',onMove,{passive:false});
    window.addEventListener('mouseup',onEnd);
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('touchend',onEnd);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onEnd);window.removeEventListener('touchmove',onMove);window.removeEventListener('touchend',onEnd);};
  },[ghost]);

  /* ── Inline custom picker ── */
  function toggleOpenCh(ch){setOpenChs(prev=>{const n=new Set(prev);if(n.has(ch)){n.delete(ch);}else{if(n.size>=2)n.delete([...n][0]);n.add(ch);}return n;});}
  function toggleV(ch,v){const k=`${ch}-${v}`;setPicked(prev=>{const n=new Set(prev);n.has(k)?n.delete(k):n.add(k);return n;});}
  function pickAll(ch){const vv=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses||[];setPicked(prev=>{const n=new Set(prev);vv.forEach(v=>n.add(`${ch}-${v.v}`));return n;});}
  function clearCh(ch){const vv=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses||[];setPicked(prev=>{const n=new Set(prev);vv.forEach(v=>n.delete(`${ch}-${v.v}`));return n;});}
  function hasPicked(ch){return CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.some(v=>picked.has(`${ch}-${v.v}`));}

  function getVersePool(){
    if(selMode==='chapter'){const vv=[];[...selChs].forEach(ch=>{CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.forEach(v=>vv.push({ch,v:v.v,t:v.t}));});return vv;}
    if(selMode==='custom'){const vv=[];CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{if(picked.has(`${cd.ch}-${v.v}`))vv.push({ch:cd.ch,v:v.v,t:v.t});}));return vv;}
    const sk=vkey(CHAPTERS_DATA[sChIdx].ch,sV),ek=vkey(CHAPTERS_DATA[eChIdx].ch,eV);
    const vv=[];CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{const k=vkey(cd.ch,v.v);if(k>=sk&&k<=ek)vv.push({ch:cd.ch,v:v.v,t:v.t});}));return vv;
  }

  function sh(arr){return arr.slice().sort(()=>Math.random()-.5);}

  function buildPool(verses){
    const items=[];
    const byCh={};
    verses.forEach(v=>{if(!byCh[v.ch])byCh[v.ch]=[];byCh[v.ch].push(v);});
    Object.entries(byCh).forEach(([chStr,cv])=>{
      const ch=parseInt(chStr);
      // FTV: words 0..uniquePrefix-1 (everything before the / mark)
      const ftvSeen=new Set();
      cv.forEach(verse=>{
        const idx=VERSE_UNIQUE_PREFIX[`${ch}-${verse.v}`];
        if(idx==null||idx<2)return;
        const words=verse.t.split(' ');
        const phrase=words.slice(0,Math.min(idx,9)).join(' ').replace(/[^a-zA-Z ']/g,'').replace(/  +/g,' ').toLowerCase().trim();
        if(phrase.split(' ').length<2||ftvSeen.has(phrase))return;
        ftvSeen.add(phrase);
        items.push({id:`ftv-${ch}-${verse.v}`,text:phrase,ch,type:'ftv',label:'FTV'});
      });
      // Keywords (unique to this chapter)
      const kwSeen=new Set();
      cv.forEach(verse=>{
        verse.t.split(/\s+/).forEach(w=>{
          const core=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
          if(core.length>=3&&KEY_WORDS.has(core)&&KEYWORD_TO_CHAPTER[core]===ch&&!kwSeen.has(core)){
            kwSeen.add(core);items.push({id:`kw-${ch}-${core}`,text:core,ch,type:'keyword',label:'Key'});
          }
        });
      });
      // 2-word unique phrases
      const p2Seen=new Set();
      cv.forEach(verse=>{
        const cl=verse.t.split(/\s+/).map(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()).filter(Boolean);
        for(let i=0;i<=cl.length-2;i++){
          const g=cl.slice(i,i+2).join(' ');
          if(KEY_PHRASES_2[g]===ch&&!p2Seen.has(g)){p2Seen.add(g);items.push({id:`p2-${ch}-${g.replace(' ','_')}`,text:g,ch,type:'phrase2',label:'2-word'});}
        }
      });
      // 3-word unique phrases
      const p3Seen=new Set();
      cv.forEach(verse=>{
        const cl=verse.t.split(/\s+/).map(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()).filter(Boolean);
        for(let i=0;i<=cl.length-3;i++){
          const g=cl.slice(i,i+3).join(' ');
          if(KEY_PHRASES_3[g]===ch&&!p3Seen.has(g)){p3Seen.add(g);items.push({id:`p3-${ch}-${g.replace(/ /g,'_')}`,text:g,ch,type:'phrase3',label:'3-word'});}
        }
      });
    });
    return sh(items);
  }

  function buildRound(pool,used,chs){
    const avail=pool.filter(i=>!used.has(i.id));
    const byCh={};chs.forEach(ch=>{byCh[ch]={ftv:[],keyword:[],phrase2:[],phrase3:[]};});
    avail.forEach(i=>{if(byCh[i.ch])byCh[i.ch][i.type].push(i);});
    const round=[];
    chs.forEach(ch=>{
      const src=byCh[ch];
      const picks=[];
      // Guarantee at least 1 of each type, up to 2 each
      ['ftv','keyword','phrase2','phrase3'].forEach(t=>{sh(src[t]).slice(0,2).forEach(i=>picks.push(i));});
      // Fill up to 9 per chapter from remaining
      const usedInPicks=new Set(picks.map(i=>i.id));
      sh(avail.filter(i=>i.ch===ch&&!usedInPicks.has(i.id))).slice(0,Math.max(0,9-picks.length)).forEach(i=>picks.push(i));
      sh(picks).forEach(i=>round.push(i));
    });
    return sh(round);
  }

  function startGame(){
    const verses=getVersePool();
    const chs=[...new Set(verses.map(v=>v.ch))].sort((a,b)=>a-b);
    if(chs.length<2)return;
    const pool=buildPool(verses);
    if(pool.length<4)return;
    poolRef.current=pool;
    usedRef.current=new Set();
    setActiveChs(chs);
    setScore({correct:0,total:0});
    const first=buildRound(pool,new Set(),chs);
    first.forEach(i=>usedRef.current.add(i.id));
    setRoundItems(first);
    setPlaced({});
    setChecked(false);
    setPhase('playing');
  }

  function checkRound(){
    if(!roundItems.every(i=>placed[i.id]!==undefined))return;
    const correct=roundItems.filter(i=>placed[i.id]===i.ch).length;
    setScore(s=>({correct:s.correct+correct,total:s.total+roundItems.length}));
    setChecked(true);
  }

  function nextRound(){
    const pool=poolRef.current;
    const rem=pool.filter(i=>!usedRef.current.has(i.id));
    if(rem.length<activeChs.length){setPhase('results');return;}
    const next=buildRound(pool,usedRef.current,activeChs);
    if(next.length===0){setPhase('results');return;}
    next.forEach(i=>usedRef.current.add(i.id));
    // Restore all tray elements
    roundItems.forEach(i=>{const el=elemRef.current[i.id];if(el){el.style.opacity='1';el.style.display='';}});
    setRoundItems(next);
    setPlaced({});
    setChecked(false);
  }

  function ts(type){
    if(type==='ftv')return{bg:'#fff7e0',bdr:'#e0a010',txt:'#2a5fb8',dot:'#2a5fb8',sh:'rgba(42,95,184,0.22)'};
    if(type==='keyword')return{bg:'#e8f8ef',bdr:'#25b055',txt:'#2a5fb8',dot:'#2a5fb8',sh:'rgba(42,95,184,0.2)'};
    if(type==='phrase2')return{bg:'#e5f0ff',bdr:'#2e80d8',txt:'#2a5fb8',dot:'#2a5fb8',sh:'rgba(42,95,184,0.2)'};
    return{bg:'#f0eaff',bdr:'#8040d0',txt:'#2a5fb8',dot:'#2a5fb8',sh:'rgba(42,95,184,0.2)'};
  }

  const card={background:'rgba(255,255,255,0.80)',border:'1px solid rgba(80,160,255,0.22)',borderRadius:14,backdropFilter:'blur(10px)',boxShadow:'0 2px 16px rgba(60,140,255,0.09)'};
  const lbl={fontFamily:'Cinzel,serif',fontSize:'.56rem',letterSpacing:'.12em',color:'rgba(30,90,200,0.42)',marginBottom:'.6rem'};
  const btn0={fontFamily:'Cinzel,serif',fontSize:'.72rem',padding:'.45rem .95rem',borderRadius:8,cursor:'pointer',border:'1px solid',transition:'all .15s'};

  /* ══ SETUP ══ */
  if(phase==='setup'){
    const verses=getVersePool();
    const chs=[...new Set(verses.map(v=>v.ch))];
    const ok=chs.length>=2;
    return(
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={bgRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,maxWidth:680,margin:'0 auto',padding:'1rem 1rem 6rem',fontFamily:"'Crimson Pro',serif"}}>
          <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
            <button className="kq-nav-btn" style={{color:'#1848a0',borderColor:'rgba(40,120,220,0.3)',background:'rgba(255,255,255,0.7)'}} onClick={onBack}>← Back</button>
          </div>
          <div style={{paddingTop:'3.5rem',textAlign:'center',marginBottom:'1.5rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'1.5rem',letterSpacing:'.08em',color:'#7ec8f8',marginBottom:'.25rem',textShadow:'0 2px 10px rgba(60,140,255,0.4)'}}>🧺 Drag Study Game</div>
            <div style={{fontStyle:'italic',fontSize:'.84rem',color:'rgba(20,80,190,0.48)'}}>Sort keywords, phrases &amp; FTV jump points into the right chapter basket</div>
          </div>
          <div style={{...card,padding:'1rem 1.1rem',marginBottom:'.75rem'}}>
            <div style={lbl}>PASSAGE SELECTION</div>
            <div style={{display:'flex',gap:'.45rem',justifyContent:'center',marginBottom:'1rem',flexWrap:'wrap'}}>
              {['chapter','range','custom'].map(m=>{const on=selMode===m;return(
                <button key={m} onClick={()=>setSelMode(m)} style={{...btn0,borderColor:on?'rgba(35,110,210,0.55)':'rgba(80,160,255,0.2)',background:on?'rgba(35,110,210,0.1)':'rgba(255,255,255,0.55)',color:on?'#1848a0':'rgba(50,120,200,0.48)'}}>
                  {m==='chapter'?'Chapter(s)':m==='range'?'Passage Range':'Custom Verses'}
                </button>
              );})}
            </div>
            {selMode==='chapter'&&(<>
              <div style={{display:'flex',flexWrap:'wrap',gap:'.38rem',justifyContent:'center',marginBottom:'.5rem'}}>
                {allChs.map(ch=>{const on=selChs.has(ch);return(
                  <button key={ch} onClick={()=>setSelChs(p=>{const n=new Set(p);n.has(ch)?n.delete(ch):n.add(ch);return n;})}
                    style={{fontFamily:'Cinzel,serif',fontSize:'.7rem',width:'2.5rem',height:'2.5rem',borderRadius:7,cursor:'pointer',transition:'all .14s',
                      border:`1px solid ${on?'rgba(35,110,210,0.55)':'rgba(80,160,255,0.2)'}`,
                      background:on?'rgba(35,110,210,0.1)':'rgba(255,255,255,0.55)',
                      color:on?'#1848a0':'rgba(50,120,200,0.42)'}}>
                    {ch}</button>
                );})}
              </div>
              <div style={{display:'flex',gap:'.45rem',justifyContent:'center'}}>
                <button onClick={()=>setSelChs(new Set(allChs))} style={{...btn0,borderColor:'rgba(80,160,255,0.2)',background:'rgba(255,255,255,0.55)',color:'rgba(50,120,200,0.45)'}}>All</button>
                <button onClick={()=>setSelChs(new Set())} style={{...btn0,borderColor:'rgba(80,160,255,0.2)',background:'rgba(255,255,255,0.55)',color:'rgba(50,120,200,0.45)'}}>None</button>
              </div>
            </>)}
            {selMode==='range'&&(
              <div style={{display:'flex',gap:'.5rem',justifyContent:'center',alignItems:'center',flexWrap:'wrap'}}>
                {[['FROM',sChIdx,setSChIdx,sV,setSV],['TO',eChIdx,setEChIdx,eV,setEV]].map(([label,ci,setCi,v,setVv],idx)=>(
                  <React.Fragment key={label}>
                    {idx>0&&<span style={{color:'rgba(50,100,200,0.38)'}}>—</span>}
                    <span style={{fontFamily:'Cinzel,serif',fontSize:'.6rem',color:'rgba(50,120,200,0.42)'}}>{label}</span>
                    <select className="rsel" value={ci} onChange={e=>{const i=+e.target.value;setCi(i);if(label==='FROM')setSV(1);else setVv(CHAPTERS_DATA[i].verses.length);}}>
                      {CHAPTERS_DATA.map((c,i)=><option key={i} value={i}>Ch.{c.ch}</option>)}
                    </select>
                    <span style={{fontFamily:'Cinzel,serif',fontSize:'.6rem',color:'rgba(50,120,200,0.42)'}}>v.</span>
                    <select className="rsel" value={v} onChange={e=>setVv(+e.target.value)}>
                      {CHAPTERS_DATA[ci].verses.map(vr=><option key={vr.v} value={vr.v}>{vr.v}</option>)}
                    </select>
                  </React.Fragment>
                ))}
              </div>
            )}
            {selMode==='custom'&&(<div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'.38rem',justifyContent:'center',marginBottom:'.6rem'}}>
                {allChs.map(ch=>{const isO=openChs.has(ch),isP=hasPicked(ch);return(
                  <button key={ch} onClick={()=>toggleOpenCh(ch)}
                    style={{fontFamily:'Cinzel,serif',fontSize:'.7rem',width:'2.5rem',height:'2.5rem',borderRadius:7,position:'relative',cursor:'pointer',transition:'all .14s',
                      border:`1px solid ${isO?'rgba(35,110,210,0.55)':isP?'rgba(35,160,80,0.5)':'rgba(80,160,255,0.2)'}`,
                      background:isO?'rgba(35,110,210,0.1)':isP?'rgba(35,160,80,0.1)':'rgba(255,255,255,0.55)',
                      color:isO?'#1848a0':isP?'#1a6035':'rgba(50,120,200,0.42)'}}>
                    {ch}{isP&&!isO&&<span style={{position:'absolute',top:2,right:3,width:5,height:5,borderRadius:'50%',background:'#25b055'}}/>}
                  </button>
                );})}
              </div>
              {[...openChs].sort((a,b)=>a-b).map(ch=>{
                const cd=CHAPTERS_DATA.find(c=>c.ch===ch);
                return(
                  <div key={ch} style={{...card,padding:'.65rem .85rem',marginBottom:'.45rem'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.45rem'}}>
                      <span style={{fontFamily:'Cinzel,serif',fontSize:'.58rem',letterSpacing:'.1em',color:'rgba(30,100,210,0.65)'}}>CH. {ch}</span>
                      <div style={{display:'flex',gap:'.3rem'}}>
                        <button onClick={()=>pickAll(ch)} style={{fontFamily:'Cinzel,serif',fontSize:'.56rem',padding:'.12rem .45rem',borderRadius:5,border:'1px solid rgba(80,160,255,0.2)',background:'rgba(255,255,255,0.55)',color:'rgba(50,120,200,0.45)',cursor:'pointer'}}>All</button>
                        <button onClick={()=>clearCh(ch)} style={{fontFamily:'Cinzel,serif',fontSize:'.56rem',padding:'.12rem .45rem',borderRadius:5,border:'1px solid rgba(80,160,255,0.2)',background:'rgba(255,255,255,0.55)',color:'rgba(50,120,200,0.45)',cursor:'pointer'}}>None</button>
                      </div>
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem'}}>
                      {cd.verses.map(v=>{const on=picked.has(`${ch}-${v.v}`);return(
                        <button key={v.v} onClick={()=>toggleV(ch,v.v)} title={v.t.slice(0,60)+'…'}
                          style={{fontFamily:'Cinzel,serif',fontSize:'.62rem',padding:'.22rem .5rem',borderRadius:7,cursor:'pointer',transition:'all .12s',
                            border:`1px solid ${on?'rgba(35,160,80,0.5)':'rgba(80,160,255,0.2)'}`,
                            background:on?'rgba(35,160,80,0.1)':'rgba(255,255,255,0.55)',
                            color:on?'#1a6035':'rgba(50,120,200,0.4)'}}>
                          {v.v}</button>
                      );})}
                    </div>
                  </div>
                );
              })}
              {openChs.size===0&&<div style={{textAlign:'center',fontStyle:'italic',fontSize:'.78rem',color:'rgba(50,120,200,0.38)',marginTop:'.3rem'}}>Tap a chapter to pick verses</div>}
              <div style={{textAlign:'center',marginTop:'.45rem',fontFamily:'Cinzel,serif',fontSize:'.6rem',color:'rgba(50,120,200,0.42)'}}>{picked.size} verse{picked.size!==1?'s':''} selected</div>
            </div>)}
            <div style={{textAlign:'center',marginTop:'.7rem',fontFamily:'Cinzel,serif',fontSize:'.6rem',color:ok?'rgba(50,120,200,0.42)':'rgba(200,40,40,0.7)'}}>
              {verses.length} verse{verses.length!==1?'s':''}{chs.length===1?' — need at least 2 chapters':chs.length===0?' — select chapters above':''}
            </div>
          </div>
          <div style={{textAlign:'center',marginTop:'1rem'}}>
            <button onClick={startGame} disabled={!ok}
              style={{fontFamily:'Cinzel,serif',fontSize:'.92rem',letterSpacing:'.06em',padding:'.72rem 2.3rem',borderRadius:10,border:'none',
                background:ok?'linear-gradient(135deg,#2262cc,#1040aa)':'rgba(160,190,230,0.35)',
                color:ok?'#e8f4ff':'rgba(80,130,200,0.45)',cursor:ok?'pointer':'default',
                boxShadow:ok?'0 4px 22px rgba(30,90,220,0.32)':'none',transition:'all .2s'}}>
              Start Sorting
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ══ PLAYING ══ */
  if(phase==='playing'){
    const allPlaced=roundItems.every(i=>placed[i.id]!==undefined);
    const pool=poolRef.current;
    const rem=pool.filter(i=>!usedRef.current.has(i.id));
    const done=pool.length-rem.length;
    const TRAY_H=Math.min(Math.max(160,window.innerHeight-290),340);
    return(
      <div style={{position:'relative',height:'100vh',overflow:'hidden',overscrollBehavior:'none'}}>
        <canvas ref={bgRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,height:'100%',display:'flex',flexDirection:'column',maxWidth:720,margin:'0 auto',padding:'0 .5rem'}}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.42rem 0 .2rem',flexShrink:0}}>
            <button className="kq-nav-btn" style={{color:'#1848a0',borderColor:'rgba(40,120,220,0.28)',background:'rgba(255,255,255,0.68)'}} onClick={()=>{cancelAnimationFrame(rafRef.current);setPhase('setup');}}>✕ Exit</button>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.57rem',color:'rgba(20,70,180,0.5)',textAlign:'center',lineHeight:1.75}}>
              <div>{done}/{pool.length} sorted</div>
              {score.total>0&&<div style={{color:'rgba(20,140,65,0.65)'}}>{score.correct}/{score.total} correct</div>}

              const s=ts(t);
              return <span key={t} style={{fontFamily:'Cinzel,serif',fontSize:'.49rem',letterSpacing:'.04em',padding:'.13rem .42rem',borderRadius:12,background:s.bg,border:`1px solid ${s.bdr}`,color:s.txt}}>{lab}</span>;
            })}
          </div>
          {/* Ball pit tray */}
          <div style={{position:'relative',flexShrink:0,height:TRAY_H,minHeight:120,
            background:'rgba(235,246,255,0.72)',border:'1px solid rgba(80,160,255,0.18)',
            borderRadius:14,margin:'.1rem 0',overflow:'hidden',
            boxShadow:'inset 0 1px 8px rgba(60,140,255,0.08)'}}>
            {allPlaced&&!checked&&(
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:6}}>
                <span style={{fontStyle:'italic',fontSize:'.82rem',color:'rgba(30,90,200,0.38)'}}>All placed — tap Check!</span>
              </div>
            )}
            <div ref={trayRef} style={{position:'absolute',inset:0}}>
              {roundItems.map(item=>{
                const s=ts(item.type);
                const isPlaced=placed[item.id]!==undefined;
                return(
                  <div key={item.id}
                    ref={el=>{if(el)elemRef.current[item.id]=el;else delete elemRef.current[item.id];}}
                    onMouseDown={e=>startDrag(e,item)}
                    onTouchStart={e=>startDrag(e,item)}
                    style={{position:'absolute',left:0,top:0,
                      display:isPlaced?'none':'flex',alignItems:'center',gap:'.28rem',
                      padding:'.3rem .72rem',borderRadius:20,
                      background:s.bg,border:`1.5px solid ${s.bdr}`,color:s.txt,
                      fontFamily:"'Crimson Pro',serif",fontSize:'.88rem',
                      boxShadow:`0 2px 10px ${s.sh}`,
                      cursor:'grab',userSelect:'none',touchAction:'none',WebkitUserSelect:'none',
                      whiteSpace:'nowrap',zIndex:4}}>
                    <span style={{fontFamily:'Cinzel,serif',fontSize:'.44rem',color:s.dot,letterSpacing:'.05em',opacity:.85}}>{item.label}</span>
                    {item.text}
                  </div>
                );
              })}
            </div>
          </div>
          {/* Action row */}
          <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:'.65rem',padding:'.25rem 0',flexShrink:0,minHeight:42}}>
            {allPlaced&&!checked&&(
              <button onClick={checkRound} style={{fontFamily:'Cinzel,serif',fontSize:'.8rem',padding:'.44rem 1.6rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#2262cc,#1040aa)',color:'#e8f4ff',cursor:'pointer',boxShadow:'0 4px 16px rgba(30,90,220,0.3)'}}>Check Answers</button>
            )}
            {checked&&<>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.65rem',color:'rgba(20,70,180,0.52)'}}>
                {roundItems.filter(i=>placed[i.id]===i.ch).length}/{roundItems.length} correct this round
              </span>
              <button onClick={nextRound} style={{fontFamily:'Cinzel,serif',fontSize:'.8rem',padding:'.44rem 1.4rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#2262cc,#1040aa)',color:'#e8f4ff',cursor:'pointer',boxShadow:'0 4px 16px rgba(30,90,220,0.3)'}}>
                {rem.length<activeChs.length?'Finish':'Next Round →'}
              </button>
            </>}
          </div>
          {/* Baskets */}
          <div style={{background:'rgba(255,255,255,0.88)',border:'1px solid rgba(80,160,255,0.18)',borderRadius:'12px 12px 0 0',borderBottom:'none',
            padding:'.4rem .38rem .5rem',flexShrink:0,boxShadow:'0 -2px 12px rgba(60,140,255,0.07)'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.44rem',letterSpacing:'.14em',color:'rgba(30,90,200,0.3)',textAlign:'center',marginBottom:'.28rem'}}>DRAG INTO CHAPTER BASKET</div>
            <div style={{display:'flex',gap:'.32rem',overflowX:'auto',WebkitOverflowScrolling:'touch',
              justifyContent:activeChs.length<=5?'center':'flex-start',paddingBottom:2}}>
              {activeChs.map((ch,ci)=>{
                const chItems=roundItems.filter(i=>placed[i.id]===ch);
                const hues=[210,235,195,255,175,220,245,205];
                const h=hues[ci%hues.length];
                return(
                  <div key={ch} data-basket-ch={ch}
                    style={{flex:activeChs.length<=5?'1 1 0':'0 0 auto',
                      minWidth:activeChs.length<=5?'58px':'82px',maxWidth:150,
                      border:`1.5px dashed hsla(${h},65%,55%,0.45)`,borderRadius:10,
                      background:`hsla(${h},85%,97%,0.95)`,padding:'.32rem .22rem .38rem',
                      display:'flex',flexDirection:'column',alignItems:'center',gap:'.2rem',
                      minHeight:78}}>
                    <div style={{fontFamily:'Cinzel,serif',fontSize:'.62rem',letterSpacing:'.03em',color:`hsla(${h},55%,32%,0.85)`}}>Ch.{ch}</div>
                    <svg width="24" height="21" viewBox="0 0 28 24">
                      <path d="M3 9 Q14 7 25 9 L23 21 Q14 23 5 21 Z" fill="none" stroke={`hsla(${h},55%,40%,0.5)`} strokeWidth="1.5"/>
                      <line x1="8.5" y1="9" x2="9.5" y2="21" stroke={`hsla(${h},55%,40%,0.22)`} strokeWidth="0.8"/>
                      <line x1="14" y1="9" x2="14" y2="21" stroke={`hsla(${h},55%,40%,0.22)`} strokeWidth="0.8"/>
                      <line x1="19.5" y1="9" x2="18.5" y2="21" stroke={`hsla(${h},55%,40%,0.22)`} strokeWidth="0.8"/>
                      <path d="M10 2 Q14 6 18 2" fill="none" stroke={`hsla(${h},55%,40%,0.45)`} strokeWidth="1.5" strokeLinecap="round"/>
                    </svg>
                    <div style={{width:'100%',display:'flex',flexDirection:'column',gap:'.12rem'}}>
                      {chItems.map(item=>{
                        const s=ts(item.type);
                        const corr=checked&&placed[item.id]===item.ch;
                        const wrng=checked&&placed[item.id]!==item.ch;
                        return(
                          <div key={item.id}
                            onClick={()=>{
                              if(!checked){
                                const tray=trayRef.current;
                                const W=tray?.offsetWidth||300,H=tray?.offsetHeight||200;
                                const p=physRef.current[item.id];
                                if(p){
                                  p.x=W/2-p.w/2+(Math.random()-.5)*50;
                                  p.y=H/2-p.h/2+(Math.random()-.5)*50;
                                  const ang=Math.random()*Math.PI*2;
                                  p.vx=Math.cos(ang)*1.4;p.vy=Math.sin(ang)*1.4;
                                }
                                setPlaced(prev=>{const n={...prev};delete n[item.id];return n;});
                              }
                            }}
                            style={{fontSize:'.64rem',padding:'.17rem .28rem',borderRadius:6,textAlign:'center',
                              wordBreak:'break-word',lineHeight:1.3,
                              border:`1px solid ${wrng?'rgba(210,40,40,0.45)':corr?'rgba(30,160,70,0.45)':s.bdr}`,
                              background:wrng?'#ffe8e8':corr?'#e8f8ef':s.bg,
                              color:wrng?'#c01818':corr?'#1a6035':s.txt,
                              cursor:checked?'default':'pointer',userSelect:'none'}}>
                            {item.text}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        {/* Ghost */}
        {ghost&&(()=>{
          const s=ts(ghost.item.type);
          return(
            <div style={{position:'fixed',left:ghost.x-ghost.offX,top:ghost.y-ghost.offY,
              display:'flex',alignItems:'center',gap:'.28rem',padding:'.3rem .72rem',
              borderRadius:20,background:s.bg,border:`1.5px solid ${s.bdr}`,color:s.txt,
              fontFamily:"'Crimson Pro',serif",fontSize:'.88rem',pointerEvents:'none',zIndex:9999,
              boxShadow:`0 8px 28px ${s.sh},0 2px 8px rgba(0,0,0,0.12)`,
              opacity:.94,whiteSpace:'nowrap',userSelect:'none',WebkitUserSelect:'none',
              transform:'scale(1.05) rotate(-1.5deg)'}}>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.44rem',color:s.dot,opacity:.85}}>{ghost.item.label}</span>
              {ghost.item.text}
            </div>
          );
        })()}
      </div>
    );
  }

  /* ══ RESULTS ══ */
  const pct=score.total>0?Math.round(score.correct/score.total*100):0;
  return(
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={bgRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:3,maxWidth:580,margin:'0 auto',padding:'1rem 1.1rem 5rem',fontFamily:"'Crimson Pro',serif"}}>
        <div style={{paddingTop:'3rem',textAlign:'center',marginBottom:'1.4rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'1.35rem',letterSpacing:'.08em',color:'#1848a0',textShadow:'0 2px 10px rgba(60,140,255,0.22)'}}>Sorting Complete</div>
        </div>
        <div style={{...card,padding:'1.4rem',textAlign:'center',marginBottom:'1.2rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'2.8rem',color:pct>=80?'#1a8040':pct>=50?'#a07010':'#cc2020',marginBottom:'.3rem'}}>{pct}%</div>
          <div style={{fontSize:'.88rem',color:'rgba(20,70,180,0.52)'}}>{score.correct} of {score.total} correctly sorted</div>
        </div>
        <div style={{display:'flex',gap:'.8rem',justifyContent:'center'}}>
          <button onClick={()=>setPhase('setup')} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.55rem 1.6rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#2262cc,#1040aa)',color:'#e8f4ff',cursor:'pointer',boxShadow:'0 4px 16px rgba(30,90,220,0.28)'}}>Play Again</button>
          <button onClick={onBack} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.55rem 1.4rem',borderRadius:9,border:'1px solid rgba(80,160,255,0.28)',background:'rgba(255,255,255,0.68)',color:'rgba(20,70,180,0.58)',cursor:'pointer'}}>← Back</button>
        </div>
      </div>
    </div>
  );
}
